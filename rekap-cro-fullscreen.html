<!DOCTYPE html>
<html lang="id" class="dark" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Rekap Rencana vs Realisasi CRO (Fullscreen) | PT AGRINAS PALMA NUSANTARA</title>
    <link rel="icon" type="image/jpeg" href="LOGO AGRIPAM.jpeg">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f8f9fb",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c0c9bb",
                        "on-surface": "#191c1e"
                    },
                    fontFamily: {
                        "body-base": ["Manrope"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0f172a;
            color: #cbd5e1;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* No scroll on body */
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        /* Fit table to screen height dynamically */
        table {
            height: 100% !important;
        }

        table th, table td {
            padding-top: clamp(1px, 0.25vh, 5px) !important;
            padding-bottom: clamp(1px, 0.25vh, 5px) !important;
            padding-left: clamp(3px, 0.4vw, 8px) !important;
            padding-right: clamp(3px, 0.4vw, 8px) !important;
            font-size: clamp(10px, 1.5vh, 15px) !important;
            line-height: 1.15 !important;
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-200">
    <div class="flex-1 flex flex-col h-full w-full overflow-hidden">
        <!-- Header -->
        <div class="px-1.5 py-1 flex flex-col md:flex-row md:items-center justify-between gap-2"
            style="background-color:#1e3a5f;">
            <div class="flex items-center gap-2">
                <img src="AGRINAS DANANTARA.png" alt="Logo APN" class="h-8 bg-white/90 p-1 rounded" />
                <div>
                    <h2 class="font-bold text-base md:text-lg text-white uppercase tracking-wide">MONITORING PRODUKSI
                        PANEN TBS 06.00 S/D 17.30</h2>
                    <p class="text-xs text-white/90 mt-0 font-semibold" id="headerDateText">Memuat tanggal...</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-white/10 border border-white/20 rounded-lg px-1.5 py-1 w-fit">
                <span class="material-symbols-outlined text-white text-lg">calendar_today</span>
                <label class="text-[10px] font-bold text-white">Tanggal:</label>
                <input type="date" id="rekapCRODatePicker"
                    class="bg-transparent border-none text-[10px] font-bold text-white outline-none cursor-pointer focus:ring-0 p-0"
                    style="color-scheme: dark;" />
            </div>
        </div>

        <!-- Table Container -->
        <div class="p-1 overflow-hidden flex-1 bg-slate-900">
            <div class="overflow-x-auto overflow-y-hidden border border-slate-800 rounded-lg h-full">
                <table class="w-full h-full border-collapse text-[12px] whitespace-nowrap">
                    <thead class="sticky top-0 z-10">
                        <tr style="background-color:#000000;"
                            class="text-white font-semibold text-center border-b border-slate-700">
                            <th rowspan="2" class="border border-slate-700 px-1.5 py-2 w-8">No</th>
                            <th rowspan="2" class="border border-slate-700 px-1.5 py-2 w-16">CRO</th>
                            <th rowspan="2" class="border border-slate-700 px-1 py-1 text-center"
                                style="width:100px; white-space:normal;">RH Oprasional/PKH</th>
                            <th colspan="12" class="border border-slate-700 px-1.5 py-1">Monitoring Produksi Pukul 06.00
                                WIB s.d 17.30 WIB (Ton)</th>
                            <th rowspan="2" class="border border-slate-700 px-2 py-2 w-20">Jumlah</th>
                        </tr>
                        <tr style="background-color:#000000;" class="text-white font-semibold text-center">
                            <th class="border border-slate-700 px-1.5 py-1 w-12">06.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">07.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">08.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">09.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">10.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">11.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">12.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">13.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">14.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">15.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">16.00</th>
                            <th class="border border-slate-700 px-1.5 py-1 w-12">17.30</th>
                        </tr>
                    </thead>
                    <tbody id="rekapCROBody" class="text-slate-200">
                        <tr>
                            <td colspan="16" class="text-center py-4 bg-white text-black">Memuat data...</td>
                        </tr>
                    </tbody>
                    <tfoot class="sticky bottom-0 z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
                        <tr id="rekapCROTotalRow" style="background-color:#000000;" class="text-white font-bold"></tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <script>
        let globalAllRecords = [];
        let globalSelectedDate = "";

        const CRO_GROUPS_REKAP = {
            "CRO I": ["Aceh", "Sumatera Utara 1", "Sumatera Utara 2 Ex Torganda"],
            "CRO II": ["Riau 1"],
            "CRO III": ["Riau 2", "Riau 3"],
            "CRO IV": ["Riau 4"],
            "CRO V": ["Bangka Belitung", "Jambi", "Sumatera Barat", "Sumatera Selatan"],
            "CRO VI": ["Kalimantan Barat 1", "Kalimantan Barat 2"],
            "CRO VII": ["Kalimantan Selatan 1", "Kalimantan Selatan 2", "Kalimantan Timur", "Kalimantan Utara"],
            "CRO VIII": ["Kalimantan Tengah 1", "Kalimantan Tengah 3"],
            "CRO IX": ["Kalimantan Tengah 2"],
            "CRO X": ["Sulawesi Tenggara", "Sulawesi Tengah"]
        };

        const jamHeaders = ["06.00", "07.00", "08.00", "09.00", "10.00", "11.00", "12.00", "13.00", "14.00", "15.00", "16.00", "17.30"];

        function getWIBDateStr() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const wibTime = new Date(utc + (7 * 3600000));
            const yyyy = wibTime.getFullYear();
            const MM = String(wibTime.getMonth() + 1).padStart(2, '0');
            const dd = String(wibTime.getDate()).padStart(2, '0');
            return yyyy + "-" + MM + "-" + dd;
        }

        function getCurrentJamStr() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const wibTime = new Date(utc + (7 * 3600000));
            const hour = wibTime.getHours();

            if (hour === 6) return "06.00";
            if (hour === 7) return "07.00";
            if (hour === 8) return "08.00";
            if (hour === 9) return "09.00";
            if (hour === 10) return "10.00";
            if (hour === 11) return "11.00";
            if (hour === 12) return "12.00";
            if (hour === 13) return "13.00";
            if (hour === 14) return "14.00";
            if (hour === 15) return "15.00";
            if (hour === 16) return "16.00";
            if (hour === 17) return "17.30";
            return null;
        }

        function formatTanggalIndo(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            const namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            return `${namaHari[d.getDay()]}, ${d.getDate()} ${namaBulan[d.getMonth()]} ${d.getFullYear()}`;
        }

        document.addEventListener("DOMContentLoaded", function () {
            const dateInput = document.getElementById("rekapCRODatePicker");
            const today = getWIBDateStr();
            dateInput.value = today;
            globalSelectedDate = today;

            loadData(today);

            dateInput.addEventListener("change", function () {
                if (this.value) {
                    globalSelectedDate = this.value;
                    loadData(this.value);
                }
            });

            setInterval(() => {
                loadData(globalSelectedDate);
            }, 5 * 60 * 1000);
        });

        function loadData(tanggal) {
            document.getElementById("headerDateText").innerText = formatTanggalIndo(tanggal);
            const urlData = `/api/realisasi?action=getData&tanggal=${tanggal}&region=ALL`;

            fetch(urlData)
                .then(res => res.json())
                .then(res => {
                    if (res.success && res.allRecords) {
                        globalAllRecords = res.allRecords;
                    } else {
                        globalAllRecords = [];
                    }
                    renderRekapCROTable();
                })
                .catch(err => {
                    console.error("Error loading data:", err);
                    globalAllRecords = [];
                    renderRekapCROTable();
                });
        }

        function renderRekapCROTable() {
            const fmt = (num) => num === 0 ? "-" : new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(num);

            // Group data by region and jam
            const dataByRegion = {};
            globalAllRecords.forEach(record => {
                if (!dataByRegion[record.region]) dataByRegion[record.region] = {};
                // If it is recorded, it's defined (even if tonase is 0)
                dataByRegion[record.region][record.jam] = parseFloat(record.tonase) || 0;
            });

            let bodyHtml = "";
            let groupNo = 1;

            const isToday = (globalSelectedDate === getWIBDateStr());
            const currentJamStr = isToday ? getCurrentJamStr() : null;

            // Initialize grand total
            const grandTotal = { total: 0 };
            jamHeaders.forEach(j => grandTotal[j] = 0);

            Object.keys(CRO_GROUPS_REKAP).forEach(croLabel => {
                const regions = CRO_GROUPS_REKAP[croLabel];

                // Initialize subtotal for this CRO
                const croTotal = { total: 0 };
                jamHeaders.forEach(j => croTotal[j] = 0);

                let isFirstRegionInCRO = true;

                regions.forEach((regionName, idx) => {
                    const rData = dataByRegion[regionName] || {};
                    let regionTotal = 0;

                    let rowHtml = `<tr class="bg-white text-black border-b border-slate-400">`;

                    if (isFirstRegionInCRO) {
                        rowHtml += `<td rowspan="${regions.length}" class="border border-slate-400 px-1.5 py-1 text-center font-bold align-middle">${groupNo}</td>`;
                        rowHtml += `<td rowspan="${regions.length}" class="border border-slate-400 px-1.5 py-1 text-center font-bold align-middle">${croLabel}</td>`;
                        isFirstRegionInCRO = false;
                    }

                    let isLate = false;
                    if (currentJamStr && rData[currentJamStr] === undefined) {
                        isLate = true;
                    }

                    let regionClass = "border border-slate-400 px-1 py-1 text-left" + " " + "whitespace-nowrap";
                    if (isLate) {
                        regionClass += " bg-red-500 text-white font-bold";
                    }

                    rowHtml += `<td class="${regionClass}">${regionName}</td>`;

                    // Columns for each jam
                    jamHeaders.forEach(j => {
                        const val = rData[j] || 0;
                        regionTotal += val;
                        croTotal[j] += val;
                        grandTotal[j] += val;
                        rowHtml += `<td class="border border-slate-400 px-1.5 py-1 text-center">${fmt(val)}</td>`;
                    });

                    croTotal.total += regionTotal;
                    grandTotal.total += regionTotal;

                    // Jumlah column for the region
                    rowHtml += `<td class="border border-slate-400 px-2 py-1 text-center font-bold" style="background-color:#59b6c7;">${fmt(regionTotal)}</td>`;
                    rowHtml += `</tr>`;

                    bodyHtml += rowHtml;
                });

                // CRO Subtotal Row
                bodyHtml += `
                    <tr class="bg-gray-200 text-black font-bold border-b border-slate-400">
                        <td colspan="3" class="border border-slate-400 px-2 py-1 text-center">Jumlah ${croLabel}</td>`;

                jamHeaders.forEach(j => {
                    bodyHtml += `<td class="border border-slate-400 px-1.5 py-1 text-center">${fmt(croTotal[j])}</td>`;
                });

                bodyHtml += `<td class="border border-slate-400 px-2 py-1 text-center" style="background-color:#59b6c7;">${fmt(croTotal.total)}</td>
                    </tr>`;

                groupNo++;
            });

            const bodyEl = document.getElementById("rekapCROBody");
            if (bodyEl) bodyEl.innerHTML = bodyHtml;

            // Grand Total Row
            const totalRowEl = document.getElementById("rekapCROTotalRow");
            if (totalRowEl) {
                let footHtml = `<td colspan="3" class="border border-slate-700 px-2 py-2 text-center text-sm">Total PT Agrinas Palma Nusantara</td>`;
                jamHeaders.forEach(j => {
                    footHtml += `<td class="border border-slate-700 px-1.5 py-2 text-center">${fmt(grandTotal[j])}</td>`;
                });
                footHtml += `<td class="border border-slate-700 px-2 py-2 text-center" style="background-color:#59b6c7; color:black;">${fmt(grandTotal.total)}</td>`;
                totalRowEl.innerHTML = footHtml;
            }
        }
    </script>
</body>

</html>
