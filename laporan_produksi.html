  <script>
    (function checkAuth() {
      // Apply theme immediately
      var savedTheme = localStorage.getItem("agripam_theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);

      var sessionKey = "agripam_session";
      try {
        var raw = sessionStorage.getItem(sessionKey);
        if (!raw) {
          window.location.href = "login.html?msg=" + encodeURIComponent("Harap login terlebih dahulu.");
          return;
        }
        var s = JSON.parse(raw);
        if (Date.now() > s.expiry) {
          sessionStorage.removeItem(sessionKey);
          window.location.href = "login.html?msg=" + encodeURIComponent("Sesi Anda telah berakhir. Silakan login kembali.");
          return;
        }
        if (s.region !== "ADMIN") {
          window.location.href = "login.html?msg=" + encodeURIComponent("Akses ditolak. Halaman ini hanya untuk ADMIN.");
          return;
        }
      } catch (e) {
        sessionStorage.removeItem(sessionKey);
        window.location.href = "login.html?msg=" + encodeURIComponent("Terjadi kesalahan sesi.");
      }
    })();

    // Pageshow guard — cegah akses halaman dari bfcache setelah logout
    window.addEventListener("pageshow", function (event) {
      if (event.persisted) {
        var raw = sessionStorage.getItem("agripam_session");
        if (!raw) {
          window.location.replace("login.html?msg=" + encodeURIComponent("Sesi telah berakhir. Silakan login kembali."));
          return;
        }
        try {
          var s = JSON.parse(raw);
          if (Date.now() > s.expiry || s.region !== "ADMIN") {
            sessionStorage.removeItem("agripam_session");
            window.location.replace("login.html?msg=" + encodeURIComponent("Sesi telah berakhir. Silakan login kembali."));
          }
        } catch (e) {
          sessionStorage.removeItem("agripam_session");
          window.location.replace("login.html?msg=" + encodeURIComponent("Terjadi kesalahan sesi."));
        }
      }
    });
  </script>

    function formatRibuan(num) {
      return Number(num).toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function getInitials(name) {
      return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }
    function useNow() {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);
      return now;
    }

    // ============================================================
    // ICON COMPONENT (wraps Lucide)
    // ============================================================
    function Icon({ name, size = 18, className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const el = document.createElement('div');
          el.setAttribute('data-lucide', name);
          el.style.width = size + 'px';
          el.style.height = size + 'px';
          ref.current.appendChild(el);
          window.lucide.createIcons({ nameAttr: 'data-lucide', rootElement: ref.current });
        }
      }, [name, size]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
    }

    // ============================================================
    // ROW 1: TICKER
    // ============================================================
    function TickerRow({ realisasiRecords, estimasiData }) {
      const [tickerHtml, setTickerHtml] = useState("Mengambil data hasil produksi...");

      useEffect(() => {
        if (!realisasiRecords || realisasiRecords.length === 0) {
          setTickerHtml("Belum ada laporan produksi masuk untuk tanggal ini");
          return;
        }

        const regionMap = {};
        realisasiRecords.forEach(rec => {
          const key = rec.region;
          if (!regionMap[key]) {
            regionMap[key] = { region: rec.region, totalRealisasi: 0, latestJam: rec.jam };
          }
          regionMap[key].totalRealisasi += parseFloat(rec.tonase) || 0;
          if (rec.jam > regionMap[key].latestJam) {
            regionMap[key].latestJam = rec.jam;
          }
        });

        const items = Object.keys(regionMap).map(key => {
          const r = regionMap[key];
          const realisasiStr = r.totalRealisasi.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          return `<span class="ticker-region">${r.region}</span> (<strong>${realisasiStr} Ton </strong>)<span class="ticker-time">${r.latestJam} wib</span>`;
        });

        if (items.length > 0) {
          setTickerHtml(items.join('&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'));
        } else {
          setTickerHtml("Belum ada laporan produksi masuk untuk tanggal ini");
        }
      }, [realisasiRecords, estimasiData]);

      return (
        <section className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex-shrink-0">
          <div className="flex items-stretch">
            <div className="bg-red-600 flex items-center gap-2 px-4 py-2.5 flex-shrink-0">
              <div className="w-1.5 h-1.5 rounded-full bg-white animate-pulse2"></div>
              <span className="text-[11px] font-bold text-white uppercase tracking-wider whitespace-nowrap">AGRIPAM</span>
            </div>
            <div className="flex-1 overflow-hidden bg-red-50">
              <div className="ticker-track py-2.5">
                <span className="text-[12.5px] text-red-800 font-medium px-8" dangerouslySetInnerHTML={{ __html: tickerHtml }}></span>
                <span className="text-[12.5px] text-red-800 font-medium px-8" aria-hidden="true" dangerouslySetInnerHTML={{ __html: tickerHtml }}></span>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ============================================================
    // ROW 2: HOURLY LINE CHART
    // ============================================================
    function trimToReportedRange(values) {
      var firstIdx = -1, lastIdx = -1;
      for (var i = 0; i < values.length; i++) {
        if (values[i] > 0) {
          if (firstIdx === -1) firstIdx = i;
          lastIdx = i;
        }
      }
      if (firstIdx === -1) return values.map(function () { return null; });
      return values.map(function (v, i) {
        return (i < firstIdx || i > lastIdx) ? null : v;
      });
    }

    function HourlyChartRow({ filters, realisasiRecords, regionalDetails, kemarinRecords, theme }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); }

        const ctx = canvasRef.current.getContext("2d");
        const TREND_UP_COLOR = '#2563eb';
        const TREND_DOWN_COLOR = '#dc2626';
        const TREND_FLAT_COLOR = 'rgba(148, 163, 184, 0.6)';

        const segmentColorForLine = (datasetIndex) => {
          return (ctx) => {
            const data = ctx.chart.data.datasets[datasetIndex].data;
            const v0 = data[ctx.p0DataIndex];
            const v1 = data[ctx.p1DataIndex];
            if (v0 == null || v1 == null) return TREND_FLAT_COLOR;
            if (v1 > v0) return TREND_UP_COLOR;
            if (v1 < v0) return TREND_DOWN_COLOR;
            return TREND_FLAT_COLOR;
          };
        };

        const pointColorForLine = (datasetIndex) => {
          return (ctx) => {
            const data = ctx.chart.data.datasets[datasetIndex].data;
            const i = ctx.dataIndex;
            const v1 = data[i];
            if (i === 0 || v1 == null) return TREND_FLAT_COLOR;
            const v0 = data[i - 1];
            if (v0 == null) return TREND_FLAT_COLOR;
            if (v1 > v0) return TREND_UP_COLOR;
            if (v1 < v0) return TREND_DOWN_COLOR;
            return TREND_FLAT_COLOR;
          };
        };

        // Get filtered regional details for summary
        const filtered = getFilteredRegionals(filters, regionalDetails);
        const filtEst = filtered.reduce((s, d) => s + d.estimasi, 0);

        // Get allowed regions based on filters
        let allowedRegions = [...ALL_REGIONS];
        if (filters.cro !== 'Semua CRO') {
          allowedRegions = CRO_MAP[filters.cro] || [];
        }
        if (filters.regional !== 'Semua Regional') {
          allowedRegions = [filters.regional];
        }

        // Sum realisasi data for each hour from realisasiRecords
        const hours = ["06.00", "07.00", "08.00", "09.00", "10.00", "11.00", "12.00", "13.00", "14.00", "15.00", "16.00", "17.30"];
        const hourlyData = hours.map(h => {
          return (realisasiRecords || [])
            .filter(r => allowedRegions.includes(r.region) && r.jam === h)
            .reduce((sum, r) => sum + (parseFloat(r.tonase) || 0), 0);
        });

        const lineData = trimToReportedRange(hourlyData);

        const gradient = ctx.createLinearGradient(0, 0, 0, canvasRef.current.clientHeight || 220);
        gradient.addColorStop(0, 'rgba(22, 163, 74, 0.85)');
        gradient.addColorStop(1, 'rgba(22, 163, 74, 0.15)');

        const hoverGradient = ctx.createLinearGradient(0, 0, 0, canvasRef.current.clientHeight || 220);
        hoverGradient.addColorStop(0, 'rgba(22, 163, 74, 1)');
        hoverGradient.addColorStop(1, 'rgba(22, 163, 74, 0.35)');

        const chartDataLabelsPlugin = {
          id: 'chartDataLabels',
          afterDatasetsDraw: (chart) => {
            const ctx = chart.ctx;
            const barDataset = chart.data.datasets[0];
            const barMeta = chart.getDatasetMeta(0);
            barMeta.data.forEach((bar, index) => {
              const val = barDataset.data[index];
              if (val === 0 || val == null) return;

              ctx.save();
              ctx.font = "bold 11px Calibri";
              ctx.textAlign = 'center';
              ctx.textBaseline = 'bottom';

              let pctText = "";
              let pctColor = "";
              if (filtEst > 0) {
                let cumulativeSum = 0;
                for (let k = 0; k <= index; k++) {
                  if (barDataset.data[k] != null) {
                    cumulativeSum += barDataset.data[k];
                  }
                }
                const pct = (cumulativeSum / filtEst) * 100;
                pctText = pct.toFixed(2) + "%";
                pctColor = '#475569';
              }

              const valText = val.toLocaleString('id-ID', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
              ctx.fillStyle = "#1e293b";

              if (pctText) {
                ctx.fillText(valText, bar.x, bar.y - 15);
                ctx.fillStyle = pctColor;
                ctx.fillText(pctText, bar.x, bar.y - 3);
              } else {
                ctx.fillText(valText, bar.x, bar.y - 3);
              }
              ctx.restore();
            });

            const lineDataset = chart.data.datasets[1];
            const lineMeta = chart.getDatasetMeta(1);
            lineMeta.data.forEach((point, index) => {
              if (index === 0) return;
              const prev = lineDataset.data[index - 1];
              const curr = lineDataset.data[index];
              if (prev == null || curr == null || prev === 0) return;

              const change = ((curr - prev) / prev) * 100;
              const isUp = change > 0;
              const isFlat = change === 0;
              const color = isFlat ? TREND_FLAT_COLOR : (isUp ? TREND_UP_COLOR : TREND_DOWN_COLOR);
              const arrow = isFlat ? "▬" : (isUp ? "▲" : "▼");
              const text = arrow + " " + (change >= 0 ? "+" : "") + change.toFixed(1) + "%";

              ctx.save();
              ctx.font = "bold 10px Calibri";
              ctx.textAlign = 'left';
              ctx.textBaseline = 'middle';
              ctx.fillStyle = color;
              ctx.fillText(text, point.x + 10, point.y);
              ctx.restore();
            });
          }
        };

        chartRef.current = new Chart(canvasRef.current, {
          type: 'bar',
          data: {
            labels: MOCK_HOURLY_DATA.labels,
            datasets: [
              {
                type: 'bar',
                label: 'Realisasi Panen (Ton)',
                data: hourlyData,
                backgroundColor: gradient,
                borderColor: '#16a34a',
                borderWidth: 1.5,
                borderRadius: 4,
                hoverBackgroundColor: hoverGradient,
                order: 1
              },
              {
                type: 'line',
                label: 'Connecting Line',
                data: lineData,
                borderWidth: 2.5,
                borderDash: [6, 4],
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: pointColorForLine(1),
                pointBorderColor: pointColorForLine(1),
                segment: { borderColor: segmentColorForLine(1) },
                fill: false,
                tension: 0,
                order: 0
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                grace: '15%',
                grid: { color: theme === 'dark' ? 'rgba(255, 255, 255, 0.1)' : '#f1f5f9' },
                ticks: {
                  color: '#94a3b8',
                  font: { family: 'Inter', size: 11, weight: 'bold' },
                  callback: v => v.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' Ton'
                }
              },
              x: {
                grid: { color: theme === 'dark' ? 'rgba(255, 255, 255, 0.1)' : '#f1f5f9' },
                ticks: {
                  color: '#94a3b8',
                  font: { family: 'Inter', size: 11, weight: 'bold' }
                }
              }
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                titleFont: { family: 'Inter', size: 11, weight: 'bold' },
                bodyFont: { family: 'Inter', size: 11, weight: 'bold' },
                callbacks: {
                  label: context => ' ' + context.dataset.label + ': ' + context.parsed.y.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' Ton'
                }
              }
            }
          },
          plugins: [chartDataLabelsPlugin]
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [filters, realisasiRecords, regionalDetails, theme]);

      const filtered = getFilteredRegionals(filters, regionalDetails);
      const filtReal = filtered.reduce((s, d) => s + d.realisasi, 0);
      const filtEst = filtered.reduce((s, d) => s + d.estimasi, 0);
      const filterLabel = filters.regional !== 'Semua Regional' ? filters.regional
        : filters.cro !== 'Semua CRO' ? filters.cro.split('—')[0].trim()
          : 'Nasional';

      // Allowed regions for filtering kemarinRecords
      let allowedRegions = [...ALL_REGIONS];
      if (filters.cro !== 'Semua CRO') {
        allowedRegions = CRO_MAP[filters.cro] || [];
      }
      if (filters.regional !== 'Semua Regional') {
        allowedRegions = [filters.regional];
      }

      const totalHariIni = filtReal;
      const totalKemarin = (kemarinRecords || [])
        .filter(r => allowedRegions.includes(r.region))
        .reduce((sum, r) => sum + (parseFloat(r.tonase) || 0), 0);

      const ratio = totalKemarin > 0 ? (totalHariIni / totalKemarin) * 100 : (totalHariIni > 0 ? 100 : 0);
      const isUp = totalHariIni >= totalKemarin;

      return (
        <section className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 dashboard-card">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-[14px] font-bold text-slate-800">Tren Produksi Per Jam</h2>
              <p className="text-[12px] text-slate-400 mt-0.5">Kumulatif {filterLabel} — {(filters.dateMode !== 'TUNGGAL' && filters.tanggal !== filters.tanggal_akhir) ? `${formatIndoDate(filters.tanggal)} - ${formatIndoDate(filters.tanggal_akhir || filters.tanggal)}` : formatIndoDate(filters.tanggal)}</p>
            </div>
            <div className="flex items-center gap-3">
              <div className="text-right">
                <div className="text-[13px] font-bold text-brand-600">{formatRibuan(filtReal)} ton</div>
                <div className="text-[10px] text-slate-400">dari est. {formatRibuan(filtEst)} ton</div>
              </div>
              {(!filters.dateMode || filters.dateMode === 'TUNGGAL') && (
                <div className={`flex items-center gap-2 text-[11px] border font-semibold px-2.5 py-1 rounded-lg ${isUp ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}>
                  <Icon name={isUp ? "trending-up" : "trending-down"} size={13} />
                  <span className="inline-flex items-center justify-center">{ratio.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}% vs kemarin</span>
                </div>
              )}
            </div>
          </div>
          <div style={{ height: '220px' }}>
            <canvas ref={canvasRef}></canvas>
          </div>
        </section>
      );
    }

    // ============================================================
    // ROW 3: DONUT + LEADERBOARD
    // ============================================================
    function DonutChart({ filters, regionalDetails }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      const [showAll, setShowAll] = useState(false);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); }

        const data = getFilteredRegionals(filters, regionalDetails);

        chartRef.current = new Chart(canvasRef.current, {
          type: 'doughnut',
          data: {
            labels: data.map(d => d.region),
            datasets: [{
              data: data.map(d => d.tonase),
              backgroundColor: data.map(d => d.color),
              borderWidth: 3, borderColor: '#fff', hoverBorderColor: '#fff', hoverOffset: 6,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false, cutout: '68%',
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1e293b', titleColor: '#94a3b8', bodyColor: '#f1f5f9',
                padding: 12, cornerRadius: 8,
                callbacks: { label: ctx => ` ${formatRibuan(ctx.parsed)} ton` }
              }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [filters, regionalDetails]);

      const data = getFilteredRegionals(filters, regionalDetails);
      const total = data.reduce((s, d) => s + d.tonase, 0);

      const displayedData = showAll ? data : data.slice(0, 3);

      return (
        <section className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 dashboard-card flex flex-col justify-between">
          <div>
            <div className="mb-4">
              <h2 className="text-[14px] font-bold text-slate-800">Kontribusi Panen Tiap Regional</h2>
              <p className="text-[12px] text-slate-400 mt-0.5">Proporsi realisasi {filters.cro !== 'Semua CRO' ? filters.cro.split('—')[0].trim() : 'nasional'} s.d. jam ini</p>
            </div>
            <div className="relative flex justify-center" style={{ height: '180px' }}>
              <canvas ref={canvasRef}></canvas>
              <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div className="text-[20px] font-bold text-slate-800">{formatRibuan(total)}</div>
                <div className="text-[10px] text-slate-400 font-medium">TON TOTAL</div>
              </div>
            </div>
            <div className="mt-4 grid grid-cols-1 gap-1.5 transition-all duration-300">
              {displayedData.map((d, i) => {
                const pct = total > 0 ? ((d.tonase / total) * 100).toFixed(1) : '0.0';
                return (
                  <div key={i} className="flex items-center gap-2 animate-fadeIn">
                    <div className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: d.color }}></div>
                    <span className="text-[11px] text-slate-600 flex-1 truncate">{d.region}</span>
                    <span className="text-[11px] text-slate-450 dark:text-slate-400 tabular-nums mr-1.5">{formatRibuan(d.tonase)} ton</span>
                    <span className="text-[11px] font-semibold text-slate-700">{pct}%</span>
                  </div>
                );
              })}
            </div>
          </div>
          {data.length > 3 && (
            <button
              onClick={() => setShowAll(!showAll)}
              className="mt-3 text-[11px] text-brand-600 hover:text-brand-700 font-semibold flex items-center justify-center gap-1 w-full py-1.5 border border-slate-100 hover:bg-slate-50 rounded-lg transition-all"
            >
              <Icon name={showAll ? "chevron-up" : "chevron-down"} size={12} />
              {showAll ? "Tampilkan Lebih Sedikit" : `Lihat ${data.length - 3} Regional Lainnya`}
            </button>
          )}
        </section>
      );
    }

    function RankBadge({ rank }) {
      if (rank === 1) return <div className="rank-1 w-6 h-6 rounded-full flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0">1</div>;
      if (rank === 2) return <div className="rank-2 w-6 h-6 rounded-full flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0">2</div>;
      if (rank === 3) return <div className="rank-3 w-6 h-6 rounded-full flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0">3</div>;
      return <div className="rank-other w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-semibold flex-shrink-0">{rank}</div>;
    }

    function LeaderboardRow({ item, type }) {
      const isOutput = type === 'output';
      return (
        <div className="flex items-center gap-3 py-2 border-b border-slate-50 last:border-0">
          <RankBadge rank={item.rank} />
          <div className="flex-1 min-w-0">
            <div className="text-[12px] font-semibold text-slate-700 truncate">{item.region}</div>
            <div className="w-full bg-slate-100 rounded-full h-1.5 mt-1">
              <div className={`h-1.5 rounded-full ${isOutput ? 'bg-brand-500' : 'bg-orange-500'}`} style={{ width: `${item.pct}%` }} />
            </div>
          </div>
          <div className="text-right flex-shrink-0">
            <div className="text-[13px] font-bold text-slate-800">{formatRibuan(isOutput ? item.tonase : item.restan)}</div>
            <div className="text-[10px] text-slate-400">ton</div>
          </div>
        </div>
      );
    }

    function LeaderboardCard({ filters, regionalDetails }) {
      const data = getFilteredRegionals(filters, regionalDetails);
      const sorted = [...data].sort((a, b) => b.realisasi - a.realisasi);
      const sortedRest = [...data].sort((a, b) => b.restan - a.restan);
      const maxTon = sorted[0]?.realisasi || 1;
      const maxRest = sortedRest[0]?.restan || 1;

      const top5out = sorted.slice(0, 5).map((d, i) => ({ rank: i + 1, region: d.region, tonase: d.realisasi, pct: Math.round((d.realisasi / maxTon) * 100) }));
      const top5rest = sortedRest.slice(0, 5).map((d, i) => ({ rank: i + 1, region: d.region, restan: d.restan, pct: Math.round((d.restan / maxRest) * 100) }));

      return (
        <section className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 dashboard-card">
          <div className="mb-4">
            <h2 className="text-[14px] font-bold text-slate-800">Leaderboard Regional</h2>
            <p className="text-[12px] text-slate-400 mt-0.5">Ranking berdasarkan data s.d. jam saat ini</p>
          </div>
          <div className="grid grid-cols-2 gap-5">
            <div>
              <div className="flex items-center gap-2 mb-3">
                <div className="w-6 h-6 rounded-lg bg-brand-50 flex items-center justify-center"><Icon name="trophy" size={13} className="text-brand-600" /></div>
                <span className="text-[12px] font-bold text-slate-700">Top 5 Output Panen</span>
              </div>
              {top5out.length ? top5out.map(item => <LeaderboardRow key={item.rank} item={item} type="output" />) : <p className="text-[12px] text-slate-400 py-2">Tidak ada data</p>}
            </div>
            <div>
              <div className="flex items-center gap-2 mb-3">
                <div className="w-6 h-6 rounded-lg bg-orange-50 flex items-center justify-center"><Icon name="alert-triangle" size={13} className="text-orange-600" /></div>
                <span className="text-[12px] font-bold text-slate-700">Top 5 Restan Hari Ini</span>
              </div>
              {top5rest.length ? top5rest.map(item => <LeaderboardRow key={item.rank} item={item} type="restan" />) : <p className="text-[12px] text-slate-400 py-2">Tidak ada data</p>}
            </div>
          </div>
        </section>
      );
    }

    function RegionalRow({ filters, regionalDetails }) {
      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
          <DonutChart filters={filters} regionalDetails={regionalDetails} />
          <div className="lg:col-span-2"><LeaderboardCard filters={filters} regionalDetails={regionalDetails} /></div>
        </div>
      );
    }

    // ============================================================
    // ROW 4: REALISASI VS ESTIMASI BAR CHART
    // ============================================================
    function RealisasiEstimasiChart({ filters, regionalDetails, theme, realisasiRecords }) {
      const [activeTab, setActiveTab] = useState('harian');
      const [chartData, setChartData] = useState({ labels: [], realisasi: [], estimasi: [] });
      const [loading, setLoading] = useState(false);

      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      const getPastDateStr = (refDateStr, daysToSubtract) => {
        if (!refDateStr) return '';
        const parts = refDateStr.split('-');
        if (parts.length !== 3) return refDateStr;
        const d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
        d.setDate(d.getDate() - daysToSubtract);
        const yyyy = d.getFullYear();
        const MM = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${MM}-${dd}`;
      };

      const getDatesInRange = (startStr, endStr) => {
        const dates = [];
        const startParts = startStr.split('-');
        const endParts = endStr.split('-');
        if (startParts.length !== 3 || endParts.length !== 3) return [];
        const current = new Date(parseInt(startParts[0], 10), parseInt(startParts[1], 10) - 1, parseInt(startParts[2], 10));
        const end = new Date(parseInt(endParts[0], 10), parseInt(endParts[1], 10) - 1, parseInt(endParts[2], 10));
        while (current <= end) {
          const y = current.getFullYear();
          const m = String(current.getMonth() + 1).padStart(2, '0');
          const d = String(current.getDate()).padStart(2, '0');
          dates.push(`${y}-${m}-${d}`);
          current.setDate(current.getDate() + 1);
        }
        return dates;
      };

      const formatDateLabel = (dateStr) => {
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
        const d = parseInt(parts[2], 10);
        const m = months[parseInt(parts[1], 10) - 1];
        return `${d} ${m}`;
      };

      // Fetch and process data for Harian, Mingguan, Bulanan
      useEffect(() => {
        const refDate = filters.tanggal_akhir || filters.tanggal || getTodayWIB();
        const parts = refDate.split('-');
        if (parts.length !== 3) return;

        const y = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10) - 1; // 0-indexed
        const lastDay = new Date(y, m + 1, 0).getDate();

        let active = true;
        const fetchData = async () => {
          setLoading(true);
          try {
            const sessionRaw = sessionStorage.getItem("agripam_session");
            const session = sessionRaw ? JSON.parse(sessionRaw) : null;
            const token = session ? session.token : "";

            let startDate = "";
            let endDateQuery = "";

            if (activeTab === 'harian' || activeTab === 'mingguan') {
              startDate = `${parts[0]}-${parts[1]}-01`;
              endDateQuery = `${parts[0]}-${parts[1]}-${String(lastDay).padStart(2, '0')}`;
            } else if (activeTab === 'bulanan') {
              startDate = `${parts[0]}-01-01`;
              endDateQuery = `${parts[0]}-12-31`;
            }

            const promises = [
              fetch(`/api/realisasi?action=getData&tanggal=${startDate}&tanggal_akhir=${endDateQuery}&region=ALL&_t=${Date.now()}`),
              fetch(`/api/estimasi?action=getEstimasi&tanggal=${startDate}&tanggal_akhir=${endDateQuery}&region=ALL&token=${token}&_t=${Date.now()}`),
            ];

            const results = await Promise.all(promises);
            const realRes = await results[0].json();
            const estRes = await results[1].json();

            if (!active) return;

            if (realRes.success && estRes.success) {
              const realRecords = realRes.allRecords || [];
              const estRecords = estRes.allRecords || [];

              let allowedRegions = [...ALL_REGIONS];
              if (filters.cro !== 'Semua CRO') {
                allowedRegions = CRO_MAP[filters.cro] || [];
              }

              // ----------------------------------------------------
              // CASE 1: Tab Harian (Seluruh Hari dalam Bulan Terpilih)
              // ----------------------------------------------------
              if (activeTab === 'harian') {
                const dates = getDatesInRange(startDate, endDateQuery);
                const labels = dates.map(d => formatDateLabel(d));

                const realisasi = dates.map(dt => {
                  return realRecords
                    .filter(rec => rec.tanggal === dt && (filters.regional === 'Semua Regional' ? allowedRegions.includes(rec.region) : rec.region === filters.regional))
                    .reduce((sum, rec) => sum + (parseFloat(rec.tonase) || 0), 0);
                });

                const estimasi = dates.map(dt => {
                  return estRecords
                    .filter(rec => rec.tanggal === dt && (filters.regional === 'Semua Regional' ? allowedRegions.includes(rec.region) : rec.region === filters.regional))
                    .reduce((sum, rec) => {
                      const estPanen = parseFloat(rec.estimasi_panen_kg) || parseFloat(rec.estimasi_kirim_kg) || 0;
                      return sum + (estPanen / 1000);
                    }, 0);
                });

                setChartData({ labels, realisasi, estimasi });

              // ----------------------------------------------------
              // CASE 2: Tab Mingguan
              // ----------------------------------------------------
              } else if (activeTab === 'mingguan') {
                const targetRegion = filters.regional;
                const numWeeks = lastDay > 28 ? 5 : 4;
                const weekLabels = ["Minggu 1", "Minggu 2", "Minggu 3", "Minggu 4", "Minggu 5"].slice(0, numWeeks);
                const weekRealValues = Array(numWeeks).fill(0);
                const weekEstValues = Array(numWeeks).fill(0);

                const dates = getDatesInRange(startDate, endDateQuery);
                dates.forEach(dt => {
                  const dayNum = parseInt(dt.split('-')[2], 10);
                  let wIdx = 0;
                  if (dayNum >= 1 && dayNum <= 7) wIdx = 0;
                  else if (dayNum >= 8 && dayNum <= 14) wIdx = 1;
                  else if (dayNum >= 15 && dayNum <= 21) wIdx = 2;
                  else if (dayNum >= 22 && dayNum <= 28) wIdx = 3;
                  else wIdx = 4;

                  if (wIdx < numWeeks) {
                    const dailyReal = realRecords
                      .filter(rec => rec.tanggal === dt && (targetRegion === 'Semua Regional' ? allowedRegions.includes(rec.region) : rec.region === targetRegion))
                      .reduce((sum, rec) => sum + (parseFloat(rec.tonase) || 0), 0);

                    const dailyEst = estRecords
                      .filter(rec => rec.tanggal === dt && (targetRegion === 'Semua Regional' ? allowedRegions.includes(rec.region) : rec.region === targetRegion))
                      .reduce((sum, rec) => {
                        const estPanen = parseFloat(rec.estimasi_panen_kg) || parseFloat(rec.estimasi_kirim_kg) || 0;
                        return sum + (estPanen / 1000);
                      }, 0);

                    weekRealValues[wIdx] += dailyReal;
                    weekEstValues[wIdx] += dailyEst;
                  }
                });

                setChartData({ labels: weekLabels, realisasi: weekRealValues, estimasi: weekEstValues });

              // ----------------------------------------------------
              // CASE 3: Tab Bulanan
              // ----------------------------------------------------
              } else if (activeTab === 'bulanan') {
                const monthLabels = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                const monthKeys = Array.from({ length: 12 }, (_, i) => `${parts[0]}-${String(i + 1).padStart(2, '0')}`);

                const monthRealValues = Array(12).fill(0);
                const monthEstValues = Array(12).fill(0);

                realRecords.forEach(rec => {
                  const isRegionAllowed = filters.regional === 'Semua Regional' ? allowedRegions.includes(rec.region) : rec.region === filters.regional;
                  if (isRegionAllowed && rec.tanggal) {
                    const mStr = rec.tanggal.substring(0, 7);
                    const mIdx = monthKeys.indexOf(mStr);
                    if (mIdx !== -1) {
                      monthRealValues[mIdx] += (parseFloat(rec.tonase) || 0);
                    }
                  }
                });

                estRecords.forEach(rec => {
                  const isRegionAllowed = filters.regional === 'Semua Regional' ? allowedRegions.includes(rec.region) : rec.region === filters.regional;
                  if (isRegionAllowed && rec.tanggal) {
                    const mStr = rec.tanggal.substring(0, 7);
                    const mIdx = monthKeys.indexOf(mStr);
                    if (mIdx !== -1) {
                      const estPanen = parseFloat(rec.estimasi_panen_kg) || parseFloat(rec.estimasi_kirim_kg) || 0;
                      monthEstValues[mIdx] += (estPanen / 1000);
                    }
                  }
                });

                setChartData({ labels: monthLabels, realisasi: monthRealValues, estimasi: monthEstValues });
              }
            }
          } catch (err) {
            console.error("Error fetching data:", err);
          } finally {
            if (active) setLoading(false);
          }
        };

        fetchData();
        return () => { active = false; };
      }, [activeTab, filters.tanggal, filters.tanggal_akhir, filters.cro, filters.regional, regionalDetails]);

      // Initialize/Render Chart
      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); }

        const isDark = document.documentElement.getAttribute("data-theme") === "dark";

        if (activeTab === 'harian') {
          // Render Area Line Graph
          const ctx = canvasRef.current.getContext("2d");

          const gradientReal = ctx.createLinearGradient(0, 0, 0, 240);
          gradientReal.addColorStop(0, isDark ? 'rgba(16, 185, 129, 0.4)' : 'rgba(16, 185, 129, 0.25)');
          gradientReal.addColorStop(1, 'rgba(16, 185, 129, 0.0)');

          const gradientEst = ctx.createLinearGradient(0, 0, 0, 240);
          gradientEst.addColorStop(0, isDark ? 'rgba(239, 68, 68, 0.25)' : 'rgba(239, 68, 68, 0.15)');
          gradientEst.addColorStop(1, 'rgba(239, 68, 68, 0.0)');

          const customLineLabels = {
            id: 'customLineLabels',
            afterDatasetsDraw: (chart) => {
              const ctx = chart.ctx;
              chart.data.datasets.forEach((dataset, datasetIndex) => {
                const meta = chart.getDatasetMeta(datasetIndex);
                meta.data.forEach((element, index) => {
                  const data = dataset.data[index];
                  // Avoid label clutter on 31 points by only drawing every 3rd label
                  if (data > 0 && index % 3 === 0) {
                    ctx.save();
                    ctx.fillStyle = datasetIndex === 0
                      ? (isDark ? '#4ade80' : '#16a34a')
                      : (isDark ? '#f87171' : '#dc2626');
                    ctx.font = 'bold 9px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    const txt = data.toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
                    ctx.fillText(txt, element.x, element.y - 6);
                    ctx.restore();
                  }
                });
              });
            }
          };

          chartRef.current = new Chart(canvasRef.current, {
            type: 'line',
            data: {
              labels: chartData.labels,
              datasets: [
                {
                  label: 'Realisasi Panen (Ton)',
                  data: chartData.realisasi,
                  borderColor: '#10b981',
                  backgroundColor: gradientReal,
                  fill: true,
                  tension: 0.4,
                  borderWidth: 2.5,
                  pointRadius: 3.5,
                  pointHoverRadius: 5.5,
                  pointBackgroundColor: '#ffffff',
                  pointBorderColor: '#10b981',
                  pointBorderWidth: 2
                },
                {
                  label: 'Estimasi Panen (Ton)',
                  data: chartData.estimasi,
                  borderColor: '#ef4444',
                  backgroundColor: gradientEst,
                  fill: true,
                  borderDash: [5, 5],
                  tension: 0.4,
                  borderWidth: 1.5,
                  pointRadius: 0,
                  pointHoverRadius: 0
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: {
                mode: 'index',
                intersect: false,
              },
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#1e293b',
                  titleColor: '#94a3b8',
                  bodyColor: '#f1f5f9',
                  padding: 10,
                  cornerRadius: 6,
                  callbacks: {
                    label: (context) => {
                      let label = context.dataset.label || '';
                      const val = context.parsed.y;
                      if (label) {
                        label += ': ';
                      }
                      label += val.toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' Ton';
                      return label;
                    }
                  }
                }
              },
              scales: {
                x: {
                  grid: { display: false },
                  ticks: {
                    color: '#94a3b8',
                    font: { size: 9, weight: 'bold' }
                  }
                },
                y: {
                  grid: { color: isDark ? 'rgba(255, 255, 255, 0.08)' : '#f1f5f9' },
                  ticks: {
                    color: '#94a3b8',
                    font: { size: 9, weight: 'bold' },
                    callback: (v) => v.toLocaleString('id-ID', { minimumFractionDigits: 0 })
                  },
                  border: { dash: [4, 4] }
                }
              }
            },
            plugins: [customLineLabels]
          });
        } else {
          // Render Bar Chart (Mingguan / Bulanan)
          const chartDataLabelsPlugin = {
            id: 'chartDataLabels',
            afterDatasetsDraw: (chart) => {
              const ctx = chart.ctx;
              chart.data.datasets.forEach((dataset, datasetIndex) => {
                const meta = chart.getDatasetMeta(datasetIndex);
                meta.data.forEach((bar, index) => {
                  const val = dataset.data[index];
                  if (val === 0 || val == null) return;

                  ctx.save();
                  ctx.font = "bold 9px Calibri";
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'bottom';
                  ctx.fillStyle = datasetIndex === 0
                    ? (isDark ? '#60a5fa' : '#1e3a8a')
                    : (isDark ? '#4ade80' : '#16a34a');

                  const valText = val.toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
                  ctx.fillText(valText, bar.x, bar.y - 3);
                  ctx.restore();
                });
              });
            }
          };

          chartRef.current = new Chart(canvasRef.current, {
            type: 'bar',
            data: {
              labels: chartData.labels,
              datasets: [
                {
                  label: 'Estimasi Panen',
                  data: chartData.estimasi,
                  backgroundColor: 'rgba(37,99,235,0.15)',
                  borderColor: '#2563eb',
                  borderWidth: 2,
                  borderRadius: 5,
                  borderSkipped: false
                },
                {
                  label: 'Realisasi Panen',
                  data: chartData.realisasi,
                  backgroundColor: 'rgba(22,163,74,0.75)',
                  borderColor: '#16a34a',
                  borderWidth: 1,
                  borderRadius: 5,
                  borderSkipped: false
                },
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: { mode: 'index', intersect: false },
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#1e293b',
                  titleColor: '#94a3b8',
                  bodyColor: '#f1f5f9',
                  padding: 12,
                  cornerRadius: 8,
                  callbacks: {
                    label: ctx => ` ${ctx.dataset.label}: ${Number(ctx.parsed.y).toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 2 })} ton`
                  }
                }
              },
              scales: {
                x: {
                  grid: { display: false },
                  ticks: { color: '#94a3b8', font: { size: 10, weight: 'bold' } }
                },
                y: {
                  grid: { color: isDark ? 'rgba(255, 255, 255, 0.08)' : '#f1f5f9' },
                  ticks: {
                    color: '#94a3b8',
                    font: { size: 10, weight: 'bold' },
                    callback: v => v.toLocaleString('id-ID', { minimumFractionDigits: 0 })
                  },
                  border: { dash: [4, 4] }
                }
              }
            },
            plugins: [chartDataLabelsPlugin]
          });
        }

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [chartData, theme, activeTab]);

      const labelScope = filters.regional !== 'Semua Regional' ? filters.regional
        : filters.cro !== 'Semua CRO' ? filters.cro.split('—')[0].trim() : 'Nasional';

      return (
        <section className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 dashboard-card">
          <div className="flex flex-col md:flex-row md:items-start justify-between gap-3 mb-4">
            <div>
              <h2 className="text-[14px] font-bold text-slate-800">
                {activeTab === 'harian' ? `Realisasi vs Estimasi Panen — ${labelScope}` :
                  activeTab === 'mingguan' ? `Akumulasi Mingguan Realisasi vs Estimasi — ${labelScope}` :
                    `Akumulasi Bulanan Realisasi vs Estimasi — ${labelScope}`}
              </h2>
              <p className="text-[12px] text-slate-400 mt-0.5">
                {activeTab === 'harian'
                  ? `Perbandingan pencapaian vs target ${filters.tanggal !== 'Semua Tanggal' ? ' — ' + formatIndoDate(filters.tanggal) : ' harian hari ini'}`
                  : activeTab === 'mingguan'
                    ? `Pencapaian mingguan s.d. ${filters.tanggal_akhir !== filters.tanggal ? formatIndoDate(filters.tanggal_akhir) : formatIndoDate(filters.tanggal)}`
                    : `Pencapaian bulan s.d. ${filters.tanggal_akhir !== filters.tanggal ? formatIndoDate(filters.tanggal_akhir) : formatIndoDate(filters.tanggal)}`}
              </p>
            </div>

            <div className="flex flex-wrap items-center gap-4 flex-shrink-0">
              {/* Custom Legend (Line style for harian, Bar style for others) */}
              {activeTab === 'harian' ? (
                <div className="flex items-center space-x-4">
                  <div className="flex items-center text-[11px] font-semibold text-slate-600 dark:text-slate-300">

    function formatIndoDate(dateStr) {
      if (!dateStr || dateStr === 'Semua Tanggal') return 'Semua Tanggal';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
      const d = parseInt(parts[2], 10);
      const m = months[parseInt(parts[1], 10) - 1];
      const y = parts[0];
      return `${d} ${m} ${y}`;
    }

    const computeRegionalDetails = (realisasiRecords, estimasiData) => {
      return ALL_REGIONS.map(region => {
        const meta = REGION_METADATA[region] || { shortLabel: region, color: '#cccccc' };
        const regionRealisasi = (realisasiRecords || [])
          .filter(r => r.region === region)
          .reduce((sum, r) => sum + (parseFloat(r.tonase) || 0), 0);
        const estRow = (estimasiData || {})[region];
        const regionEstimasi = estRow ? (parseFloat(estRow.estPanen) || 0) / 1000 : 0;
        const regionRestan = estRow ? (parseFloat(estRow.estRestan) || 0) / 1000 : 0;
        return {
          region,
          shortLabel: meta.shortLabel,
          color: meta.color,
          estimasi: regionEstimasi,
          realisasi: regionRealisasi,
          restan: regionRestan,
          tonase: regionRealisasi

    };

    const REGION_ALIASES = {
      'sumut 1': 'Sumatera Utara 1',
      'sumut 2': 'Sumatera Utara 2 Ex Torganda',
      'sumut 2 ex torganda': 'Sumatera Utara 2 Ex Torganda',
      'kalbar 1a': 'Kalimantan Barat 1A', 'kalbar 1b': 'Kalimantan Barat 1B', 'kalbar 1': 'Kalimantan Barat 1A',
      'kalbar 1 ex duta palma': 'Kalimantan Barat 1A',
      'kalbar 2': 'Kalimantan Barat 2',
      'kalsel 1': 'Kalimantan Selatan 1',
      'kalsel 2': 'Kalimantan Selatan 2',
      'kalteng 1': 'Kalimantan Tengah 1',
      'kalteng 2': 'Kalimantan Tengah 2',
      'kalteng 3': 'Kalimantan Tengah 3',
      'sulteng': 'Sulawesi Tengah',
      'sultra': 'Sulawesi Tenggara',
      'babel': 'Bangka Belitung',
      'robabel': 'Bangka Belitung',
      'ro babel': 'Bangka Belitung',
      'sumbar': 'Sumatera Barat',
      'sumsel': 'Sumatera Selatan',
      'kalut': 'Kalimantan Utara',
      'kaltara': 'Kalimantan Utara',
      'kaltim': 'Kalimantan Timur',
      'riau 1 ex duta palma': 'Riau 1',
      'torganda 2 riau 4': 'Riau 4'
    };

    function findRegionMatch(rawName) {
      if (!rawName) return null;
      const cleanRaw = rawName.toString().toLowerCase().replace(/[^a-z0-9]/g, '').trim();
      for (const [alias, official] of Object.entries(REGION_ALIASES)) {
        const cleanAlias = alias.replace(/[^a-z0-9]/g, '');
        if (cleanRaw === cleanAlias) return official;
      }
      for (const official of ALL_REGIONS) {
        const cleanOfficial = official.toLowerCase().replace(/[^a-z0-9]/g, '').trim();
        const cleanOfficialNoTorganda = official.toLowerCase().replace(/\bex torganda\b/g, '').replace(/[^a-z0-9]/g, '').trim();
        if (cleanRaw === cleanOfficial ||
          cleanRaw === cleanOfficialNoTorganda ||
          cleanRaw.includes(cleanOfficialNoTorganda) ||
          cleanOfficialNoTorganda.includes(cleanRaw)) {
          return official;
        }
      }
      return null;
    }

    // ============================================================
    // VALIDATION PANEL COMPONENT
    // ============================================================
    function ValidationPanel({ realisasiRecords, regionalDetails, filters, setFilters }) {
      const [excelData, setExcelData] = useState(null);
      const [excelDate, setExcelDate] = useState("");
      const [dbPalmopsData, setDbPalmopsData] = useState(null);
      const [fileName, setFileName] = useState("");
      const [showOnlyMismatch, setShowOnlyMismatch] = useState(false);
      const [dragActive, setDragActive] = useState(false);
      const [dbLoading, setDbLoading] = useState(false);
      const [saving, setSaving] = useState(false);
      const fileInputRef = useRef(null);

      // Fetch saved PalmOps data from DB on date range change
      useEffect(() => {
        let active = true;
        const fetchDataForRange = async () => {
          setDbLoading(true);
          try {
            const isRange = filters.tanggal !== filters.tanggal_akhir;
            const palmopsUrl = `/api/palmops?action=get&tanggal=${filters.tanggal}${isRange ? `&tanggal_akhir=${filters.tanggal_akhir}` : ''}&_t=${Date.now()}`;

            const palmopsRes = await fetch(palmopsUrl);
            const palmopsJson = await palmopsRes.json();

            if (active) {
              if (palmopsJson.success && palmopsJson.data && Object.keys(palmopsJson.data).length > 0) {
                setDbPalmopsData(palmopsJson.data);
              } else {
                setDbPalmopsData(null);
              }
            }
          } catch (e) {
            console.error(e);
            if (active) {
              setDbPalmopsData(null);
            }
          } finally {
            if (active) setDbLoading(false);
          }
        };
        fetchDataForRange();
        return () => { active = false; };
      }, [filters.tanggal, filters.tanggal_akhir]);

      const handleFile = (file) => {
        if (!file) return;
        setFileName(file.name);
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];

            // ── BACA SELURUH SHEET KE ARRAY 2D ──
            // blankrows: true memastikan baris kosong tidak dibuang, 
            // sehingga index array tetap sejajar dengan nomor baris Excel (index 0 = Baris 1).
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '', blankrows: true });

            // Helper untuk membaca cell dari array 2D dengan koordinat A1, B2, dst.
            // col berupa huruf (A-Z), row berupa angka 1-indexed.
            const getCellValue = (col, row) => {
              const colIdx = col.toUpperCase().charCodeAt(0) - 65; // A=0, B=1, ...
              const rowIdx = row - 1; // 1-indexed ke 0-indexed
              if (rows[rowIdx] && rows[rowIdx][colIdx] !== undefined && rows[rowIdx][colIdx] !== '') {
                return rows[rowIdx][colIdx];
              }
              return null;
            };

            // ── Deteksi header LHP (A1)
            const a1Val = getCellValue('A', 1);
            const isLHP = a1Val && a1Val.toString().includes("LAPORAN PRODUKSI HARIAN");

            // ── Ekstrak tanggal dari A2 (Periode: Tanggal DD/MM/YYYY)
            let parsedDateStr = "";
            const a2Val = getCellValue('A', 2);
            if (a2Val) {
              const a2Str = a2Val.toString();
              // Regex lebih fleksibel: mendukung DD/MM/YYYY, D/M/YYYY, atau pakai strip (-)
              const match = a2Str.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
              if (match) {
                const dd = match[1].padStart(2, '0');
                const mm = match[2].padStart(2, '0');
                const yyyy = match[3];
                parsedDateStr = `${yyyy}-${mm}-${dd}`;
              }
            }
            setExcelDate(parsedDateStr);

            const parsedTotals = {};

            if (isLHP) {
              // ── PEMBACAAN DINAMIS KHUSUS LHP ──
              // Karena baris subtotal di LHP hasil export seringkali kosong datanya,
              // kita loop semua baris data kebun (dimulai setelah baris header)
              // Kolom B (index 1) = Regional, Kolom L (index 11) = Kg Panen, Kolom G (index 6) = Kg Kirim
              for (let r = 5; r < rows.length; r++) {
                const row = rows[r];
                if (!row || !Array.isArray(row)) continue;

                const rawReg = row[1]; // Kolom B
                let rawValPanen = row[11]; // Kolom L (Panen)
                let rawValKirim = row[6]; // Kolom G (Kirim)

                if (!rawReg) continue;

                const matched = findRegionMatch(rawReg);
                if (matched) {
                  if (!parsedTotals[matched]) parsedTotals[matched] = { panen: 0, kirim: 0 };

                  // Proses Panen (Kolom L)
                  if (typeof rawValPanen === 'string') {
                    rawValPanen = rawValPanen.replace(/[^\d.,]/g, '').replace(/,/g, '');
                  }
                  const numPanen = rawValPanen !== null && rawValPanen !== undefined && rawValPanen !== '' ? parseFloat(rawValPanen) : 0;
                  if (!isNaN(numPanen)) parsedTotals[matched].panen += numPanen;

                  // Proses Kirim (Kolom G)
                  if (typeof rawValKirim === 'string') {
                    rawValKirim = rawValKirim.replace(/[^\d.,]/g, '').replace(/,/g, '');
                  }
                  const numKirim = rawValKirim !== null && rawValKirim !== undefined && rawValKirim !== '' ? parseFloat(rawValKirim) : 0;
                  if (!isNaN(numKirim)) parsedTotals[matched].kirim += numKirim;
                }
              }

              // Nilai LHP dalam Kg → bagi 1000 → Ton
              for (const reg in parsedTotals) {
                parsedTotals[reg].panen = Math.round((parsedTotals[reg].panen / 1000) * 100) / 100;
                parsedTotals[reg].kirim = Math.round((parsedTotals[reg].kirim / 1000) * 100) / 100;
              }

            } else {
              // ── FALLBACK: deteksi dinamis untuk file Excel non-LHP
              // (Menggunakan array rows yang sudah di-generate di atas)

              let regionColIdx = -1;
              let tonaseColIdx = -1;
              let startRowIdx = 0;

              for (let r = 0; r < Math.min(rows.length, 20); r++) {
                const row = rows[r];
                if (!row || !Array.isArray(row)) continue;
                for (let c = 0; c < row.length; c++) {
                  const val = (row[c] || '').toString().toLowerCase().trim();
                  if (val === 'regional' || val === 'nama regional' || val === 'wilayah') {
                    regionColIdx = c;
                  }
                  if (val.includes('realisasi') || val.includes('tonase') || val.includes('produksi')) {
                    if (tonaseColIdx === -1) tonaseColIdx = c;
                  }
                }
                if (regionColIdx !== -1 && tonaseColIdx !== -1) {
                  startRowIdx = r + 1;
                  break;
                }
              }

              // Fallback 2: cari baris pertama yang isinya nama regional
              if (regionColIdx === -1) {
                for (let r = 0; r < rows.length; r++) {
                  const row = rows[r];
                  if (!row) continue;
                  for (let c = 0; c < row.length; c++) {
                    if (row[c] && findRegionMatch(row[c])) {
                      regionColIdx = c;
                      for (let nc = c + 1; nc < row.length; nc++) {
                        if (typeof row[nc] === 'number' || (row[nc] && !isNaN(parseFloat(row[nc])))) {
                          tonaseColIdx = nc;
                          startRowIdx = r;
                          break;
                        }
                      }
                      break;
                    }
                  }
                  if (regionColIdx !== -1 && tonaseColIdx !== -1) break;
                }
              }

              if (regionColIdx === -1 || tonaseColIdx === -1) {
                alert("Gagal mendeteksi kolom Regional atau Tonase dalam file Excel. Pastikan format sesuai template LHP PalmOps.");
                return;
              }

              for (let r = startRowIdx; r < rows.length; r++) {
                const row = rows[r];
                if (!row) continue;
                const rawReg = row[regionColIdx];
                let tonVal = row[tonaseColIdx];
                if (!rawReg) continue;

                const firstCell = (row[0] || '').toString().toLowerCase();
                if (firstCell.startsWith('subtotal') || firstCell.startsWith('total')) continue;

                const matched = findRegionMatch(rawReg);
                if (matched) {
                  if (typeof tonVal === 'string') {
                    tonVal = tonVal.replace(/[^\d.,]/g, '').replace(/,/g, '');
                  }
                  const numVal = tonVal !== null && tonVal !== undefined && tonVal !== '' ? parseFloat(tonVal) : 0;
                  if (!isNaN(numVal)) {
                    if (!parsedTotals[matched]) parsedTotals[matched] = { panen: 0, kirim: 0 };
                    parsedTotals[matched].panen += numVal;
                    parsedTotals[matched].kirim += numVal; // Fallback untuk non-LHP: kirim = panen
                  }
                }
              }

              // Auto-konversi Kg → Ton jika nilai besar
              const vals = Object.values(parsedTotals);
              const isKg = vals.some(v => v.panen > 5000 || v.kirim > 5000) || vals.reduce((s, v) => s + v.panen, 0) > 10000;
              if (isKg) {
                for (const reg in parsedTotals) {
                  parsedTotals[reg].panen = Math.round((parsedTotals[reg].panen / 1000) * 100) / 100;
                  parsedTotals[reg].kirim = Math.round((parsedTotals[reg].kirim / 1000) * 100) / 100;
                }
              }
            }

            // Validasi ringan — pastikan ada minimal 1 regional yang terdeteksi
            // (tidak blokir jika ada regional yang kebetulan 0 pada hari tersebut)
            const regionCount = Object.keys(parsedTotals).length;
            if (regionCount === 0) {
              alert("Tidak ada regional yang terdeteksi dari file Excel ini. Pastikan file yang diunggah adalah Export LHP PalmOps yang valid.");
              return;
            }

            setExcelData(parsedTotals);
          } catch (err) {
            console.error(err);
            alert("Terjadi kesalahan saat membaca file Excel: " + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFile(e.dataTransfer.files[0]);
        }
      };

      const onButtonClick = () => {
        fileInputRef.current.click();
      };

      const handleInputChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          handleFile(e.target.files[0]);
          // Reset value supaya file yang SAMA bisa dipilih ulang
          // (tanpa ini, onChange tidak trigger jika filename identik)
          e.target.value = '';
        }
      };

      const handleSaveToDb = async () => {
        const dataToSave = excelData;
        if (!dataToSave) return;

        setSaving(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";

          const records = Object.keys(dataToSave).map(region => ({
            region,
            panen: dataToSave[region].panen,
            kirim: dataToSave[region].kirim,
            tonase: dataToSave[region].panen // Legacy support
          }));

          const res = await fetch('/api/palmops', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'save',
              tanggal: filters.tanggal,
              token,
              records
            })
          });

          const json = await res.json();
          if (json.success) {
            alert(json.message);
            setDbPalmopsData(dataToSave);
            setExcelData(null);
            setExcelDate("");
            setFileName("");
            // Reset file input agar file yang sama bisa diupload ulang
            if (fileInputRef.current) fileInputRef.current.value = '';
          } else {
            alert(json.message);
          }
        } catch (e) {
          console.error(e);
          alert("Gagal menyimpan ke database: " + e.message);
        } finally {
          setSaving(false);
        }
      };

      const handleDeleteFromDb = async () => {
        const confirmed = await window.showConfirm("Konfirmasi Hapus", "Apakah Anda yakin ingin menghapus data PalmOps tanggal ini dari database?");
        if (!confirmed) return;

        setSaving(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";

          const res = await fetch('/api/palmops', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'delete',
              tanggal: filters.tanggal,
              token
            })
          });

          const json = await res.json();
          if (json.success) {
            alert(json.message);
            setDbPalmopsData(null);
            setExcelData(null);
            setExcelDate("");
            setFileName("");
            // Reset file input agar file yang sama LANGSUNG bisa diupload kembali
            if (fileInputRef.current) fileInputRef.current.value = '';
          } else {
            alert(json.message);
          }
        } catch (e) {
          console.error(e);
          alert("Gagal menghapus dari database: " + e.message);
        } finally {
          setSaving(false);
        }
      };

      const activePalmopsSource = excelData || dbPalmopsData;
      const isFromDb = !excelData && !!dbPalmopsData;

      const activeRealisasi = realisasiRecords || [];

      const comparisonList = ALL_REGIONS.map(region => {
        const agripamTotal = activeRealisasi
          .filter(r => r.region === region)
          .reduce((sum, r) => sum + (parseFloat(r.tonase) || 0), 0);

        const palmopsTotal = activePalmopsSource
          ? (typeof activePalmopsSource[region] === 'object'
            ? (activePalmopsSource[region]?.panen || 0)
            : (parseFloat(activePalmopsSource[region]) || 0))
          : null;
        const hasExcelVal = palmopsTotal !== null;

        let selisih = null;
        let status = 'NO_DATA';

        if (hasExcelVal) {
          selisih = agripamTotal - palmopsTotal;
          if (palmopsTotal === 0) {
            status = agripamTotal === 0 ? 'MATCH' : 'MISMATCH';
          } else {
            const pctDiff = Math.abs(selisih / palmopsTotal);
            status = pctDiff > 0.05 ? 'MISMATCH' : 'MATCH';
          }
        }

        return {
          region,
          agripam: Math.round(agripamTotal * 100) / 100,
          palmops: hasExcelVal ? Math.round(palmopsTotal * 100) / 100 : 0,
          selisih: hasExcelVal ? Math.round(selisih * 100) / 100 : 0,
          status,
          hasExcelVal
        };
      });

      const totalAgripam = comparisonList.reduce((sum, r) => sum + r.agripam, 0);
      const totalPalmops = activePalmopsSource ? comparisonList.reduce((sum, r) => sum + r.palmops, 0) : 0;
      const totalSelisih = activePalmopsSource ? (totalAgripam - totalPalmops) : 0;

      const filteredList = showOnlyMismatch
        ? comparisonList.filter(r => r.status === 'MISMATCH')
        : comparisonList;

      const totalMismatch = comparisonList.filter(r => r.status === 'MISMATCH').length;
      const matchCount = comparisonList.filter(r => r.status === 'MATCH').length;

      const overallStatus = !activePalmopsSource ? 'AWAITING_UPLOAD'
        : totalMismatch === 0 ? 'ALL_MATCH'
          : 'MISMATCH_FOUND';

      const handleExportToExcel = () => {
        if (!comparisonList || comparisonList.length === 0) {
          alert("Tidak ada data untuk diexport.");
          return;
        }

        // Prepare the data for Excel sheet
        const excelRows = comparisonList.map((row, idx) => {
          let statusText = "Belum Ada Data";
          if (row.status === 'MATCH') statusText = "Sesuai";
          else if (row.status === 'MISMATCH') statusText = "Selisih";

          let pct = "-";
          if (activePalmopsSource && row.palmops > 0) {
            pct = ((row.selisih / row.palmops) * 100).toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";
          }

          return {
            "No": idx + 1,
            "Nama Regional": row.region,
            "Realisasi AGRI-PAM (Ton)": row.agripam,
            "Realisasi PalmOps (Ton)": activePalmopsSource ? row.palmops : "-",
            "Selisih (Ton)": activePalmopsSource ? row.selisih : "-",
            "Persentase": pct,
            "Status": statusText
          };
        });

        let totalPct = "-";
        if (activePalmopsSource && totalPalmops > 0) {
          totalPct = ((totalSelisih / totalPalmops) * 100).toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";
        }

        // Add a total row
        excelRows.push({
          "No": "",
          "Nama Regional": "Total Nasional",
          "Realisasi AGRI-PAM (Ton)": Math.round(totalAgripam * 100) / 100,
          "Realisasi PalmOps (Ton)": activePalmopsSource ? Math.round(totalPalmops * 100) / 100 : "-",
          "Selisih (Ton)": activePalmopsSource ? Math.round(totalSelisih * 100) / 100 : "-",
          "Persentase": totalPct,
          "Status": (totalPalmops > 0 && Math.abs(totalSelisih / totalPalmops) <= 0.05) || (totalPalmops === 0 && totalAgripam === 0) ? "Pas" : "Selisih"
        });

        // Create workbook and worksheet
        const worksheet = XLSX.utils.json_to_sheet(excelRows);

        // Inject custom styling for Calibri 12
        if (worksheet['!ref']) {
          const range = XLSX.utils.decode_range(worksheet['!ref']);
          for (let R = range.s.r; R <= range.e.r; ++R) {
            for (let C = range.s.c; C <= range.e.c; ++C) {
              const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
              if (!worksheet[cellAddress]) continue;
              worksheet[cellAddress].s = { font: { name: "Calibri", sz: 12 } };
            }
          }
        }

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Perbandingan Regional");

        // Adjust column widths automatically
        const maxLen = (val) => (val ? val.toString().length : 10);
        const colWidths = Object.keys(excelRows[0]).map(key => {
          let max = key.length;
          excelRows.forEach(row => {
            const valLen = maxLen(row[key]);
            if (valLen > max) max = valLen;
          });
          return { wch: max + 2 };
        });
        worksheet['!cols'] = colWidths;

        // Generate Excel file and download
        const filename = filters.tanggal === filters.tanggal_akhir
          ? `Rincian_Perbandingan_Regional_${filters.tanggal}.xlsx`
          : `Rincian_Perbandingan_Regional_${filters.tanggal}_to_${filters.tanggal_akhir}.xlsx`;
        XLSX.writeFile(workbook, filename);
      };

      return (
        <div className="space-y-5 animate-fadeIn">
          {/* Header Card */}
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-3 bg-white dark:bg-slate-800 p-4 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm">
            <div>
              <h2 className="text-lg font-bold text-slate-800 dark:text-white">Validasi Data Produksi Harian</h2>
              <p className="text-xs text-slate-450 dark:text-slate-400">Membandingkan realisasi database AGRI-PAM vs Excel LHP PalmOps</p>
            </div>

            <div className="flex flex-wrap items-center gap-2">
              {/* Date Mode Dropdown */}
              <div className="flex items-center gap-2 bg-brand-50 dark:bg-brand-950/40 border border-brand-200 dark:border-brand-900 rounded-lg px-3 py-1.5 w-fit">
                <Icon name="calendar" size={14} className="text-brand-600 dark:text-brand-400" />
                <select
                  value={filters.dateMode}
                  onChange={(e) => setFilters(prev => ({ ...prev, dateMode: e.target.value }))}
                  className="bg-transparent border-none text-[12px] font-bold text-brand-800 dark:text-brand-200 outline-none p-0 focus:ring-0 cursor-pointer pr-1"
                >
                  <option value="TUNGGAL">Tanggal Tunggal</option>
                  <option value="SD_HARI_INI">s.d. Hari Ini (Bulan Berjalan)</option>
                  <option value="SD_BULAN_INI">s.d. Bulan Ini (Tahun Berjalan)</option>
                  <option value="KUSTOM">Rentang Kustom</option>
                </select>

                {filters.dateMode === "TUNGGAL" && (
                  <div className="flex items-center gap-1 text-[12px] font-bold text-brand-850 dark:text-brand-200 border-l border-brand-200 dark:border-brand-700 pl-2 ml-1">
                    <span>Tanggal:</span>
                    <input
                      type="date"
                      value={filters.tanggal}
                      onChange={(e) => {
                        if (e.target.value) {
                          setFilters(prev => ({ ...prev, tanggal: e.target.value, _referenceDate: e.target.value }));
                          setExcelData(null);
                          setExcelDate("");
                          setFileName("");
                        }
                      }}
                      className="bg-transparent border-none text-[12px] font-bold text-brand-800 dark:text-brand-200 outline-none p-0 focus:ring-0 cursor-pointer"
                      style={{ colorScheme: 'light' }}
                    />
                  </div>
                )}

                {filters.dateMode === "KUSTOM" && (
                  <div className="flex items-center gap-1 text-[12px] font-bold text-brand-850 dark:text-brand-200 border-l border-brand-200 dark:border-brand-700 pl-2 ml-1">
                    <span>Dari:</span>
                    <input
                      type="date"
                      value={filters.tanggal}
                      onChange={(e) => {
                        if (e.target.value) {
                          setFilters(prev => ({ ...prev, tanggal: e.target.value }));
                          setExcelData(null);
                          setExcelDate("");
                          setFileName("");
                        }
                      }}
                      className="bg-transparent border-none text-[12px] font-bold text-brand-800 dark:text-brand-200 outline-none p-0 focus:ring-0 cursor-pointer"
                      style={{ colorScheme: 'light' }}
                    />
                    <span className="mx-1">s.d.</span>
                    <input
                      type="date"
                      value={filters.tanggal_akhir}
                      onChange={(e) => {
                        if (e.target.value) {
                          setFilters(prev => ({ ...prev, tanggal_akhir: e.target.value }));
                          setExcelData(null);
                          setExcelDate("");
                          setFileName("");
                        }
                      }}
                      className="bg-transparent border-none text-[12px] font-bold text-brand-800 dark:text-brand-200 outline-none p-0 focus:ring-0 cursor-pointer"
                      style={{ colorScheme: 'light' }}
                    />
                  </div>
                )}
              </div>

              {/* Export to Excel Button */}
              <button
                onClick={handleExportToExcel}
                className="bg-green-600 hover:bg-green-700 text-white text-[12px] font-semibold px-4 py-2 rounded-lg shadow transition-colors flex items-center gap-1.5"
                title="Ekspor Perbandingan ke Excel"
              >
                <Icon name="file-spreadsheet" size={13} />
                Ekspor Excel
              </button>
            </div>
          </div>

          {/* Upload / Source Status Area */}
          {dbLoading ? (
            <div className="border border-slate-200 dark:border-slate-700 rounded-xl p-8 bg-white dark:bg-slate-800 text-center shadow-sm">
              <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-600 mx-auto"></div>
              <p className="text-[12px] text-slate-500 mt-2">Memeriksa database...</p>
            </div>
          ) : (filters.tanggal !== filters.tanggal_akhir) ? (
            <div className="border border-slate-200 dark:border-slate-700 rounded-xl p-6 bg-white dark:bg-slate-800 shadow-sm text-center">
              <div className="w-12 h-12 rounded-full bg-brand-50 dark:bg-brand-950/50 flex items-center justify-center text-brand-600 dark:text-brand-400 shadow-sm border border-brand-100 dark:border-brand-900 mx-auto mb-3">
                <Icon name="info" size={22} />
              </div>
              <h3 className="text-sm font-bold text-slate-800 dark:text-white">Mode Rentang Tanggal Aktif</h3>
              <p className="text-[11px] text-slate-400 mt-1 max-w-md mx-auto">
                Unggah dan simpan file Excel PalmOps dinonaktifkan dalam mode rentang tanggal. Anda sedang mengevaluasi akumulasi data regional dari database untuk rentang <b>{formatIndoDate(filters.tanggal)}</b> s.d. <b>{formatIndoDate(filters.tanggal_akhir)}</b>.
              </p>
            </div>
          ) : isFromDb ? (
            <div className="border border-slate-200 dark:border-slate-700 rounded-xl p-6 bg-white dark:bg-slate-800 shadow-sm">
              <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full bg-green-50 dark:bg-green-950/50 flex items-center justify-center text-green-600 dark:text-green-400 border border-green-200 dark:border-green-900">
                    <Icon name="database" size={20} />
                  </div>
                  <div>
                    <h3 className="text-sm font-bold text-slate-800 dark:text-white">Data PalmOps Terpenuhi dari Database</h3>
                    <p className="text-[11px] text-slate-400 mt-0.5">Menampilkan perbandingan data yang sudah tersimpan di database.</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <button
                    onClick={onButtonClick}
                    className="bg-brand-600 hover:bg-brand-700 text-white text-[12px] font-semibold px-4 py-2 rounded-lg shadow transition-colors flex items-center gap-1.5"
                  >
                    <Icon name="refresh-cw" size={13} />
                    Perbarui dengan Excel
                  </button>
                  <button
                    onClick={handleDeleteFromDb}
