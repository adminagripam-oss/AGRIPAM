                  >
                    <Icon name="trash-2" size={13} />
                    {saving ? "Menghapus..." : "Hapus Data Database"}
                  </button>
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept=".xlsx, .xls"
                    onChange={handleInputChange}
                    className="hidden"
                  />
                </div>
              </div>
            </div>
          ) : (
            <div
              onDragEnter={handleDrag}
              onDragOver={handleDrag}
              onDragLeave={handleDrag}
              onDrop={handleDrop}
              className={`border-2 border-dashed rounded-xl p-8 text-center bg-white dark:bg-slate-800 transition-all shadow-sm relative ${dragActive ? 'border-brand-500 bg-brand-50/20' : 'border-slate-300 dark:border-slate-700 hover:border-brand-400'
                }`}
            >
              <input
                ref={fileInputRef}
                type="file"
                accept=".xlsx, .xls"
                onChange={handleInputChange}
                className="hidden"
              />

              <div className="flex flex-col items-center justify-center space-y-3">
                <div className="w-12 h-12 rounded-full bg-brand-50 dark:bg-brand-950/50 flex items-center justify-center text-brand-600 dark:text-brand-400 shadow-sm border border-brand-100 dark:border-brand-900">
                  <Icon name={excelData ? "file-check" : "file-up"} size={22} />
                </div>
                <div>
                  <p className="text-[14px] font-bold text-slate-700 dark:text-white">
                    {excelData ? `File aktif: ${fileName}` : "Tarik dan lepas file Excel LHP PalmOps di sini"}
                  </p>
                  <p className="text-[11px] text-slate-400 mt-1">Format file harus berupa Excel LHP (.xlsx / .xls) dari dashboard PalmOps</p>
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={onButtonClick}
                    className="bg-brand-600 hover:bg-brand-700 text-white text-[12px] font-semibold px-4 py-2 rounded-lg shadow transition-colors flex items-center gap-1.5"
                  >
                    <Icon name="folder-open" size={13} />
                    Pilih File Excel
                  </button>
                  {excelData && (
                    <>
                      <button
                        onClick={handleSaveToDb}
                        disabled={saving}
                        className="bg-green-600 hover:bg-green-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white text-[12px] font-semibold px-4 py-2 rounded-lg flex items-center gap-1.5 transition-colors"
                      >
                        <Icon name="save" size={13} />
                        {saving ? "Menyimpan..." : "Simpan ke Database"}
                      </button>
                      <button
                        onClick={() => { setExcelData(null); setExcelDate(""); setFileName(""); }}
                        className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-650 text-slate-700 dark:text-white text-[12px] font-semibold px-4 py-2 rounded-lg transition-colors"
                      >
                        Batal
                      </button>
                    </>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Date Mismatch Warning Banner */}
          {excelData && excelDate !== filters.tanggal && (
            <div className="bg-amber-50 dark:bg-amber-950/20 border border-amber-200 dark:border-amber-900 rounded-xl p-4 flex items-start gap-3 text-amber-800 dark:text-amber-300 animate-fadeIn">
              <Icon name="alert-triangle" size={18} className="flex-shrink-0 mt-0.5" />
              <div>
                <h4 className="text-[13px] font-bold">Peringatan: Perbedaan Tanggal Laporan!</h4>
                {excelDate ? (
                  <p className="text-[11px] mt-1">Tanggal laporan pada file Excel yang diunggah (<b>{formatIndoDate(excelDate)}</b>) berbeda dengan Tanggal Evaluasi aktif (<b>{formatIndoDate(filters.tanggal)}</b>).</p>
                ) : (
                  <p className="text-[11px] mt-1">Sistem tidak dapat membaca tanggal dari sel A2 pada file Excel yang diunggah. Pastikan Anda menyimpan ke Tanggal Evaluasi yang benar (<b>{formatIndoDate(filters.tanggal)}</b>).</p>
                )}
                <p className="text-[11px] mt-0.5">Pastikan Anda mengunggah file laporan yang sesuai atau ubah Tanggal Evaluasi di atas sebelum menyimpan data.</p>
              </div>
            </div>
          )}

          {activePalmopsSource && (
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm flex items-center gap-3.5">
                <div className="w-10 h-10 rounded-lg bg-green-50 dark:bg-green-950/30 flex items-center justify-center text-green-600 dark:text-green-400">
                  <Icon name="database" size={20} />

    // ============================================================
    // TARGET CHALLENGE MODAL COMPONENT
    // ============================================================
    function TargetChallengeModal({ isOpen, onClose }) {
      const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7)); // YYYY-MM
      const [targetData, setTargetData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      const fetchTarget = async () => {
        setLoading(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";
          const res = await fetch(`/api/targetChallenge?action=getTarget&bulan=${selectedMonth}&token=${token}&_t=${Date.now()}`);
          const json = await res.json();
          if (json.success && json.exists) {
            setTargetData(json.data);
          } else {
            setTargetData(null);
          }
        } catch (err) {
          console.error("Gagal fetch target:", err);
          setTargetData(null);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        if (isOpen) {
          fetchTarget();
        }
      }, [isOpen, selectedMonth]);

      const handleFile = (file) => {
        if (!file) return;
        setUploading(true);
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            const parsedData = {};
            for (let i = 1; i < rows.length; i++) {
              const row = rows[i];
              if (!row || !row[0]) continue;
              const regionName = row[0].toString().trim();
              if (regionName === "Total Target (Ton)" || regionName === "") continue;

              const dates = {};
              for (let d = 1; d <= 31; d++) {
                dates[d] = parseFloat(row[d]) || 0;
              }
              parsedData[regionName] = dates;
            }

            setTargetData(parsedData);
          } catch (err) {
            alert("Gagal memparsing file Excel: " + err.message);
          } finally {
            setUploading(false);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const saveToDb = async () => {
        if (!targetData) return;
        setUploading(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";
          const res = await fetch('/api/targetChallenge', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'saveTarget',
              bulan: selectedMonth,
              token: token,
              region: 'ADMIN',
              data: targetData
            })
          });
          const json = await res.json();
          if (json.success) {
            alert("Berhasil menyimpan target bulanan!");
            fetchTarget();
            onClose(); // Menutup otomatis setelah sukses
          } else {
            alert(json.message || "Gagal menyimpan.");
          }
        } catch (err) {
          alert("Error: " + err.message);
        } finally {
          setUploading(false);
        }
      };

      const deleteFromDb = async () => {
        if (!confirm(`Hapus data target untuk bulan ${selectedMonth}?`)) return;
        setUploading(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";
          const res = await fetch('/api/targetChallenge', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'deleteTarget',
              bulan: selectedMonth,
              token: token,
              region: 'ADMIN'
            })
          });
          const json = await res.json();
          if (json.success) {
            alert("Berhasil menghapus target bulanan!");
            setTargetData(null);
          } else {
            alert(json.message || "Gagal menghapus.");
          }
        } catch (err) {
          alert("Error: " + err.message);
        } finally {
          setUploading(false);
        }
      };

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4">
          <div className="bg-white dark:bg-slate-900 rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-fadeIn">
            {/* Header */}
            <div className="flex items-center justify-between p-5 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50">
              <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                <Icon name="target" size={20} className="text-brand-600" />
                Kelola Target Challenge Bulanan
              </h2>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                <Icon name="x" size={20} />
              </button>
            </div>

            {/* Content */}
            <div className="flex-1 overflow-auto p-6 flex flex-col gap-6">

              <div className="flex items-center gap-4">
                <div className="flex flex-col">
                  <label className="text-xs font-bold text-slate-500 uppercase mb-1">Bulan & Tahun</label>
                  <input type="month" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="border border-slate-300 dark:border-slate-700 rounded-lg p-2 text-sm font-medium focus:ring-2 focus:ring-brand-500 outline-none dark:bg-slate-800 dark:text-white" />
                </div>

                {targetData && (
                  <div className="flex gap-2 mt-5">
                    <button onClick={saveToDb} disabled={uploading} className="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 transition-colors disabled:opacity-50">
                      <Icon name="save" size={16} /> Simpan ke Database
                    </button>
                    <button onClick={deleteFromDb} disabled={uploading} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 transition-colors disabled:opacity-50">
                      <Icon name="trash-2" size={16} /> Hapus Data Bulan Ini
                    </button>
                  </div>
                )}
              </div>

              {!targetData && (
                <div
                  onClick={() => fileInputRef.current?.click()}
                  className="border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl p-10 text-center cursor-pointer hover:border-brand-500 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors"
                >
                  <input ref={fileInputRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={e => handleFile(e.target.files[0])} />
                  <div className="w-16 h-16 rounded-full bg-brand-50 dark:bg-brand-900/30 flex items-center justify-center text-brand-600 mx-auto mb-4">
                    <Icon name="upload-cloud" size={32} />
                  </div>
                  <h3 className="text-sm font-bold text-slate-700 dark:text-slate-200 mb-1">Unggah Excel Target Bulanan</h3>
                  <p className="text-xs text-slate-500">Pilih file berformat .xlsx yang berisi target harian per wilayah (Tgl 1 - Tgl 31)</p>
                </div>
              )}

              {loading ? (
                <div className="flex justify-center p-10"><div className="w-8 h-8 border-4 border-brand-200 border-t-brand-600 rounded-full animate-spin"></div></div>
              ) : targetData ? (
                <div className="flex flex-col gap-4">
                  <div className="overflow-x-auto border border-slate-200 dark:border-slate-700 rounded-lg">
                    <table className="w-full text-xs text-left">
                      <thead className="bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-300 uppercase">
                        <tr>
                          <th className="px-3 py-2 border-b dark:border-slate-700 whitespace-nowrap min-w-[120px]">Wilayah</th>
                          {Array.from({ length: 31 }, (_, i) => i + 1).map(d => (
                            <th key={d} className="px-2 py-2 border-b dark:border-slate-700 text-center">Tgl {d}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200 dark:divide-slate-700">
                        {Object.keys(targetData).map(region => (
                          <tr key={region} className="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                            <td className="px-3 py-2 font-medium">{region}</td>
                            {Array.from({ length: 31 }, (_, i) => i + 1).map(d => (
                              <td key={d} className="px-2 py-2 text-center text-slate-600 dark:text-slate-400">{targetData[region][d] || 0}</td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                      <tr className="bg-slate-100 dark:bg-slate-900 font-bold">
                        <td className="px-3 py-2">TOTAL</td>
                        {Array.from({ length: 31 }, (_, i) => i + 1).map(d => {
                          const sum = Object.values(targetData).reduce((acc, curr) => acc + (curr[d] || 0), 0);
                          return (
                            <td key={d} className="px-2 py-2 text-center text-slate-800 dark:text-slate-200">{sum}</td>
                          )
                        })}
                      </tr>
                    </table>
                  </div>
                  <div className="flex justify-end mt-2">
                    <button onClick={onClose} className="px-6 py-2.5 bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-800 dark:text-white rounded-lg text-sm font-semibold transition-colors">
                      Kembali / Tutup
                    </button>
                  </div>
                </div>
              ) : null}

            </div>
          </div>
        </div>
      );
    }

      { label: "Kalimantan Tengah 3", regionKey: "Kalimantan Tengah 3", excelKey: "Kalteng 3", luas: 30467.52, target: 100, type: "detail" },
      { label: "CRO VIII", type: "subtotal", children: ["Kalimantan Tengah 1", "Kalimantan Tengah 3"] },

      // CRO IX
      { label: "Kalimantan Tengah 2", regionKey: "Kalimantan Tengah 2", excelKey: "Kalteng 2", luas: 17408.64, target: 565, type: "detail" },
      { label: "CRO IX", type: "subtotal", children: ["Kalimantan Tengah 2"] },

      // CRO X
      { label: "Sulawesi Tenggara", regionKey: "Sulawesi Tenggara", excelKey: "Sultra", luas: 3231.46, target: 20, type: "detail" },
      { label: "Sulawesi Tengah", regionKey: "Sulawesi Tengah", excelKey: "Sulteng", luas: 2116.83, target: 15, type: "detail" },
      { label: "CRO X", type: "subtotal", children: ["Sulawesi Tenggara", "Sulawesi Tengah"] },

      // TOTAL
      { label: "Jumlah", type: "total" }
    ];

    function RencanaRealisasiPanel() {
      const [selectedDate, setSelectedDate] = useState(getTodayWIB());
      const [dbEstimasi, setDbEstimasi] = useState({});
      const [regionTotals, setRegionTotals] = useState(null);
      const [loading, setLoading] = useState(false);
      const [fileName, setFileName] = useState("");
      const [dragActive, setDragActive] = useState(false);
      const [customRemarks, setCustomRemarks] = useState({});
      const [isDataSaved, setIsDataSaved] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isTargetModalOpen, setIsTargetModalOpen] = useState(false);
      const [targetChallengeData, setTargetChallengeData] = useState({});
      const fileInputRef = useRef(null);

      const fetchTargetChallenge = async (dateStr) => {
        if (!dateStr) return;
        const [year, month, day] = dateStr.split('-');
        const bulan = `${year}-${month}`;
        const dayInt = parseInt(day, 10);

        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";
          const res = await fetch(`/api/targetChallenge?action=getTarget&bulan=${bulan}&token=${token}&_t=${Date.now()}`);
          const json = await res.json();
          if (json.success && json.exists) {
            const todayTargets = {};
            for (const [region, days] of Object.entries(json.data)) {
              todayTargets[region] = days[dayInt] || 0;
            }
            setTargetChallengeData(todayTargets);
          } else {
            setTargetChallengeData({});
          }
        } catch (e) {
          console.error("Gagal fetch target challenge", e);
        }
      };

      const normalizeEstimasiData = (rawEstimasi) => {
        if (!rawEstimasi) return {};
        const normalized = {};
        for (const key in rawEstimasi) {
          const matched = findRegionMatch(key) || key;
          normalized[matched] = rawEstimasi[key];
        }
        return normalized;
      };

      // Fetch estimasi data when date changes (Fallback jika data belum tersimpan)
      const fetchEstimasi = async (date) => {
        setLoading(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";
          const res = await fetch(`/api/estimasi?action=getEstimasi&tanggal=${date}&region=ALL&token=${token}&_t=${Date.now()}`);
          const json = await res.json();
          if (json.success) {
            setDbEstimasi(normalizeEstimasiData(json.allEstimasi || {}));
          } else {
            setDbEstimasi({});
          }
        } catch (e) {
          console.error("Gagal mengambil estimasi:", e);
          setDbEstimasi({});
        } finally {
          setLoading(false);
        }
      };

      const checkSavedLaporan = async (date) => {
        setLoading(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";
          const res = await fetch(`/api/laporanRealisasi?action=getLaporan&tanggal=${date}&token=${token}&_t=${Date.now()}`);
          const json = await res.json();

          if (json.success && json.exists && json.data) {
            setRegionTotals(json.data.regionTotals);
            setCustomRemarks(json.data.customRemarks || {});
            setDbEstimasi(normalizeEstimasiData(json.data.dbEstimasi || {}));
            setIsDataSaved(true);
            setFileName("Data dimuat dari Database");
          } else {
            setIsDataSaved(false);
            setRegionTotals(null);
            setCustomRemarks({});
            setFileName("");
            await fetchEstimasi(date);
          }
        } catch (e) {
          console.error("Gagal mengecek laporan:", e);
          setIsDataSaved(false);
          await fetchEstimasi(date);
        } finally {
          setLoading(false);
        }
      };

      const saveLaporan = async () => {
        if (!regionTotals) {
          alert("Belum ada data untuk disimpan.");
          return;
        }
        setIsSaving(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";

          const payloadData = {
            regionTotals,
            customRemarks,
            dbEstimasi
          };

          const res = await fetch(`/api/laporanRealisasi?_t=${Date.now()}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'saveLaporan',
              tanggal: selectedDate,
              token: token,
              region: 'ADMIN',
              data: payloadData
            })
          });
          const json = await res.json();
          if (json.success) {
            alert("Laporan berhasil disimpan ke database!");
            setIsDataSaved(true);
            setFileName("Data dimuat dari Database");
          } else {
            alert(json.message || "Gagal menyimpan laporan.");
          }
        } catch (e) {
          console.error("Error saving laporan:", e);
          alert("Terjadi kesalahan saat menyimpan laporan.");
        } finally {
          setIsSaving(false);
        }
      };

      const deleteLaporan = async () => {
        const confirmed = await window.showConfirm("Konfirmasi Hapus", "Apakah Anda yakin ingin menghapus data laporan untuk tanggal ini?\nAnda harus mengunggah ulang file LHP jika ingin menampilkan datanya lagi.");
        if (!confirmed) return;
        setIsSaving(true);
        try {
          const sessionRaw = sessionStorage.getItem("agripam_session");
          const session = sessionRaw ? JSON.parse(sessionRaw) : null;
          const token = session ? session.token : "";

          const res = await fetch(`/api/laporanRealisasi?_t=${Date.now()}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'deleteLaporan',
              tanggal: selectedDate,
              token: token,
              region: 'ADMIN'
            })
          });
          const json = await res.json();
          if (json.success) {
            alert("Laporan berhasil dihapus.");
            setIsDataSaved(false);
            setRegionTotals(null);
            setCustomRemarks({});
            setFileName("");
            await fetchEstimasi(selectedDate);
          } else {
            alert(json.message || "Gagal menghapus laporan.");
          }
        } catch (e) {
          console.error("Error deleting laporan:", e);
          alert("Terjadi kesalahan saat menghapus laporan.");
        } finally {
          setIsSaving(false);
        }
      };

      useEffect(() => {
        checkSavedLaporan(selectedDate);
        fetchTargetChallenge(selectedDate);
      }, [selectedDate]);

      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFile(e.dataTransfer.files[0]);
        }
      };

      const handleFileInputChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          handleFile(e.target.files[0]);
        }
      };

      const triggerFileInput = () => {
        if (fileInputRef.current) {
          fileInputRef.current.click();
        }
      };

      const handleFile = async (file) => {
        if (!file) return;
        setFileName(file.name);
        setLoading(true);
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '', blankrows: true });

            // Extract date from Row 2
            let detectedDate = selectedDate;
            const b2Val = rows[1] ? rows[1][0] : '';
            const match = b2Val && b2Val.toString().match(/(\d{2})\/(\d{2})\/(\d{4})/);
            if (match) {
              detectedDate = `${match[3]}-${match[2]}-${match[1]}`;
              setSelectedDate(detectedDate);
            }

            // Fetch estimasi for the detected date immediately to make sure it matches
            const sessionRaw = sessionStorage.getItem("agripam_session");
            const session = sessionRaw ? JSON.parse(sessionRaw) : null;
            const token = session ? session.token : "";
            const estRes = await fetch(`/api/estimasi?action=getEstimasi&tanggal=${detectedDate}&region=ALL&token=${token}&_t=${Date.now()}`);
            const estJson = await estRes.json();
            const activeEstimasi = estJson.success ? (estJson.allEstimasi || {}) : {};
            setDbEstimasi(normalizeEstimasiData(activeEstimasi));

            // Compute LHP totals
            const totals = {};
            ALL_REGIONS.forEach(reg => {
              totals[reg] = { panen: 0, kirim: 0 };
            });

            for (let r = 6; r < rows.length; r++) {
              const row = rows[r];
              if (!row || !Array.isArray(row) || row.length < 12) continue;
              const rawReg = row[1]; // Column B (Wilayah)
              if (!rawReg) continue;
              const matchedReg = findRegionMatch(rawReg);
              if (matchedReg) {
                let valPanen = row[11]; // Column L
                let valKirim = row[6]; // Column G

                if (typeof valPanen === 'string') valPanen = valPanen.replace(/[^\d.,]/g, '').replace(/,/g, '');
                if (typeof valKirim === 'string') valKirim = valKirim.replace(/[^\d.,]/g, '').replace(/,/g, '');

                const numPanen = valPanen !== null && valPanen !== '' ? parseFloat(valPanen) : 0;
                const numKirim = valKirim !== null && valKirim !== '' ? parseFloat(valKirim) : 0;

                if (!isNaN(numPanen)) totals[matchedReg].panen += (numPanen / 1000);
                if (!isNaN(numKirim)) totals[matchedReg].kirim += (numKirim / 1000);
              }
            }

            setRegionTotals(totals);
          } catch (err) {
            console.error("Gagal membaca Excel LHP:", err);
            alert("Gagal memproses file Excel LHP: " + err.message);
          } finally {
            setLoading(false);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleRemarkChange = (label, val) => {
        setCustomRemarks(prev => ({
          ...prev,
          [label]: val
        }));
      };

      // Process rows to display
      const processedRows = RENCANA_REALISASI_ROWS.map(rowConfig => {
        if (rowConfig.type === 'detail') {
          const officialReg = rowConfig.regionKey;
          const estRow = dbEstimasi[officialReg];
          const rencanaPanen = estRow ? (parseFloat(estRow.estPanen) || 0) / 1000 : 0;

          let tbsPanen = regionTotals && regionTotals[rowConfig.regionKey] ? (regionTotals[rowConfig.regionKey].panen || 0) : 0;
          let tbsKirim = regionTotals && regionTotals[rowConfig.regionKey] ? (regionTotals[rowConfig.regionKey].kirim || 0) : 0;

          const pctPanenVsRenc = rencanaPanen > 0 ? (tbsPanen / rencanaPanen) * 100 : 0;
          const pctKirimVsRenc = rencanaPanen > 0 ? (tbsKirim / rencanaPanen) * 100 : 0;

          const dynamicTarget = (rowConfig.excelKey && targetChallengeData[rowConfig.excelKey] !== undefined)
            ? targetChallengeData[rowConfig.excelKey]
            : rowConfig.target;
          const pctKirimVsTarget = dynamicTarget > 0 ? (tbsKirim / dynamicTarget) * 100 : 0;

          return {
            ...rowConfig,
            target: dynamicTarget,
            rencanaPanen,
            tbsPanen,
            tbsKirim,
            pctPanenVsRenc,
            pctKirimVsRenc,
            pctKirimVsTarget
          };
        }
        return rowConfig;
      });

      // Compute subtotals
      processedRows.forEach(row => {
        if (row.type === 'subtotal') {
          let luas = 0;
          let target = 0;
          let rencanaPanen = 0;
          let tbsPanen = 0;
          let tbsKirim = 0;

          row.children.forEach(childLabel => {
            const childRow = processedRows.find(r => r.type === 'detail' && r.label === childLabel);
            if (childRow) {
              luas += childRow.luas || 0;
              target += childRow.target || 0;
              rencanaPanen += childRow.rencanaPanen || 0;
              tbsPanen += childRow.tbsPanen || 0;
              tbsKirim += childRow.tbsKirim || 0;
            }
          });

          row.luas = luas;
          row.target = target;
          row.rencanaPanen = rencanaPanen;
          row.tbsPanen = tbsPanen;
          row.tbsKirim = tbsKirim;
          row.pctPanenVsRenc = rencanaPanen > 0 ? (tbsPanen / rencanaPanen) * 100 : 0;
          row.pctKirimVsRenc = rencanaPanen > 0 ? (tbsKirim / rencanaPanen) * 100 : 0;
          row.pctKirimVsTarget = target > 0 ? (tbsKirim / target) * 100 : 0;
        }
      });

      // Compute total Jumlah
      const totalRow = processedRows.find(r => r.type === 'total');
      if (totalRow) {
        let luas = 0;
        let target = 0;
        let rencanaPanen = 0;
        let tbsPanen = 0;
        let tbsKirim = 0;

        processedRows.forEach(row => {
          if (row.type === 'subtotal') {
            luas += row.luas || 0;
            target += row.target || 0;
            rencanaPanen += row.rencanaPanen || 0;
            tbsPanen += row.tbsPanen || 0;
            tbsKirim += row.tbsKirim || 0;
          }
        });

        totalRow.luas = luas; // Total otomatis dari subtotal
        totalRow.target = target;
        totalRow.rencanaPanen = rencanaPanen;
        totalRow.tbsPanen = tbsPanen;
        totalRow.tbsKirim = tbsKirim;
        totalRow.pctPanenVsRenc = rencanaPanen > 0 ? (tbsPanen / rencanaPanen) * 100 : 0;
        totalRow.pctKirimVsRenc = rencanaPanen > 0 ? (tbsKirim / rencanaPanen) * 100 : 0;
        totalRow.pctKirimVsTarget = target > 0 ? (tbsKirim / target) * 100 : 0;
      }

      const getConditionalStyle = (val) => {
        if (val === undefined || val === null || isNaN(val)) return {};
        const num = parseFloat(val);
        if (num > 100) {
          return { backgroundColor: '#00cc00', color: '#000000', fontWeight: 'bold' };
        } else if (num >= 90) {
          return { backgroundColor: '#ffff00', color: '#000000', fontWeight: 'bold' };
        } else {
          return { backgroundColor: '#ff0000', color: '#ffffff', fontWeight: 'bold' };
        }
      };

      const formatDateSlash = (dateStr) => {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
      };

      const formatDateIndo = (dateStr) => {
        if (!dateStr) return '';
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        return `${parseInt(parts[2], 10)} ${months[parseInt(parts[1], 10) - 1]} ${parts[0]}`;
      };

      const handleExportPdf = () => {
        const element = document.getElementById("rencana-realisasi-print-container");
        if (!element) return;

        const opt = {
          margin: [5, 5, 5, 5],
          filename: `RENCANA_REALISASI_PANEN_HARIAN_${selectedDate}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2.5, useCORS: true, letterRendering: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        const btn = document.getElementById("btn-pdf-export");
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span class="inline-block animate-spin mr-1">⚙️</span> Generating PDF...`;
        btn.disabled = true;

        html2pdf().from(element).set(opt).save().then(() => {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }).catch(err => {
          console.error("PDF export error:", err);
          btn.innerHTML = originalText;
          btn.disabled = false;
          alert("Gagal mengekspor PDF: " + err.message);
        });
      };

      const formatNumber = (num, decimals = 0) => {
        if (num === undefined || num === null) return '-';
        return Number(num).toLocaleString('id-ID', {
          minimumFractionDigits: 0,
          maximumFractionDigits: decimals
        });
      };

      return (
        <div className="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 flex flex-col gap-6 animate-fadeIn">
          {/* Header */}
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-100 dark:border-slate-800 pb-4">
            <div>
              <h2 className="text-base font-bold text-slate-800 dark:text-slate-100">RENCANA & REALISASI PANEN HARIAN</h2>
              <p className="text-xs text-slate-400 mt-0.5">Unggah berkas LHP untuk menghasilkan laporan rencana vs realisasi</p>
            </div>
            <div className="flex flex-wrap items-center gap-3">
              <button
                onClick={() => setIsTargetModalOpen(true)}
                className="inline-flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-all duration-200"
              >
                <Icon name="target" size={14} />
                Kelola Target Bulanan
              </button>

              <div className="flex flex-col ml-2">
                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Tanggal Laporan</span>
                <input
                  type="date"
                  value={selectedDate}
                  onChange={(e) => {
                    setSelectedDate(e.target.value);
                  }}
                  className="border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-xs font-medium text-slate-700 dark:text-slate-300 dark:bg-slate-800 focus:outline-none focus:border-brand-500"
                />
              </div>

              {/* Conditional Buttons based on data state */}
              {regionTotals && (
                <div className="flex flex-wrap items-center gap-2 mt-5">
                  {isDataSaved ? (
                    <button
                      onClick={deleteLaporan}
                      disabled={isSaving}
                      className="inline-flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white text-xs font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-all duration-200"
                    >
                      <Icon name="trash-2" size={14} />
                      {isSaving ? "Menghapus..." : "Hapus & Upload Ulang"}
                    </button>
                  ) : (
                    <button
                      onClick={saveLaporan}
                      disabled={isSaving}
                      className="inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white text-xs font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-all duration-200"
                    >
                      <Icon name="save" size={14} />
                      {isSaving ? "Menyimpan..." : "Simpan ke Database"}
                    </button>
                  )}
                  <button
                    id="btn-pdf-export"
                    onClick={handleExportPdf}
                    disabled={!regionTotals || isSaving}
                    className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 disabled:bg-slate-200 dark:disabled:bg-slate-800 disabled:text-slate-400 dark:disabled:text-slate-600 text-white text-xs font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-all duration-200"
                  >
                    <Icon name="file-text" size={14} />
                    Export ke PDF
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* Upload Area */}
          {!isDataSaved && (
            <div
              onDragEnter={handleDrag}
              onDragOver={handleDrag}
              onDragLeave={handleDrag}
              onDrop={handleDrop}
              onClick={triggerFileInput}
              className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all duration-200 flex flex-col items-center justify-center min-h-[140px] ${dragActive
                ? 'border-brand-500 bg-brand-50/50 dark:bg-brand-950/20'
                : 'border-slate-200 dark:border-slate-800 hover:border-brand-400 dark:hover:border-brand-800 hover:bg-slate-50/50 dark:hover:bg-slate-900/50'
                }`}
            >
              <input
                ref={fileInputRef}
                type="file"
                accept=".xlsx,.xls"
                onChange={handleFileInputChange}
                className="hidden"
              />

              {loading ? (
                <div className="flex flex-col items-center gap-3">
                  <div className="w-8 h-8 border-4 border-brand-200 border-t-brand-600 rounded-full animate-spin"></div>
                  <p className="text-xs text-slate-500 dark:text-slate-400 font-medium">Memproses data laporan...</p>
                </div>
              ) : fileName ? (
                <div className="flex flex-col items-center">
                  <div className="w-12 h-12 rounded-full bg-emerald-50 dark:bg-emerald-950/30 flex items-center justify-center text-emerald-600 mb-3 shadow-sm">
                    <Icon name="check" size={24} />
                  </div>
                  <p className="text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1">{fileName}</p>
                  <p className="text-[10px] text-slate-400">File berhasil dimuat. Klik atau seret file lain untuk mengganti.</p>
                </div>
              ) : (
                <div className="flex flex-col items-center">
                  <div className="w-12 h-12 rounded-full bg-brand-50 dark:bg-brand-950/30 flex items-center justify-center text-brand-600 mb-3 shadow-sm">
                    <Icon name="upload-cloud" size={24} />
                  </div>
                  <p className="text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1">Unggah File Excel LHP</p>
                  <p className="text-[10px] text-slate-400">Seret & taruh berkas di sini atau klik untuk menelusuri folder</p>
                </div>
              )}
            </div>
          )}

          {/* Table Preview */}
          {regionTotals ? (
            <div className="overflow-x-auto border border-slate-200 dark:border-slate-800 rounded-xl flex justify-center bg-slate-50 dark:bg-slate-950 p-4">
              {/* Printable Area Wrapper (Portrait A4 Fit with 5mm margin = 756px centered) */}
              <div id="rencana-realisasi-print-container" className="bg-white p-6 w-[756px] mx-auto text-slate-800 shadow-lg">
                {/* Scoped CSS Injector for 1px thick black borders (#000000), Libre Franklin Font, and all black text */}
                <style dangerouslySetInnerHTML={{
                  __html: `
                  #rencana-realisasi-print-container {
                    font-family: 'Libre Franklin', sans-serif !important;
                    color: #000000;
                  }
                  #rencana-realisasi-print-container table {
                    border-collapse: collapse !important;
                    border: 1px solid #000000 !important;
                    width: 100% !important;
                    color: #000000;
                  }
                  #rencana-realisasi-print-container th,
                  #rencana-realisasi-print-container td {
                    border: 1px solid #000000 !important;
                    padding: 3px 4px !important;
                    vertical-align: middle !important;
                    line-height: 1.2 !important;
                  }
                  #rencana-realisasi-print-container input {
                    font-family: 'Libre Franklin', sans-serif !important;
                    color: inherit;
                    border: 0 !important;
                    outline: none !important;
                    background: transparent !important;
                    width: 100% !important;
                    padding: 0 !important;
                    margin: 0 !important;
                  }
                `}} />

                {/* Print Title Header */}
                <div className="flex flex-col items-center justify-center mb-8 pb-2">
                  <h1 className="text-[14px] font-extrabold tracking-tight uppercase text-center" style={{ margin: 0, color: '#000000' }}>RENCANA & REALISASI PANEN HARIAN</h1>
                  <p className="text-[11px] font-bold mt-1 text-center" style={{ margin: 0, color: '#000000' }}>{formatDateSlash(selectedDate)}</p>
                  <div className="w-full flex justify-start mt-4">
                    <img src="AGRINAS DANANTARA.png" alt="Logo" className="h-[40px] w-auto object-contain" />
                  </div>
                </div>

                <table className="text-[10px]">
                  <thead>
                    <tr className="font-bold text-center">
                      <th rowSpan="2" className="w-[130px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>Wilayah</th>
                      <th rowSpan="2" className="w-[75px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>Luas TM Planted (Ha)</th>
                      <th rowSpan="2" className="w-[65px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>Target Challenge (Ton)</th>
                      <th rowSpan="2" className="w-[65px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>Rencana Panen (Ton)</th>
                      <th colSpan="2" className="w-[130px]" style={{ backgroundColor: '#137d47', color: '#ffffff' }}>Realisasi (Ton)</th>
                      <th colSpan="3" className="w-[195px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>% Pencapaian</th>
                      <th rowSpan="2" className="w-[100px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>Keterangan</th>
                    </tr>
                    <tr className="font-bold text-center">
                      <th className="w-[65px]" style={{ backgroundColor: '#137d47', color: '#ffffff' }}>TBS Panen</th>
                      <th className="w-[65px]" style={{ backgroundColor: '#137d47', color: '#ffffff' }}>TBS Kirim</th>
                      <th className="w-[65px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>Real Panen Vs Renc Panen</th>
                      <th className="w-[65px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>Real Kirim Vs Renc Panen</th>
                      <th className="w-[65px]" style={{ backgroundColor: '#d1f6f5', color: '#000000' }}>Real Kirim Vs Target</th>
                    </tr>
                  </thead>
                  <tbody>
                    {processedRows.map((row, idx) => {
                      const isSubtotal = row.type === 'subtotal';
                      const isTotal = row.type === 'total';

                      let bgStyle = {};

                      if (isSubtotal) {
                        bgStyle = { backgroundColor: '#ffff99' };
                      } else if (isTotal) {
                        bgStyle = { backgroundColor: '#d1f6f5' };
                      }

                      const weightClass = (isSubtotal || isTotal) ? "font-bold" : "font-medium";
                      const monoWeightClass = (isSubtotal || isTotal) ? "font-bold" : "font-medium";

                      return (
                        <tr key={idx} style={bgStyle}>
                          <td className={`${weightClass} text-left`}>{row.label}</td>
                          <td className={`text-right font-mono ${monoWeightClass}`}>{formatNumber(row.luas, 0)}</td>
                          <td className={`text-center font-mono ${monoWeightClass}`}>{formatNumber(row.target, 0)}</td>
                          <td className={`text-center font-mono ${monoWeightClass}`}>{formatNumber(row.rencanaPanen, 0)}</td>
                          <td className={`text-center font-mono ${monoWeightClass}`}>{formatNumber(row.tbsPanen, 0)}</td>
                          <td className={`text-center font-mono ${monoWeightClass}`}>{formatNumber(row.tbsKirim, 0)}</td>

                          <td className="text-center font-mono font-bold" style={getConditionalStyle(row.pctPanenVsRenc)}>
                            {formatNumber(row.pctPanenVsRenc, 0)}
                          </td>
                          <td className="text-center font-mono font-bold" style={getConditionalStyle(row.pctKirimVsRenc)}>
                            {formatNumber(row.pctKirimVsRenc, 0)}
                          </td>
                          <td className="text-center font-mono font-bold" style={getConditionalStyle(row.pctKirimVsTarget)}>
                            {formatNumber(row.pctKirimVsTarget, 0)}
                          </td>

                          <td>
                            <input
                              type="text"
                              value={customRemarks[row.label] || ''}
                              onChange={(e) => handleRemarkChange(row.label, e.target.value)}
                              className={`text-[9px] text-center w-full ${weightClass}`}
                              style={{ color: '#000000' }}
                            />
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ) : (
            <div className="text-center py-10 bg-slate-50/50 dark:bg-slate-900/50 rounded-xl border border-slate-100 dark:border-slate-800/80">
              <Icon name="file-text" size={32} className="text-slate-300 mx-auto mb-2" />
              <p className="text-xs text-slate-500 font-medium">Unggah berkas Excel LHP Anda untuk memuat preview rencana & realisasi.</p>
              <p className="text-[10px] text-slate-400 mt-0.5">Data rencana otomatis dihubungkan dari database estimasi harian.</p>
            </div>
          )}

          <TargetChallengeModal isOpen={isTargetModalOpen} onClose={() => setIsTargetModalOpen(false)} />
        </div>
      );
    }

    // ============================================================
    // ROOT APP
    // ============================================================
    function App() {
      const [activeNav, setActiveNav] = useState('laporan-jam');
      const [filters, setFilters] = useState({
        cro: 'Semua CRO',
        regional: 'Semua Regional',
        dateMode: 'TUNGGAL',
        tanggal: getTodayWIB(),
        tanggal_akhir: getTodayWIB(),
        _referenceDate: getTodayWIB()
      });
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [realisasiRecords, setRealisasiRecords] = useState([]);
      const [estimasiData, setEstimasiData] = useState({});
      const [kemarinRecords, setKemarinRecords] = useState([]);
      const [loading, setLoading] = useState(false);

      const [theme, setTheme] = useState(localStorage.getItem("agripam_theme") || "light");

      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("agripam_theme", theme);
      }, [theme]);

      const toggleTheme = () => {
        setTheme(prev => prev === 'dark' ? 'light' : 'dark');
      };

      const getYesterdayDate = (dateStr) => {
        if (!dateStr || dateStr === 'Semua Tanggal') return '';
        const parts = dateStr.split('-');
        if (parts.length !== 3) return '';
        const d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
        d.setDate(d.getDate() - 1);
        const yyyy = d.getFullYear();
        const MM = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${MM}-${dd}`;
      };

      // Sync dates when dateMode or _referenceDate changes
      useEffect(() => {
        setFilters(prev => {
          const mode = prev.dateMode || 'TUNGGAL';
          const ref = prev._referenceDate || getTodayWIB();
          let start = ref;
          let end = ref;

          if (mode === 'TUNGGAL') {
            start = ref;
            end = ref;
          } else if (mode === 'SD_BULAN_INI') {
            const d = new Date(ref);
            start = `${d.getFullYear()}-01-01`;
            end = ref;
          } else if (mode === 'SD_HARI_INI') {
            const d = new Date(ref);
            start = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`;
            end = ref;
          } else if (mode === 'KUSTOM') {
            start = prev.tanggal;
            end = prev.tanggal_akhir;
          }

          if (prev.tanggal !== start || prev.tanggal_akhir !== end) {
            return { ...prev, tanggal: start, tanggal_akhir: end };
          }
          return prev;
        });
      }, [filters.dateMode, filters._referenceDate]);

      useEffect(() => {
        if (!filters.tanggal || filters.tanggal === 'Semua Tanggal') return;

        let active = true;
        const fetchDashboardData = async () => {
          setLoading(true);
          try {
            const sessionRaw = sessionStorage.getItem("agripam_session");
            const session = sessionRaw ? JSON.parse(sessionRaw) : null;
            const token = session ? session.token : "";

            const yesterday = getYesterdayDate(filters.tanggal);
            const isRange = filters.tanggal !== filters.tanggal_akhir;

            // Prepare API calls
            const promises = [
              fetch(`/api/realisasi?action=getData&tanggal=${filters.tanggal}&tanggal_akhir=${filters.tanggal_akhir || filters.tanggal}&region=ALL&_t=${Date.now()}`),
              fetch(`/api/estimasi?action=getEstimasi&tanggal=${filters.tanggal}&tanggal_akhir=${filters.tanggal_akhir || filters.tanggal}&region=ALL&token=${token}&_t=${Date.now()}`),
            ];

            // Only fetch yesterday's data if NOT in range mode
            if (!isRange) {
              promises.push(fetch(`/api/realisasi?action=getData&tanggal=${yesterday}&region=ALL&_t=${Date.now()}`));
            }

            const results = await Promise.all(promises);
            const realisasiRes = results[0];
            const estimasiRes = results[1];
            const kemarinRes = isRange ? null : results[2];

            const realisasiJson = await realisasiRes.json();
            const estimasiJson = await estimasiRes.json();
            const kemarinJson = kemarinRes ? await kemarinRes.json() : { success: true, allRecords: [] };

            if (active) {
              if (realisasiJson.success) {
                setRealisasiRecords(realisasiJson.allRecords || []);
              } else {
                setRealisasiRecords([]);
              }
              if (estimasiJson.success) {
                setEstimasiData(estimasiJson.allEstimasi || {});
              } else {
                setEstimasiData({});
              }
              if (kemarinJson && kemarinJson.success) {
                setKemarinRecords(kemarinJson.allRecords || []);
              } else {
                setKemarinRecords([]);
              }
            }
          } catch (e) {
            console.error(e);
            if (active) {
              setRealisasiRecords([]);
              setEstimasiData({});
              setKemarinRecords([]);
            }
          } finally {
            if (active) setLoading(false);
          }
        };

        fetchDashboardData();
        return () => { active = false; };
      }, [filters.tanggal, filters.tanggal_akhir]);

      const regionalDetails = computeRegionalDetails(realisasiRecords, estimasiData);

      return (
        <div className="flex h-screen overflow-hidden bg-slate-50">
          {/* Sidebar */}
          <Sidebar activeNav={activeNav} setActiveNav={setActiveNav} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed} />

          {/* Main */}
          <main className="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
            <TopHeader theme={theme} toggleTheme={toggleTheme} />

            {/* Scrollable body */}
            <div className="flex-1 overflow-y-auto">
              <div className="flex flex-col gap-5 p-6 max-w-screen-2xl mx-auto w-full">
                {activeNav === 'validasi' ? (
                  <ValidationPanel
                    realisasiRecords={realisasiRecords}
                    regionalDetails={regionalDetails}
                    filters={filters}
                    setFilters={setFilters}
                  />
                ) : activeNav === 'rencana-realisasi' ? (
                  <RencanaRealisasiPanel />
                ) : (
                  <>
                    <FilterBar filters={filters} setFilters={setFilters} />
                    <HourlyChartRow filters={filters} realisasiRecords={realisasiRecords} regionalDetails={regionalDetails} kemarinRecords={kemarinRecords} theme={theme} />
                    <RegionalRow filters={filters} regionalDetails={regionalDetails} />
                    <RealisasiEstimasiChart filters={filters} regionalDetails={regionalDetails} theme={theme} realisasiRecords={realisasiRecords} />
                    <TickerRow realisasiRecords={realisasiRecords} estimasiData={estimasiData} />
                  </>
                )}

                {/* Footer */}
                <footer className="text-center text-[11px] text-slate-400 py-2">
                  PATRIOT- LOYAL - PROFESIONAL
                </footer>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
