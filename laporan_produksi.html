  <script>
    (function checkAuth() {
      // Apply theme immediately
      var savedTheme = localStorage.getItem("agripam_theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);

      var sessionKey = "agripam_session";
      try {
        var raw = sessionStorage.getItem(sessionKey);
        if (!raw) {
          window.location.href = "login.html?msg=" + encodeURIComponent("Harap login terlebih dahulu.");
          return;
        }
        var s = JSON.parse(raw);
        if (Date.now() > s.expiry) {
          sessionStorage.removeItem(sessionKey);
          window.location.href = "login.html?msg=" + encodeURIComponent("Sesi Anda telah berakhir. Silakan login kembali.");
          return;
        }
        if (s.region !== "ADMIN") {
          window.location.href = "login.html?msg=" + encodeURIComponent("Akses ditolak. Halaman ini hanya untuk ADMIN.");
          return;
        }
      } catch (e) {
        sessionStorage.removeItem(sessionKey);
        window.location.href = "login.html?msg=" + encodeURIComponent("Terjadi kesalahan sesi.");
      }
    })();

    // Pageshow guard — cegah akses halaman dari bfcache setelah logout
    window.addEventListener("pageshow", function (event) {
      if (event.persisted) {
        var raw = sessionStorage.getItem("agripam_session");
        if (!raw) {
          window.location.replace("login.html?msg=" + encodeURIComponent("Sesi telah berakhir. Silakan login kembali."));
          return;
        }
        try {
          var s = JSON.parse(raw);
          if (Date.now() > s.expiry || s.region !== "ADMIN") {
            sessionStorage.removeItem("agripam_session");
            window.location.replace("login.html?msg=" + encodeURIComponent("Sesi telah berakhir. Silakan login kembali."));
          }
        } catch (e) {
          sessionStorage.removeItem("agripam_session");
          window.location.replace("login.html?msg=" + encodeURIComponent("Terjadi kesalahan sesi."));
        }
      }
    });
  </script>

    }
    function getInitials(name) {
      return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();

    function useNow() {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);
      return now;

    // ============================================================

    function Icon({ name, size = 18, className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const el = document.createElement('div');
          el.setAttribute('data-lucide', name);
          el.style.width = size + 'px';
          el.style.height = size + 'px';
          ref.current.appendChild(el);
          window.lucide.createIcons({ nameAttr: 'data-lucide', rootElement: ref.current });
        }
      }, [name, size]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;

    // ============================================================
    // ROW 1: TICKER
    // ============================================================
    function TickerRow({ realisasiRecords, estimasiData }) {
      const [tickerHtml, setTickerHtml] = useState("Mengambil data hasil produksi...");

      useEffect(() => {
        if (!realisasiRecords || realisasiRecords.length === 0) {
          setTickerHtml("Belum ada laporan produksi masuk untuk tanggal ini");
          return;
        }

        const regionMap = {};
        realisasiRecords.forEach(rec => {
          const key = rec.region;
          if (!regionMap[key]) {
            regionMap[key] = { region: rec.region, totalRealisasi: 0, latestJam: rec.jam };
          }
          regionMap[key].totalRealisasi += parseFloat(rec.tonase) || 0;
          if (rec.jam > regionMap[key].latestJam) {
            regionMap[key].latestJam = rec.jam;
          }
        });

        const items = Object.keys(regionMap).map(key => {
          const r = regionMap[key];
          const realisasiStr = r.totalRealisasi.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          return `<span class="ticker-region">${r.region}</span> (<strong>${realisasiStr} Ton </strong>)<span class="ticker-time">${r.latestJam} wib</span>`;
        });

        if (items.length > 0) {
          setTickerHtml(items.join('&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'));
        } else {
          setTickerHtml("Belum ada laporan produksi masuk untuk tanggal ini");
        }
      }, [realisasiRecords, estimasiData]);

      return (
        <section className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex-shrink-0">
          <div className="flex items-stretch">
            <div className="bg-red-600 flex items-center gap-2 px-4 py-2.5 flex-shrink-0">
              <div className="w-1.5 h-1.5 rounded-full bg-white animate-pulse2"></div>
              <span className="text-[11px] font-bold text-white uppercase tracking-wider whitespace-nowrap">AGRIPAM</span>
            </div>
            <div className="flex-1 overflow-hidden bg-red-50">
              <div className="ticker-track py-2.5">
                <span className="text-[12.5px] text-red-800 font-medium px-8" dangerouslySetInnerHTML={{ __html: tickerHtml }}></span>
                <span className="text-[12.5px] text-red-800 font-medium px-8" aria-hidden="true" dangerouslySetInnerHTML={{ __html: tickerHtml }}></span>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ============================================================
    // ROW 2: HOURLY LINE CHART
    // ============================================================
    function trimToReportedRange(values) {
      var firstIdx = -1, lastIdx = -1;
      for (var i = 0; i < values.length; i++) {
        if (values[i] > 0) {
          if (firstIdx === -1) firstIdx = i;
          lastIdx = i;
        }
      }
      if (firstIdx === -1) return values.map(function () { return null; });
      return values.map(function (v, i) {
        return (i < firstIdx || i > lastIdx) ? null : v;
      });
    }

    function HourlyChartRow({ filters, realisasiRecords, regionalDetails, kemarinRecords, theme }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); }

        const ctx = canvasRef.current.getContext("2d");
        const TREND_UP_COLOR = '#2563eb';
        const TREND_DOWN_COLOR = '#dc2626';
        const TREND_FLAT_COLOR = 'rgba(148, 163, 184, 0.6)';

        const segmentColorForLine = (datasetIndex) => {
          return (ctx) => {
            const data = ctx.chart.data.datasets[datasetIndex].data;
            const v0 = data[ctx.p0DataIndex];
            const v1 = data[ctx.p1DataIndex];
            if (v0 == null || v1 == null) return TREND_FLAT_COLOR;
            if (v1 > v0) return TREND_UP_COLOR;
            if (v1 < v0) return TREND_DOWN_COLOR;
            return TREND_FLAT_COLOR;
          };
        };

        const pointColorForLine = (datasetIndex) => {
          return (ctx) => {
            const data = ctx.chart.data.datasets[datasetIndex].data;
            const i = ctx.dataIndex;
            const v1 = data[i];
            if (i === 0 || v1 == null) return TREND_FLAT_COLOR;
            const v0 = data[i - 1];
            if (v0 == null) return TREND_FLAT_COLOR;
            if (v1 > v0) return TREND_UP_COLOR;
            if (v1 < v0) return TREND_DOWN_COLOR;
            return TREND_FLAT_COLOR;
          };
        };

        // Get filtered regional details for summary
        const filtered = getFilteredRegionals(filters, regionalDetails);
        const filtEst = filtered.reduce((s, d) => s + d.estimasi, 0);

        // Get allowed regions based on filters
        let allowedRegions = [...ALL_REGIONS];
        if (filters.cro !== 'Semua CRO') {
          allowedRegions = CRO_MAP[filters.cro] || [];
        }
        if (filters.regional !== 'Semua Regional') {
          allowedRegions = [filters.regional];
        }

        // Sum realisasi data for each hour from realisasiRecords
        const hours = ["06.00", "07.00", "08.00", "09.00", "10.00", "11.00", "12.00", "13.00", "14.00", "15.00", "16.00", "17.30"];
        const hourlyData = hours.map(h => {
          return (realisasiRecords || [])
            .filter(r => allowedRegions.includes(r.region) && r.jam === h)
            .reduce((sum, r) => sum + (parseFloat(r.tonase) || 0), 0);
        });

        const lineData = trimToReportedRange(hourlyData);

        const gradient = ctx.createLinearGradient(0, 0, 0, canvasRef.current.clientHeight || 220);
        gradient.addColorStop(0, 'rgba(22, 163, 74, 0.85)');
        gradient.addColorStop(1, 'rgba(22, 163, 74, 0.15)');

        const hoverGradient = ctx.createLinearGradient(0, 0, 0, canvasRef.current.clientHeight || 220);
        hoverGradient.addColorStop(0, 'rgba(22, 163, 74, 1)');
        hoverGradient.addColorStop(1, 'rgba(22, 163, 74, 0.35)');

        const chartDataLabelsPlugin = {
          id: 'chartDataLabels',
          afterDatasetsDraw: (chart) => {
            const ctx = chart.ctx;
            const barDataset = chart.data.datasets[0];
            const barMeta = chart.getDatasetMeta(0);
            barMeta.data.forEach((bar, index) => {
              const val = barDataset.data[index];
              if (val === 0 || val == null) return;

              ctx.save();
              ctx.font = "bold 11px Calibri";
              ctx.textAlign = 'center';
              ctx.textBaseline = 'bottom';

              let pctText = "";
              let pctColor = "";
              if (filtEst > 0) {
                let cumulativeSum = 0;
                for (let k = 0; k <= index; k++) {
                  if (barDataset.data[k] != null) {
                    cumulativeSum += barDataset.data[k];
                  }
                }
                const pct = (cumulativeSum / filtEst) * 100;
                pctText = pct.toFixed(2) + "%";
                pctColor = '#475569';
              }

              const valText = val.toLocaleString('id-ID', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
              ctx.fillStyle = "#1e293b";

              if (pctText) {
                ctx.fillText(valText, bar.x, bar.y - 15);
                ctx.fillStyle = pctColor;
                ctx.fillText(pctText, bar.x, bar.y - 3);
              } else {
                ctx.fillText(valText, bar.x, bar.y - 3);
              }
              ctx.restore();
            });

            const lineDataset = chart.data.datasets[1];
            const lineMeta = chart.getDatasetMeta(1);
            lineMeta.data.forEach((point, index) => {
              if (index === 0) return;
              const prev = lineDataset.data[index - 1];
              const curr = lineDataset.data[index];
              if (prev == null || curr == null || prev === 0) return;

              const change = ((curr - prev) / prev) * 100;
              const isUp = change > 0;
              const isFlat = change === 0;
              const color = isFlat ? TREND_FLAT_COLOR : (isUp ? TREND_UP_COLOR : TREND_DOWN_COLOR);
              const arrow = isFlat ? "▬" : (isUp ? "▲" : "▼");
              const text = arrow + " " + (change >= 0 ? "+" : "") + change.toFixed(1) + "%";

              ctx.save();
              ctx.font = "bold 10px Calibri";
              ctx.textAlign = 'left';
              ctx.textBaseline = 'middle';
              ctx.fillStyle = color;
              ctx.fillText(text, point.x + 10, point.y);
              ctx.restore();
            });
          }
        };

        chartRef.current = new Chart(canvasRef.current, {
          type: 'bar',
          data: {
            labels: MOCK_HOURLY_DATA.labels,
            datasets: [
              {
                type: 'bar',
                label: 'Realisasi Panen (Ton)',
                data: hourlyData,
                backgroundColor: gradient,
                borderColor: '#16a34a',
                borderWidth: 1.5,
                borderRadius: 4,
                hoverBackgroundColor: hoverGradient,
                order: 1
              },
              {
                type: 'line',
                label: 'Connecting Line',
                data: lineData,
                borderWidth: 2.5,
                borderDash: [6, 4],
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: pointColorForLine(1),
                pointBorderColor: pointColorForLine(1),
                segment: { borderColor: segmentColorForLine(1) },
                fill: false,
                tension: 0,
                order: 0
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                grace: '15%',
                grid: { color: theme === 'dark' ? 'rgba(255, 255, 255, 0.1)' : '#f1f5f9' },
                ticks: {
                  color: '#94a3b8',
                  font: { family: 'Inter', size: 11, weight: 'bold' },
                  callback: v => v.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' Ton'
                }
              },
              x: {
                grid: { color: theme === 'dark' ? 'rgba(255, 255, 255, 0.1)' : '#f1f5f9' },
                ticks: {
                  color: '#94a3b8',
                  font: { family: 'Inter', size: 11, weight: 'bold' }
                }
              }
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                titleFont: { family: 'Inter', size: 11, weight: 'bold' },
                bodyFont: { family: 'Inter', size: 11, weight: 'bold' },
                callbacks: {
                  label: context => ' ' + context.dataset.label + ': ' + context.parsed.y.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' Ton'
                }
              }
            }
          },
          plugins: [chartDataLabelsPlugin]
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [filters, realisasiRecords, regionalDetails, theme]);

      const filtered = getFilteredRegionals(filters, regionalDetails);
      const filtReal = filtered.reduce((s, d) => s + d.realisasi, 0);
      const filtEst = filtered.reduce((s, d) => s + d.estimasi, 0);
      const filterLabel = filters.regional !== 'Semua Regional' ? filters.regional
        : filters.cro !== 'Semua CRO' ? filters.cro.split('—')[0].trim()
          : 'Nasional';

      // Allowed regions for filtering kemarinRecords
      let allowedRegions = [...ALL_REGIONS];
      if (filters.cro !== 'Semua CRO') {
        allowedRegions = CRO_MAP[filters.cro] || [];
      }
      if (filters.regional !== 'Semua Regional') {
        allowedRegions = [filters.regional];
      }

      const totalHariIni = filtReal;
      const totalKemarin = (kemarinRecords || [])
        .filter(r => allowedRegions.includes(r.region))
        .reduce((sum, r) => sum + (parseFloat(r.tonase) || 0), 0);

      const ratio = totalKemarin > 0 ? (totalHariIni / totalKemarin) * 100 : (totalHariIni > 0 ? 100 : 0);
      const isUp = totalHariIni >= totalKemarin;

      return (
        <section className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 dashboard-card">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-[14px] font-bold text-slate-800">Tren Produksi Per Jam</h2>
              <p className="text-[12px] text-slate-400 mt-0.5">Kumulatif {filterLabel}{filters.tanggal !== 'Semua Tanggal' ? ' — ' + formatIndoDate(filters.tanggal) : ' — data hari ini'}</p>
            </div>
            <div className="flex items-center gap-3">
              <div className="text-right">
                <div className="text-[13px] font-bold text-brand-600">{formatRibuan(filtReal)} ton</div>
                <div className="text-[10px] text-slate-400">dari est. {formatRibuan(filtEst)} ton</div>
              </div>
              <div className={`flex items-center gap-2 text-[11px] border font-semibold px-2.5 py-1 rounded-lg ${isUp ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}>
                <Icon name={isUp ? "trending-up" : "trending-down"} size={13} />
                <span className="inline-flex items-center justify-center">{ratio.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}% vs kemarin</span>
              </div>
            </div>
          </div>
          <div style={{ height: '220px' }}>
            <canvas ref={canvasRef}></canvas>
          </div>
        </section>
      );
    }

    // ============================================================
    // ROW 3: DONUT + LEADERBOARD
    // ============================================================
    function DonutChart({ filters, regionalDetails }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      const [showAll, setShowAll] = useState(false);

      useEffect(() => {
        if (!canvasRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); }

        const data = getFilteredRegionals(filters, regionalDetails);

        chartRef.current = new Chart(canvasRef.current, {
          type: 'doughnut',
          data: {
            labels: data.map(d => d.region),
            datasets: [{
              data: data.map(d => d.tonase),
              backgroundColor: data.map(d => d.color),
              borderWidth: 3, borderColor: '#fff', hoverBorderColor: '#fff', hoverOffset: 6,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false, cutout: '68%',
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1e293b', titleColor: '#94a3b8', bodyColor: '#f1f5f9',
                padding: 12, cornerRadius: 8,
                callbacks: { label: ctx => ` ${formatRibuan(ctx.parsed)} ton` }
              }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [filters, regionalDetails]);

      const data = getFilteredRegionals(filters, regionalDetails);
      const total = data.reduce((s, d) => s + d.tonase, 0);

      const displayedData = showAll ? data : data.slice(0, 3);

      return (
        <section className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 dashboard-card flex flex-col justify-between">
          <div>
            <div className="mb-4">
              <h2 className="text-[14px] font-bold text-slate-800">Kontribusi Panen Tiap Regional</h2>
              <p className="text-[12px] text-slate-400 mt-0.5">Proporsi realisasi {filters.cro !== 'Semua CRO' ? filters.cro.split('—')[0].trim() : 'nasional'} s.d. jam ini</p>
            </div>
            <div className="relative flex justify-center" style={{ height: '180px' }}>
              <canvas ref={canvasRef}></canvas>
              <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div className="text-[20px] font-bold text-slate-800">{formatRibuan(total)}</div>
                <div className="text-[10px] text-slate-400 font-medium">TON TOTAL</div>
              </div>
            </div>
            <div className="mt-4 grid grid-cols-1 gap-1.5 transition-all duration-300">
              {displayedData.map((d, i) => {
                const pct = total > 0 ? ((d.tonase / total) * 100).toFixed(1) : '0.0';
                return (
                  <div key={i} className="flex items-center gap-2 animate-fadeIn">
                    <div className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: d.color }}></div>
                    <span className="text-[11px] text-slate-600 flex-1 truncate">{d.region}</span>
                    <span className="text-[11px] font-semibold text-slate-700">{pct}%</span>
                  </div>
                );
              })}
            </div>
          </div>
          {data.length > 3 && (
            <button
              onClick={() => setShowAll(!showAll)}
              className="mt-3 text-[11px] text-brand-600 hover:text-brand-700 font-semibold flex items-center justify-center gap-1 w-full py-1.5 border border-slate-100 hover:bg-slate-50 rounded-lg transition-all"
            >
              <Icon name={showAll ? "chevron-up" : "chevron-down"} size={12} />
              {showAll ? "Tampilkan Lebih Sedikit" : `Lihat ${data.length - 3} Regional Lainnya`}
            </button>
          )}
        </section>
      );
    }

    function RankBadge({ rank }) {
      if (rank === 1) return <div className="rank-1 w-6 h-6 rounded-full flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0">1</div>;
      if (rank === 2) return <div className="rank-2 w-6 h-6 rounded-full flex items-center justify-center text-white text-[11px] font-bold flex-shrink-0">2</div>;

    function formatIndoDate(dateStr) {
      if (!dateStr || dateStr === 'Semua Tanggal') return 'Semua Tanggal';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
      const d = parseInt(parts[2], 10);
      const m = months[parseInt(parts[1], 10) - 1];
      const y = parts[0];
      return `${d} ${m} ${y}`;
    }

      if (filters.regional !== 'Semua Regional') {

    const REGION_METADATA = {

    const computeRegionalDetails = (realisasiRecords, estimasiData) => {
      return ALL_REGIONS.map(region => {
        const meta = REGION_METADATA[region] || { shortLabel: region, color: '#cccccc' };
        const regionRealisasi = (realisasiRecords || [])
          .filter(r => r.region === region)
          .reduce((sum, r) => sum + (parseFloat(r.tonase) || 0), 0);
        const estRow = (estimasiData || {})[region];
        const regionEstimasi = estRow ? (parseFloat(estRow.estPanen) || 0) / 1000 : 0;
        const regionRestan = estRow ? (parseFloat(estRow.estRestan) || 0) / 1000 : 0;
        return {
          region,
          shortLabel: meta.shortLabel,
          color: meta.color,
          estimasi: regionEstimasi,
          realisasi: regionRealisasi,
          restan: regionRestan,
          tonase: regionRealisasi
        };
      });

    const REGION_ALIASES = {
      'sumut 1': 'Sumatera Utara 1',
      'sumut 2': 'Sumatera Utara 2 Ex Torganda',
      'kalbar 1': 'Kalimantan Barat 1',
      'kalbar 2': 'Kalimantan Barat 2',
      'kalsel 1': 'Kalimantan Selatan 1',
      'kalsel 2': 'Kalimantan Selatan 2',
      'kalteng 1': 'Kalimantan Tengah 1',
      'kalteng 2': 'Kalimantan Tengah 2',
      'kalteng 3': 'Kalimantan Tengah 3',
      'sulteng': 'Sulawesi Tengah',
      'sultra': 'Sulawesi Tenggara',
      'babel': 'Bangka Belitung',
      'sumbar': 'Sumatera Barat',
      'sumsel': 'Sumatera Selatan',
      'kalut': 'Kalimantan Utara',
      'kaltim': 'Kalimantan Timur'
    };

    function findRegionMatch(rawName) {
      if (!rawName) return null;
      const cleanRaw = rawName.toString().toLowerCase().replace(/[^a-z0-9]/g, '').trim();
      for (const [alias, official] of Object.entries(REGION_ALIASES)) {
        const cleanAlias = alias.replace(/[^a-z0-9]/g, '');
        if (cleanRaw === cleanAlias) return official;
      }
      for (const official of ALL_REGIONS) {
        const cleanOfficial = official.toLowerCase().replace(/[^a-z0-9]/g, '').trim();
        const cleanOfficialNoTorganda = official.toLowerCase().replace(/\bex torganda\b/g, '').replace(/[^a-z0-9]/g, '').trim();
        if (cleanRaw === cleanOfficial || 
            cleanRaw === cleanOfficialNoTorganda ||
            cleanRaw.includes(cleanOfficialNoTorganda) || 
            cleanOfficialNoTorganda.includes(cleanRaw)) {
          return official;
        }
      }
      return null;
    }

    // ============================================================
    // VALIDATION PANEL COMPONENT
    // ============================================================
    function ValidationPanel({ realisasiRecords, regionalDetails, selectedDate }) {
      const [excelData, setExcelData] = useState(null);
      const [fileName, setFileName] = useState("");
      const [showOnlyMismatch, setShowOnlyMismatch] = useState(false);
      const [dragActive, setDragActive] = useState(false);
      const fileInputRef = useRef(null);

      const handleFile = (file) => {
        if (!file) return;
        setFileName(file.name);
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            let regionColIdx = -1;
            let tonaseColIdx = -1;
            let startRowIdx = 0;
            
            for (let r = 0; r < Math.min(rows.length, 15); r++) {
              const row = rows[r];
              if (!row || !Array.isArray(row)) continue;
              for (let c = 0; c < row.length; c++) {
                const val = (row[c] || '').toString().toLowerCase().trim();
                if (val.includes('regional') || val.includes('wilayah') || val.includes('area') || val.includes('nama regional') || val.includes('pkh')) {
                  regionColIdx = c;
                }
                if (val.includes('realisasi') || val.includes('tonase') || val.includes('ton') || val.includes('kg') || val.includes('hasil panen') || val.includes('total') || val.includes('jumlah')) {
                  tonaseColIdx = c;
                }
              }
              if (regionColIdx !== -1 && tonaseColIdx !== -1) {
                startRowIdx = r + 1;
                break;
              }
            }
            
            if (regionColIdx === -1 || tonaseColIdx === -1) {
              for (let r = 0; r < rows.length; r++) {
                const row = rows[r];
                if (!row || !Array.isArray(row)) continue;
                for (let c = 0; c < row.length; c++) {
                  const val = row[c];
                  if (val && findRegionMatch(val)) {
                    regionColIdx = c;
                    for (let nc = c + 1; nc < row.length; nc++) {
                      if (typeof row[nc] === 'number' || !isNaN(parseFloat(row[nc]))) {
                        tonaseColIdx = nc;
                        startRowIdx = r;
                        break;
                      }
                    }
                    break;
                  }
                }
                if (regionColIdx !== -1 && tonaseColIdx !== -1) break;
              }
            }
            
            if (regionColIdx === -1 || tonaseColIdx === -1) {
              alert("Gagal mendeteksi kolom Regional atau Realisasi Tonase dalam file Excel. Silakan periksa format file.");
              return;
            }
            
            const parsedTotals = {};
            for (let r = startRowIdx; r < rows.length; r++) {
              const row = rows[r];
              if (!row || !Array.isArray(row)) continue;
              const rawReg = row[regionColIdx];
              const rawVal = row[tonaseColIdx];
              if (!rawReg) continue;
              
              const matchedRegion = findRegionMatch(rawReg);
              if (matchedRegion) {
                let valNum = parseFloat(rawVal);
                if (isNaN(valNum)) valNum = 0;
                
                if (!parsedTotals[matchedRegion]) parsedTotals[matchedRegion] = 0;
                parsedTotals[matchedRegion] += valNum;
              }
            }
            
            let isKg = false;
            const values = Object.values(parsedTotals);
            if (values.some(v => v > 5000) || values.reduce((sum, v) => sum + v, 0) > 10000) {
              isKg = true;
            }
            
            if (isKg) {
              for (const reg in parsedTotals) {
                parsedTotals[reg] = parsedTotals[reg] / 1000;
              }
            }
            
            setExcelData(parsedTotals);
          } catch (err) {
            console.error(err);
            alert("Terjadi kesalahan saat membaca file Excel: " + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFile(e.dataTransfer.files[0]);
        }
      };

      const onButtonClick = () => {
        fileInputRef.current.click();
      };

      const handleInputChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          handleFile(e.target.files[0]);
        }
      };

      const comparisonList = ALL_REGIONS.map(region => {
        const agripamTotal = (realisasiRecords || [])
          .filter(r => r.region === region)
          .reduce((sum, r) => sum + (parseFloat(r.tonase) || 0), 0);
        
        const palmopsTotal = excelData ? (excelData[region] || 0) : null;
        const hasExcelVal = palmopsTotal !== null;
        
        let selisih = null;
        let status = 'NO_DATA';
        
        if (hasExcelVal) {
          selisih = agripamTotal - palmopsTotal;
          status = Math.abs(selisih) < 0.05 ? 'MATCH' : 'MISMATCH';
        }
        
        return {
          region,
          agripam: Math.round(agripamTotal * 100) / 100,
          palmops: hasExcelVal ? Math.round(palmopsTotal * 100) / 100 : 0,
          selisih: hasExcelVal ? Math.round(selisih * 100) / 100 : 0,
          status,
          hasExcelVal
        };
      });

      const totalAgripam = comparisonList.reduce((sum, r) => sum + r.agripam, 0);
      const totalPalmops = excelData ? comparisonList.reduce((sum, r) => sum + r.palmops, 0) : 0;
      const totalSelisih = excelData ? (totalAgripam - totalPalmops) : 0;

      const filteredList = showOnlyMismatch 
        ? comparisonList.filter(r => r.status === 'MISMATCH') 
        : comparisonList;

      const totalMismatch = comparisonList.filter(r => r.status === 'MISMATCH').length;
      const matchCount = comparisonList.filter(r => r.status === 'MATCH').length;
      
      const overallStatus = !excelData ? 'AWAITING_UPLOAD' 
        : totalMismatch === 0 ? 'ALL_MATCH' 
        : 'MISMATCH_FOUND';

      return (
        <div className="space-y-5 animate-fadeIn">
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-3 bg-white dark:bg-slate-800 p-4 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm">
            <div>
              <h2 className="text-lg font-bold text-slate-800 dark:text-white">Validasi Data Produksi Harian</h2>
              <p className="text-xs text-slate-450 dark:text-slate-400">Membandingkan realisasi database AGRI-PAM vs Excel LHP PalmOps</p>
            </div>
            <div className="flex items-center gap-2 bg-brand-50 dark:bg-brand-950/40 border border-brand-200 dark:border-brand-900 rounded-lg px-3 py-1.5 w-fit">
              <Icon name="calendar" size={14} className="text-brand-600 dark:text-brand-400" />
              <span className="text-[12px] font-bold text-brand-800 dark:text-brand-200">Tanggal Evaluasi: {formatIndoDate(selectedDate)}</span>
            </div>
          </div>

          <div 
            onDragEnter={handleDrag} 
            onDragOver={handleDrag} 
            onDragLeave={handleDrag} 
            onDrop={handleDrop}
            className={`border-2 border-dashed rounded-xl p-8 text-center bg-white dark:bg-slate-800 transition-all shadow-sm relative ${
              dragActive ? 'border-brand-500 bg-brand-50/20' : 'border-slate-300 dark:border-slate-700 hover:border-brand-400'
            }`}
          >
            <input 
              ref={fileInputRef}
              type="file" 
              accept=".xlsx, .xls" 
              onChange={handleInputChange} 
              className="hidden"
            />
            
            <div className="flex flex-col items-center justify-center space-y-3">
              <div className="w-12 h-12 rounded-full bg-brand-50 dark:bg-brand-950/50 flex items-center justify-center text-brand-600 dark:text-brand-400 shadow-sm border border-brand-100 dark:border-brand-900">
                <Icon name={excelData ? "file-check" : "file-up"} size={22} />
              </div>
              <div>
                <p className="text-[14px] font-bold text-slate-700 dark:text-white">
                  {excelData ? `File aktif: ${fileName}` : "Tarik dan lepas file Excel PalmOps di sini"}
                </p>
                <p className="text-[11px] text-slate-400 mt-1">Format file harus berupa Excel LHP (.xlsx / .xls) dari dashboard PalmOps</p>
              </div>
              <div className="flex gap-2">
                <button 
                  onClick={onButtonClick}
                  className="bg-brand-600 hover:bg-brand-700 text-white text-[12px] font-semibold px-4 py-2 rounded-lg shadow transition-colors flex items-center gap-1.5"
                >
                  <Icon name="folder-open" size={13} />
                  Pilih File Excel
                </button>
                {excelData && (
                  <button 
                    onClick={() => { setExcelData(null); setFileName(""); }}
                    className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-650 text-slate-700 dark:text-white text-[12px] font-semibold px-4 py-2 rounded-lg transition-colors"
                  >
                    Hapus
                  </button>
                )}
              </div>
            </div>
          </div>

          {excelData && (
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm flex items-center gap-3.5">
                <div className="w-10 h-10 rounded-lg bg-green-50 dark:bg-green-950/30 flex items-center justify-center text-green-600 dark:text-green-400">
                  <Icon name="database" size={20} />
                </div>
                <div>
                  <div className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Total AGRI-PAM</div>
                  <div className="text-lg font-bold text-slate-800 dark:text-white tabular-nums">{formatRibuan(totalAgripam)} <span className="text-[11px] font-semibold text-slate-400">Ton</span></div>
                </div>
              </div>

              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm flex items-center gap-3.5">
                <div className="w-10 h-10 rounded-lg bg-blue-50 dark:bg-blue-950/30 flex items-center justify-center text-blue-600 dark:text-blue-400">
                  <Icon name="file-spreadsheet" size={20} />
                </div>
                <div>
                  <div className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Total PalmOps</div>
                  <div className="text-lg font-bold text-slate-800 dark:text-white tabular-nums">{formatRibuan(totalPalmops)} <span className="text-[11px] font-semibold text-slate-400">Ton</span></div>
                </div>
              </div>

              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm flex items-center gap-3.5">
                <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${Math.abs(totalSelisih) < 0.1 ? 'bg-green-55 bg-green-50 text-green-600 dark:bg-green-950/30 dark:text-green-400' : 'bg-red-50 text-red-600 dark:bg-red-950/30 dark:text-red-400'}`}>
                  <Icon name="percent" size={20} />
                </div>
                <div>
                  <div className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Selisih Kumulatif</div>
                  <div className={`text-lg font-bold tabular-nums ${Math.abs(totalSelisih) < 0.1 ? 'text-green-600' : 'text-red-600'}`}>
                    {totalSelisih > 0 ? "+" : ""}{formatRibuan(totalSelisih)} <span className="text-[11px] font-semibold">Ton</span>
                  </div>
                </div>
              </div>

              <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm flex items-center gap-3.5">
                <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${overallStatus === 'ALL_MATCH' ? 'bg-green-50 text-green-600 dark:bg-green-950/30 dark:text-green-400' : 'bg-amber-50 text-amber-600 dark:bg-amber-950/30 dark:text-amber-400'}`}>
                  <Icon name={overallStatus === 'ALL_MATCH' ? "check-circle-2" : "alert-triangle"} size={20} />
                </div>
                <div>
                  <div className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Status Validasi</div>
                  <div className={`text-[13px] font-bold ${overallStatus === 'ALL_MATCH' ? 'text-green-600' : 'text-amber-600'}`}>
                    {overallStatus === 'ALL_MATCH' ? 'Data 100% Sesuai' : `${totalMismatch} Regional Selisih`}
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-slate-100 dark:border-slate-700 flex flex-col md:flex-row md:items-center justify-between gap-3 bg-slate-50/50 dark:bg-slate-800/50">
              <div className="flex items-center gap-2">
                <Icon name="list" size={14} className="text-slate-500" />
                <span className="text-[13px] font-bold text-slate-700 dark:text-white">Rincian Perbandingan Regional</span>
              </div>
              {excelData && (
                <div className="flex items-center gap-2">
                  <button 
                    onClick={() => setShowOnlyMismatch(!showOnlyMismatch)}
                    className={`text-[11px] font-bold px-3 py-1.5 rounded-lg border transition-colors flex items-center gap-1 ${
                      showOnlyMismatch 
                        ? 'bg-red-50 text-red-600 border-red-200 dark:bg-red-950/30 dark:border-red-900' 
                        : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50 dark:bg-slate-700 dark:text-white dark:border-slate-600 dark:hover:bg-slate-650'
                    }`}
                  >
                    <Icon name="filter" size={11} />
                    {showOnlyMismatch ? "Tampilkan Semua" : "Hanya Selisih"}
                  </button>
                </div>
              )}
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse text-[12px] whitespace-nowrap">
                <thead>
                  <tr className="bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 text-slate-500 font-semibold text-center uppercase tracking-wider">
                    <th className="px-4 py-3 w-12 text-center">No</th>
                    <th className="px-4 py-3 text-left">Nama Regional</th>
                    <th className="px-4 py-3 text-right">Realisasi AGRI-PAM (Ton)</th>
                    <th className="px-4 py-3 text-right">Realisasi PalmOps (Ton)</th>
                    <th className="px-4 py-3 text-right">Selisih (Ton)</th>
                    <th className="px-4 py-3 w-32 text-center">Status</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-150 dark:divide-slate-750">
                  {filteredList.map((row, idx) => {
                    const hasDiff = row.status === 'MISMATCH';
                    const isMatched = row.status === 'MATCH';
                    
                    let statusBadge = (
                      <span className="text-[10px] bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold px-2 py-0.5 rounded-full uppercase">Belum Ada Data</span>
                    );
                    if (isMatched) {
                      statusBadge = (
                        <span className="text-[10px] bg-green-500 text-white font-bold px-2.5 py-0.5 rounded-full uppercase flex items-center justify-center gap-1 w-fit mx-auto shadow-sm">
                          <Icon name="check" size={10} /> Sesuai
                        </span>
                      );
                    } else if (hasDiff) {
                      statusBadge = (
                        <span className="text-[10px] bg-red-500 text-white font-bold px-2.5 py-0.5 rounded-full uppercase flex items-center justify-center gap-1 w-fit mx-auto shadow-sm animate-pulse">
                          <Icon name="x" size={10} /> Selisih
                        </span>
                      );
                    }

                    return (
                      <tr 
                        key={row.region} 
                        className={`hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-colors ${
                          hasDiff ? 'bg-red-500/5 dark:bg-red-950/10' : ''
                        }`}
                      >
                        <td className="px-4 py-2.5 text-center font-medium text-slate-400">{idx + 1}</td>
                        <td className="px-4 py-2.5 font-bold text-slate-700 dark:text-slate-200 text-left">{row.region}</td>
                        <td className="px-4 py-2.5 text-right font-semibold tabular-nums text-slate-800 dark:text-white">{formatRibuan(row.agripam)}</td>
                        <td className="px-4 py-2.5 text-right font-semibold tabular-nums text-slate-850 dark:text-slate-100">{excelData ? formatRibuan(row.palmops) : "-"}</td>
                        <td className={`px-4 py-2.5 text-right font-bold tabular-nums ${hasDiff ? 'text-red-600 dark:text-red-400' : 'text-green-600'}`}>
                          {excelData ? (row.selisih > 0 ? `+${formatRibuan(row.selisih)}` : formatRibuan(row.selisih)) : "-"}
                        </td>
                        <td className="px-4 py-2.5 text-center">{statusBadge}</td>
                      </tr>
                    );
                  })}
                  
                  <tr className="bg-slate-100 dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700 font-bold">
                    <td colSpan={2} className="px-4 py-3 text-center text-[13px] text-slate-700 dark:text-white uppercase tracking-wider">Total Nasional</td>
                    <td className="px-4 py-3 text-right text-[13px] tabular-nums text-slate-800 dark:text-white">{formatRibuan(totalAgripam)}</td>
                    <td className="px-4 py-3 text-right text-[13px] tabular-nums text-slate-850 dark:text-slate-100">{excelData ? formatRibuan(totalPalmops) : "-"}</td>
                    <td className={`px-4 py-3 text-right text-[13px] tabular-nums ${excelData && Math.abs(totalSelisih) >= 0.1 ? 'text-red-650 dark:text-red-400' : 'text-green-600'}`}>
                      {excelData ? (totalSelisih > 0 ? `+${formatRibuan(totalSelisih)}` : formatRibuan(totalSelisih)) : "-"}
                    </td>
                    <td className="px-4 py-3 text-center">
                      {excelData ? (
                        Math.abs(totalSelisih) < 0.1 ? (
                          <span className="text-[11px] text-green-600 font-bold flex items-center justify-center gap-1 w-fit mx-auto"><Icon name="check-check" size={13} /> Pas</span>
                        ) : (
                          <span className="text-[11px] text-red-600 font-bold flex items-center justify-center gap-1 w-fit mx-auto"><Icon name="alert-circle" size={13} /> Selisih</span>
                        )
                      ) : "-"}
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            
            {filteredList.length === 0 && (
              <div className="text-center py-10 bg-slate-50/20 dark:bg-slate-800/10">
                <Icon name="info" size={24} className="text-slate-400 mx-auto mb-2" />
                <p className="text-[13px] text-slate-500 font-medium">Tidak ada perbedaan data regional. Semua data cocok!</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // ROOT APP
    // ============================================================
    function App() {
      const [activeNav, setActiveNav] = useState('laporan-jam');
      const [filters, setFilters] = useState({
        cro: 'Semua CRO',
        regional: 'Semua Regional',
        tanggal: getTodayWIB(),
      });
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [realisasiRecords, setRealisasiRecords] = useState([]);
      const [estimasiData, setEstimasiData] = useState({});
      const [kemarinRecords, setKemarinRecords] = useState([]);
      const [loading, setLoading] = useState(false);

      const [theme, setTheme] = useState(localStorage.getItem("agripam_theme") || "light");

      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("agripam_theme", theme);
      }, [theme]);

      const toggleTheme = () => {
        setTheme(prev => prev === 'dark' ? 'light' : 'dark');
      };

      const getYesterdayDate = (dateStr) => {
        if (!dateStr || dateStr === 'Semua Tanggal') return '';
        const parts = dateStr.split('-');
        if (parts.length !== 3) return '';
        const d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
        d.setDate(d.getDate() - 1);
        const yyyy = d.getFullYear();
        const MM = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${MM}-${dd}`;
      };

      useEffect(() => {
        if (!filters.tanggal || filters.tanggal === 'Semua Tanggal') return;

        let active = true;
        const fetchDashboardData = async () => {
          setLoading(true);
          try {
            const sessionRaw = sessionStorage.getItem("agripam_session");
            const session = sessionRaw ? JSON.parse(sessionRaw) : null;
            const token = session ? session.token : "";

            const yesterday = getYesterdayDate(filters.tanggal);

            const [realisasiRes, estimasiRes, kemarinRes] = await Promise.all([
              fetch(`/api/realisasi?action=getData&tanggal=${filters.tanggal}&region=ALL`),
              fetch(`/api/estimasi?action=getEstimasi&tanggal=${filters.tanggal}&region=ALL&token=${token}`),
              fetch(`/api/realisasi?action=getData&tanggal=${yesterday}&region=ALL`)
            ]);

            const realisasiJson = await realisasiRes.json();
            const estimasiJson = await estimasiRes.json();
            const kemarinJson = await kemarinRes.json();

            if (active) {
              if (realisasiJson.success) {
                setRealisasiRecords(realisasiJson.allRecords || []);
              } else {
                setRealisasiRecords([]);
              }
              if (estimasiJson.success) {
                setEstimasiData(estimasiJson.allEstimasi || {});
              } else {
                setEstimasiData({});
              }
              if (kemarinJson.success) {
                setKemarinRecords(kemarinJson.allRecords || []);
              } else {
                setKemarinRecords([]);
              }
            }
          } catch (e) {
            console.error(e);
            if (active) {
              setRealisasiRecords([]);
              setEstimasiData({});
              setKemarinRecords([]);
            }
          } finally {
            if (active) setLoading(false);
          }
        };

        fetchDashboardData();
        return () => { active = false; };
      }, [filters.tanggal]);

      const regionalDetails = computeRegionalDetails(realisasiRecords, estimasiData);

      return (
        <div className="flex h-screen overflow-hidden bg-slate-50">
          {/* Sidebar */}
          <Sidebar activeNav={activeNav} setActiveNav={setActiveNav} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed} />

          {/* Main */}
          <main className="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
            <TopHeader theme={theme} toggleTheme={toggleTheme} />

            {/* Scrollable body */}
            <div className="flex-1 overflow-y-auto">
              <div className="flex flex-col gap-5 p-6 max-w-screen-2xl mx-auto w-full">
                {activeNav === 'validasi' ? (
                  <ValidationPanel 
                    realisasiRecords={realisasiRecords}
                    regionalDetails={regionalDetails}
                    selectedDate={filters.tanggal}
                  />
                ) : (
                  <>
                    <FilterBar filters={filters} setFilters={setFilters} />
                    <HourlyChartRow filters={filters} realisasiRecords={realisasiRecords} regionalDetails={regionalDetails} kemarinRecords={kemarinRecords} theme={theme} />
                    <RegionalRow filters={filters} regionalDetails={regionalDetails} />
                    <RealisasiEstimasiChart filters={filters} regionalDetails={regionalDetails} theme={theme} />
                    <TickerRow realisasiRecords={realisasiRecords} estimasiData={estimasiData} />
                  </>
                )}

                {/* Footer */}
                <footer className="text-center text-[11px] text-slate-400 py-2">
                  PATRIOT- LOYAL - PROFESIONAL
                </footer>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
