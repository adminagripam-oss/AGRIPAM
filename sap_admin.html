                    <button id="logoutBtn" class="bg-red-700 hover:bg-red-800 text-white px-4 py-2 rounded text-sm font-medium transition-colors shadow">
                        Kembali ke Dashboard
                    </button>
                </div>
            </div>
        </div>
    </nav>
    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

        <!-- Tabel Master Surat -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b bg-slate-50 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-800">Master Data Surat</h2>
                    <p class="text-xs text-slate-500 mt-1">Mengelola semua surat yang masuk dari regional.</p>
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <input type="text" id="searchSurat" oninput="renderSuratTable()" placeholder="Cari nomor surat / perihal..."
                        class="w-full sm:w-64 px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none">
                    <button id="btnAdjustFile" onclick="openAdjustFileModal()"
                        class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-4 py-2 rounded-lg text-sm font-medium transition-colors border border-indigo-200">
                        Adjust File
                    </button>
                    <button onclick="fetchSurat()"
                        class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-4 py-2 rounded-lg text-sm font-medium transition-colors border border-indigo-200">
                        Refresh Data
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-sm uppercase tracking-wider">
                            <th class="p-4 font-medium border-b">Regional</th>
                            <th class="p-4 font-medium border-b">No Surat</th>
                            <th class="p-4 font-medium border-b">Jenis</th>
                            <th class="p-4 font-medium border-b">Perihal</th>
                            <th class="p-4 font-medium border-b">Tujuan</th>
                            <th class="p-4 font-medium border-b">Status</th>
                            <th class="p-4 font-medium border-b">Tanggal Masuk</th>
                            <th class="p-4 font-medium border-b">Keterangan</th>
                            <th class="p-4 font-medium border-b text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-200">
                        <tr>
                            <td colspan="9" class="p-8 text-center text-slate-500">Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>



    <!-- KONFIGURASI SUPABASE (Hanya untuk keperluan masa depan jika butuh anon) -->
    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
            ? 'http://localhost:3000/api'
            : '/api';

        let sessionToken = null;
        let sessionRegion = null;

        async function init() {
            var rawSession = sessionStorage.getItem('agripam_session');
            if (rawSession) {
                try {
                    var s = JSON.parse(rawSession);
                    if (Date.now() <= s.expiry) {
                        sessionToken = s.token;
                        sessionRegion = s.region;
                    }
                } catch (e) { }
            }

            // Fallback: read from URL params (passed via window.open from login.html)
            if (!sessionToken) {
                var urlParams = new URLSearchParams(window.location.search);
                var urlToken = urlParams.get('token');
                var urlRegion = urlParams.get('region');
                var urlExpiry = parseInt(urlParams.get('expiry') || '0');
                if (urlToken && urlRegion && Date.now() <= urlExpiry) {
                    sessionToken = urlToken;
                    sessionRegion = urlRegion;
                    try {
                        sessionStorage.setItem('agripam_session', JSON.stringify({ token: urlToken, region: urlRegion, expiry: urlExpiry }));
                    } catch (e) { }
                }
            }

            if (!sessionToken || !sessionRegion || sessionRegion !== 'ADMIN') {
                alert("Akses ditolak! Anda bukan pengguna Admin HO.");
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = "Admin HO";

            fetchSurat();
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            // Check if we are inside an iframe
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ action: 'closeSAP' }, '*');
            } else {
                // Fallback for direct access
                window.location.href = 'login.html';
            }
        });

        async function fetchSurat() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="9" class="p-8 text-center text-slate-500">Memuat data...</td></tr>';

            try {
                const res = await fetch(`${API_BASE}/sap?action=getSurat&token=${encodeURIComponent(sessionToken)}&region=${encodeURIComponent(sessionRegion)}`);
                const jsonRes = await res.json();

                if (!jsonRes.success) throw new Error(jsonRes.message);

                window.suratData = jsonRes.data; // Simpan data secara global untuk menghindari error karakter khusus saat parsing inline
                renderSuratTable();
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="9" class="p-8 text-center text-red-500">Gagal memuat data: ${error.message}</td></tr>`;
            }
        }

        function renderSuratTable() {
            const tbody = document.getElementById('tableBody');
            const keyword = (document.getElementById('searchSurat').value || '').trim().toLowerCase();

            const allData = window.suratData || [];
            const data = keyword
                ? allData.filter(row =>
                    (row.nomor_surat || '').toLowerCase().includes(keyword) ||
                    (row.perihal || '').toLowerCase().includes(keyword))
                : allData;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="p-8 text-center text-slate-500">${keyword ? 'Surat tidak ditemukan.' : 'Belum ada surat masuk.'}</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            data.forEach(row => {
                    const date = new Date(row.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

                    let statusColor = 'bg-slate-100 text-slate-700';
                    if (row.status === 'menunggu') statusColor = 'bg-yellow-100 text-yellow-700';
                    if (row.status === 'diproses') statusColor = 'bg-blue-100 text-blue-700';
                    if (row.status === 'selesai') statusColor = 'bg-green-100 text-green-700';
                    if (row.status === 'ditolak') statusColor = 'bg-red-100 text-red-700';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="p-4 font-semibold text-indigo-700">${row.regional_pengirim || '-'}</td>
                        <td class="p-4 font-semibold text-slate-800">${row.nomor_surat}</td>
                        <td class="p-4"><span class="capitalize text-xs font-semibold bg-slate-100 px-2 py-1 rounded">${row.jenis_surat}</span></td>
                        <td class="p-4 text-slate-700">${row.perihal}</td>
                        <td class="p-4"><span id="td_tujuan_${row.id}" class="text-xs font-semibold text-purple-700 bg-purple-50 px-2 py-1 rounded">${row.tujuan || '-'}</span></td>
                        <td class="p-4">
                            <span id="statusBadge_${row.id}" class="px-2 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusColor}">
                                ${row.status}
                            </span>
                        </td>
                        <td class="p-4 whitespace-nowrap text-slate-600">${date}</td>
                        <td id="td_catatan_${row.id}" class="p-4 text-slate-600 max-w-[200px] truncate" title="${row.catatan || ''}">${row.catatan || '-'}</td>
                        <td class="p-4 text-center space-x-2">
                             ${row.file_url ? `<a href="${row.file_url}" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm font-medium">Buka File</a><span class="text-slate-300">|</span>` : '<span class="text-slate-400 text-sm">Tidak ada file</span><span class="text-slate-300">|</span>'}
                             ${row.file_url && /\.docx(\?|$)/i.test(row.file_url) ? `<button onclick="openDocxEditor('${row.id}')" class="text-emerald-600 hover:text-emerald-800 text-sm font-medium">Edit</button><span class="text-slate-300">|</span>` : ''}
                             <button onclick="toggleUpdateRow('${row.id}', this)" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">Update</button>
                             <span class="text-slate-300">|</span>
                             <button onclick="deleteSurat('${row.id}')" class="text-red-600 hover:text-red-800 text-sm font-medium">Hapus</button>
                        </td>
                    `;
                tbody.appendChild(tr);
            });
        }

        window.toggleUpdateRow = function (id, btnEl) {
            const tr = btnEl.closest('tr');
            const nextTr = tr.nextElementSibling;

            // Jika row update sudah ada, tutup (toggle)
            if (nextTr && nextTr.classList.contains('update-row')) {
                nextTr.remove();
                btnEl.textContent = 'Update';
                return;
            }

            // Tutup row update yang lain jika ada
            document.querySelectorAll('.update-row').forEach(row => {
                row.previousElementSibling.querySelector('button').textContent = 'Update';
                row.remove();
            });

            // Ambil data terbaru dari state global
            const rowData = (window.suratData || []).find(r => r.id === id) || {};
            const noSurat = rowData.nomor_surat || '-';
            const currentStatus = rowData.status || 'menunggu';
            const currentTujuan = rowData.tujuan || '';
            const currentCatatan = rowData.catatan || '';

            btnEl.textContent = 'Tutup';

            const updateTr = document.createElement('tr');
            updateTr.className = 'update-row bg-slate-50 border-b border-slate-200';
            updateTr.innerHTML = `
                <td colspan="9" class="p-4">
                    <div class="max-w-4xl mx-auto bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Status (${noSurat})</label>
                            <select id="status_${id}" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none text-sm">
                                <option value="menunggu" ${currentStatus === 'menunggu' ? 'selected' : ''}>Menunggu</option>
                                <option value="diproses" ${currentStatus === 'diproses' ? 'selected' : ''}>Diproses</option>
                                <option value="selesai" ${currentStatus === 'selesai' ? 'selected' : ''}>Selesai</option>
                                <option value="ditolak" ${currentStatus === 'ditolak' ? 'selected' : ''}>Ditolak</option>
                            </select>
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Teruskan ke Bagian</label>
                            <select id="tujuan_${id}" onchange="document.getElementById('td_tujuan_${id}').textContent = this.value || '-'" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-200 focus:border-purple-500 outline-none text-sm">
                                <option value="">-- Pilih Tujuan --</option>
                                <option value="UMUM" ${currentTujuan === 'UMUM' ? 'selected' : ''}>UMUM</option>
                                <option value="KEUANGAN" ${currentTujuan === 'KEUANGAN' ? 'selected' : ''}>KEUANGAN</option>
                                <option value="PENGADAAN" ${currentTujuan === 'PENGADAAN' ? 'selected' : ''}>PENGADAAN</option>
                                <option value="REGIONAL" ${currentTujuan === 'REGIONAL' ? 'selected' : ''}>REGIONAL</option>
                            </select>
                        </div>
                        <div class="flex-2 w-full md:w-1/3">
                            <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Catatan Disposisi</label>
                            <input type="text" id="catatan_${id}" value="${currentCatatan || ''}" placeholder="Tambahkan catatan opsional..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none text-sm">
                        </div>
                        <div class="flex items-end">
                            <button onclick="submitUpdate('${id}')" id="btn_${id}" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors shadow flex items-center h-[38px]">Simpan</button>
                        </div>
                    </div>
                    <div id="msg_${id}" class="hidden max-w-4xl mx-auto mt-2 text-sm px-3 py-2 rounded"></div>
                </td>
            `;
            tr.after(updateTr);
        };

        window.submitUpdate = async function (id) {
            const btn = document.getElementById(`btn_${id}`);
            const msg = document.getElementById(`msg_${id}`);
            const newStatus = document.getElementById(`status_${id}`).value;
            const catatan = document.getElementById(`catatan_${id}`).value;
            const tujuan = document.getElementById(`tujuan_${id}`) ? document.getElementById(`tujuan_${id}`).value : '';

            btn.disabled = true;
            btn.textContent = '...';
            msg.className = "hidden max-w-3xl mx-auto mt-2 text-sm px-3 py-2 rounded";

            try {
                const res = await fetch(`${API_BASE}/sap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: sessionToken,
                        region: sessionRegion,
                        action: 'updateSurat',
                        surat_id: id,
                        status: newStatus,
                        tujuan: tujuan,
                        catatan: catatan
                    })
                });

                const jsonRes = await res.json();
                if (!jsonRes.success) throw new Error(jsonRes.message);

                msg.textContent = jsonRes.message || "Status berhasil diupdate!";
                if (jsonRes.message && jsonRes.message.includes("TAPI")) {
                    msg.classList.add('bg-yellow-50', 'text-yellow-700', 'border', 'border-yellow-200');
                } else {
                    msg.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
                }
                msg.classList.remove('hidden');

                // Visual update immediately on the main row (to simulate fast response)
                const badge = document.getElementById(`statusBadge_${id}`);
                if (badge) {
                    badge.textContent = newStatus;
                    badge.className = `px-2 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${newStatus === 'menunggu' ? 'bg-yellow-100 text-yellow-700' : newStatus === 'diproses' ? 'bg-blue-100 text-blue-700' : newStatus === 'selesai' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
                }
                const tdTujuan = document.getElementById(`td_tujuan_${id}`);
                if (tdTujuan && tujuan) {
                    tdTujuan.textContent = tujuan;
                }
                const tdCatatan = document.getElementById(`td_catatan_${id}`);
                if (tdCatatan) {
                    tdCatatan.textContent = catatan || '-';
                    tdCatatan.title = catatan || '';
                }

                // Update the state locally too
                const rowObj = (window.suratData || []).find(r => r.id === id);
                if (rowObj) {
                    rowObj.status = newStatus;
                    rowObj.tujuan = tujuan;
                    rowObj.catatan = catatan;
                }

                // Refresh table after short delay
                setTimeout(fetchSurat, 500);

            } catch (err) {
                msg.textContent = "Error: " + err.message;
                msg.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                msg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Simpan';
            }
        };

        window.deleteSurat = async function (id) {
            if (!confirm("Apakah Anda yakin ingin menghapus surat ini? Data tidak dapat dikembalikan.")) return;

            try {
                const res = await fetch(`${API_BASE}/sap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: sessionToken,
                        region: sessionRegion,
                        action: 'deleteSurat',
                        surat_id: id
                    })
                });

                const jsonRes = await res.json();
                if (!jsonRes.success) throw new Error(jsonRes.message);

                alert("Surat berhasil dihapus.");
                fetchSurat(); // Refresh table

            } catch (err) {
                alert("Gagal menghapus surat: " + err.message);
            }
        };

        // JS Logic for Adjust File Modal
        window.openAdjustFileModal = function () {
            const modal = document.getElementById('adjustFileModal');
            modal.classList.add('active');
            setTimeout(() => {
                const inner = modal.querySelector('.modal-content');
                inner.classList.remove('scale-95', 'opacity-0');
                inner.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closeAdjustFileModal = function () {
            const modal = document.getElementById('adjustFileModal');
            const inner = modal.querySelector('.modal-content');
            inner.classList.remove('scale-100', 'opacity-100');
            inner.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.remove('active');
                document.getElementById('adminSuratForm').reset();
                document.getElementById('adminFormMsg').className = "hidden text-sm p-3 rounded mt-2";
            }, 300);
        };

        // Form Submit Handler for Admin Uploading Surat
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('adminSuratForm');
            if (!form) return;
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('adminSubmitSuratBtn');
                const loading = document.getElementById('adminSubmitLoading');
                const msg = document.getElementById('adminFormMsg');

                btn.disabled = true;
                loading.classList.remove('hidden');
                msg.className = "hidden text-sm p-3 rounded mt-2";

                const fileInput = document.getElementById('admin_file_surat');
                const file = fileInput.files[0];

                // Validasi ukuran file (Max 5 MB)
                const maxSize = 5 * 1024 * 1024; // 5 MB
                if (file && file.size > maxSize) {
                    msg.textContent = "Error: Ukuran file melebihi batas maksimal 5 MB.";
                    msg.className = "text-sm p-3 rounded mt-2 bg-red-50 text-red-700 border border-red-200";
                    msg.classList.remove('hidden');
                    btn.disabled = false;
                    loading.classList.add('hidden');
                    return;
                }

                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    try {
                        const base64Data = reader.result.split(',')[1];
                        const res = await fetch(`${API_BASE}/sap`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                token: sessionToken,
                                region: sessionRegion,
                                action: 'insertSurat',
                                nomor_surat: document.getElementById('admin_nomor_surat').value,
                                jenis_surat: document.getElementById('admin_jenis_surat').value,
                                perihal: document.getElementById('admin_perihal').value,
                                fileData: base64Data,
                                fileName: fileName,
                                mimeType: file.type
                            })
                        });

                        const jsonRes = await res.json();
                        if (!jsonRes.success) throw new Error(jsonRes.message);

                        msg.textContent = "Surat berhasil diupload dan disimpan!";
                        msg.className = "text-sm p-3 rounded mt-2 bg-green-50 text-green-700 border border-green-200";
                        document.getElementById('adminSuratForm').reset();

                        // Refresh data table
                        fetchSurat();

                        // Close modal after short delay
                        setTimeout(closeAdjustFileModal, 1500);

                    } catch (err) {
                        msg.textContent = "Error: " + err.message;
                        msg.className = "text-sm p-3 rounded mt-2 bg-red-50 text-red-700 border border-red-200";
                    } finally {
                        btn.disabled = false;
                        loading.classList.add('hidden');
                    }
                };
                reader.onerror = () => {
                    msg.textContent = "Error: Gagal membaca file.";
                    msg.className = "text-sm p-3 rounded mt-2 bg-red-50 text-red-700 border border-red-200";
                    btn.disabled = false;
                    loading.classList.add('hidden');
                };
            });
        });

        init();
    </script>

    <!-- MODAL ADJUST FILE (Upload Surat Baru) -->

                class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition-colors">

                        <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Surat</label>
                        <select id="admin_jenis_surat" required
                            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none text-sm">
                            <option value="masuk">Surat Masuk</option>
                            <option value="permintaan">Surat Permintaan</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Perihal</label>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">File Surat (PDF / Word)</label>

                </div>

                <div id="adminFormMsg" class="hidden text-sm p-3 rounded mt-2"></div>

                <div class="flex justify-end pt-2 space-x-2">
                    <button type="button" onclick="closeAdjustFileModal()"
                        class="px-4 py-2 border rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">Batal</button>
                    <button type="submit" id="adminSubmitSuratBtn"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center shadow-md text-sm">
                        <span>Upload & Simpan</span>
                        <svg id="adminSubmitLoading" class="hidden animate-spin ml-2 h-4 w-4 text-white"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL EDIT DOKUMEN DOCX -->
    <div id="docxEditorModal" class="modal fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl border border-slate-200 w-full max-w-3xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b">
                <h2 class="text-lg font-bold text-slate-800">Edit Dokumen Surat</h2>
                <button onclick="closeDocxEditor()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto">
                <div id="docxEditorLoading" class="text-center text-sm text-slate-500 py-8">Memuat dokumen...</div>
                <div id="docxEditorToolbar" class="hidden flex-wrap items-center gap-1 border border-slate-300 border-b-0 rounded-t-lg bg-slate-50 p-2">
                    <button type="button" onclick="docxExec('bold')" class="px-2 py-1 rounded hover:bg-slate-200 font-bold text-sm" title="Bold">B</button>
                    <button type="button" onclick="docxExec('italic')" class="px-2 py-1 rounded hover:bg-slate-200 italic text-sm" title="Italic">I</button>
                    <button type="button" onclick="docxExec('underline')" class="px-2 py-1 rounded hover:bg-slate-200 underline text-sm" title="Underline">U</button>
                    <span class="w-px h-5 bg-slate-300 mx-1"></span>
                    <button type="button" onclick="docxExec('formatBlock', 'H1')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm font-semibold" title="Heading 1">H1</button>
                    <button type="button" onclick="docxExec('formatBlock', 'H2')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm font-semibold" title="Heading 2">H2</button>
                    <button type="button" onclick="docxExec('formatBlock', 'P')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Paragraf">P</button>
                    <span class="w-px h-5 bg-slate-300 mx-1"></span>
                    <button type="button" onclick="docxExec('insertUnorderedList')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Bullet List">&#8226; List</button>
                    <button type="button" onclick="docxExec('insertOrderedList')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Numbered List">1. List</button>
                    <span class="w-px h-5 bg-slate-300 mx-1"></span>
                    <button type="button" onclick="docxExec('justifyLeft')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Rata Kiri">&#8676;</button>
                    <button type="button" onclick="docxExec('justifyCenter')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Rata Tengah">&#8596;</button>
                    <button type="button" onclick="docxExec('justifyRight')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Rata Kanan">&#8677;</button>
                    <button type="button" onclick="docxExec('justifyFull')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Rata Kiri-Kanan">&#8801;</button>
                </div>
                <div id="docxEditorContainer" contenteditable="true"
                    class="hidden border border-slate-300 rounded-b-lg p-4 focus:outline-none"
                    style="min-height: 400px;"></div>
                <div id="docxEditorMsg" class="hidden text-sm p-3 rounded mt-3"></div>
            </div>
            <div class="flex justify-end gap-2 p-4 border-t">
                <button type="button" onclick="closeDocxEditor()"
                    class="px-4 py-2 border rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">Batal</button>
                <button type="button" id="docxEditorSaveBtn" onclick="saveDocxEditor()"
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-md text-sm">Simpan
                    Dokumen</button>
            </div>
        </div>
    </div>

    <script>
        let docxEditorSuratId = null;

        window.docxExec = function (cmd, value) {
            document.getElementById('docxEditorContainer').focus();
            document.execCommand(cmd, false, value);
        };

        window.openDocxEditor = async function (id) {
            const rowData = (window.suratData || []).find(r => r.id === id) || {};
            const fileUrl = rowData.file_url;
            if (!fileUrl) return;

            docxEditorSuratId = id;
            const modal = document.getElementById('docxEditorModal');
            const loading = document.getElementById('docxEditorLoading');
            const toolbar = document.getElementById('docxEditorToolbar');
            const container = document.getElementById('docxEditorContainer');
            const msg = document.getElementById('docxEditorMsg');

            modal.classList.add('active');
            loading.classList.remove('hidden');
            loading.textContent = 'Memuat dokumen...';
            toolbar.classList.add('hidden');
            container.classList.add('hidden');
            msg.className = 'hidden text-sm p-3 rounded mt-3';

            try {
                const res = await fetch(fileUrl);
                if (!res.ok) throw new Error('Gagal mengunduh file (' + res.status + ')');
                const arrayBuffer = await res.arrayBuffer();
                const result = await mammoth.convertToHtml({ arrayBuffer });
                container.innerHTML = result.value;

                loading.classList.add('hidden');
                toolbar.classList.remove('hidden');
                toolbar.classList.add('flex');
                container.classList.remove('hidden');
            } catch (err) {
                loading.textContent = 'Gagal memuat dokumen: ' + err.message;
            }
        };

        window.closeDocxEditor = function () {
            document.getElementById('docxEditorModal').classList.remove('active');
            docxEditorSuratId = null;
        };

        window.saveDocxEditor = async function () {
            if (!docxEditorSuratId) return;
            const btn = document.getElementById('docxEditorSaveBtn');
            const msg = document.getElementById('docxEditorMsg');

            btn.disabled = true;
            btn.textContent = 'Menyimpan...';
            msg.className = 'hidden text-sm p-3 rounded mt-3';

            try {
                const res = await fetch(`${API_BASE}/sap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: sessionToken,
                        region: sessionRegion,
                        action: 'saveSuratDocx',
                        surat_id: docxEditorSuratId,
                        htmlContent: document.getElementById('docxEditorContainer').innerHTML
                    })
                });

                const jsonRes = await res.json();
                if (!jsonRes.success) throw new Error(jsonRes.message);

                msg.textContent = 'Dokumen berhasil disimpan!';
                msg.className = 'text-sm p-3 rounded mt-3 bg-green-50 text-green-700 border border-green-200';
                msg.classList.remove('hidden');

                fetchSurat();
                setTimeout(closeDocxEditor, 1200);
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
                msg.className = 'text-sm p-3 rounded mt-3 bg-red-50 text-red-700 border border-red-200';
                msg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Simpan Dokumen';
            }
        };
    </script>
</body>

</html>
