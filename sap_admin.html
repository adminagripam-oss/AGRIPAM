<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SAP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f8fafc; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen flex flex-col relative">

    <!-- Navbar -->
    <nav class="bg-indigo-900 text-white shadow-md z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <span class="font-bold text-xl tracking-tight">SAP Admin (HO)</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm font-medium" id="userName">Admin</span>
                    <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded text-sm font-medium transition-colors shadow">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Tabel Master Surat -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-slate-800">Master Data Surat</h2>
                    <p class="text-xs text-slate-500 mt-1">Mengelola semua surat yang masuk dari regional.</p>
                </div>
                <button onclick="fetchSurat()" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-4 py-2 rounded-lg text-sm font-medium transition-colors border border-indigo-200">
                    Refresh Data
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-sm uppercase tracking-wider">
                            <th class="p-4 font-medium border-b">Regional</th>
                            <th class="p-4 font-medium border-b">No Surat</th>
                            <th class="p-4 font-medium border-b">Tujuan</th>
                            <th class="p-4 font-medium border-b">Perihal</th>
                            <th class="p-4 font-medium border-b">Status</th>
                            <th class="p-4 font-medium border-b">Tanggal Masuk</th>
                            <th class="p-4 font-medium border-b text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-200">
                        <tr><td colspan="7" class="p-8 text-center text-slate-500">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Modal Update Status -->
    <div id="statusModal" class="modal fixed inset-0 z-50 items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-6 relative transform transition-all">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <h3 class="text-lg font-bold text-slate-800 mb-1">Update Status Surat</h3>
            <p class="text-sm text-slate-500 mb-4" id="modalNoSurat">No Surat: -</p>

            <form id="updateForm" class="space-y-4">
                <input type="hidden" id="modalSuratId">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Ubah Status</label>
                    <select id="modalStatus" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none">
                        <option value="menunggu">Menunggu</option>
                        <option value="diproses">Diproses</option>
                        <option value="selesai">Selesai</option>
                        <option value="ditolak">Ditolak</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Catatan Disposisi (Opsional)</label>
                    <textarea id="modalCatatan" rows="3" placeholder="Tambahkan catatan untuk regional..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none resize-none"></textarea>
                </div>

                <div id="modalMsg" class="hidden text-sm p-3 rounded mt-2"></div>

                <div class="flex justify-end space-x-3 pt-4 border-t">
                    <button type="button" id="cancelModalBtn" class="px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition-colors">Batal</button>
                    <button type="submit" id="submitUpdateBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center shadow-md">
                        <span>Simpan Perubahan</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- KONFIGURASI SUPABASE (Hanya untuk keperluan masa depan jika butuh anon) -->
    <script>
        let sessionToken = null;
        let sessionRegion = null;

        async function init() {
            sessionToken = localStorage.getItem('sessionToken');
            sessionRegion = localStorage.getItem('sessionRegion');

            if (!sessionToken || !sessionRegion || sessionRegion !== 'ADMIN') {
                alert("Akses ditolak! Anda bukan pengguna Admin HO.");
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = "Admin HO";

            fetchSurat();
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            localStorage.removeItem('sessionToken');
            localStorage.removeItem('sessionRegion');
            window.location.href = 'login.html';
        });

        async function fetchSurat() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-slate-500">Memuat data...</td></tr>';

            try {
                const res = await fetch(`/api/sap?action=getSurat&token=${encodeURIComponent(sessionToken)}&region=${encodeURIComponent(sessionRegion)}`);
                const jsonRes = await res.json();

                if (!jsonRes.success) throw new Error(jsonRes.message);

                const data = jsonRes.data;

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-slate-500">Belum ada surat masuk.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(row => {
                    const date = new Date(row.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
                    
                    let statusColor = 'bg-slate-100 text-slate-700';
                    if(row.status === 'menunggu') statusColor = 'bg-yellow-100 text-yellow-700';
                    if(row.status === 'diproses') statusColor = 'bg-blue-100 text-blue-700';
                    if(row.status === 'selesai') statusColor = 'bg-green-100 text-green-700';
                    if(row.status === 'ditolak') statusColor = 'bg-red-100 text-red-700';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="p-4 font-semibold text-indigo-700">${row.regional_pengirim || '-'}</td>
                        <td class="p-4 font-semibold text-slate-800">${row.nomor_surat}</td>
                        <td class="p-4"><span class="capitalize text-xs font-semibold bg-slate-100 px-2 py-1 rounded">${row.jenis_surat}</span></td>
                        <td class="p-4 text-slate-700">${row.perihal}</td>
                        <td class="p-4">
                            <span id="statusBadge_${row.id}" class="px-2 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusColor}">
                                ${row.status}
                            </span>
                        </td>
                        <td class="p-4 whitespace-nowrap text-slate-600">${date}</td>
                        <td class="p-4 text-center space-x-2">
                            <a href="${row.file_url}" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm font-medium">Buka PDF</a>
                            <span class="text-slate-300">|</span>
                            <button onclick="openModal('${row.id}', '${row.nomor_surat}', '${row.status}')" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">Update</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500">Gagal memuat data: ${error.message}</td></tr>`;
            }
        }

        // Modal Logic
        const modal = document.getElementById('statusModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');

        function openModal(id, noSurat, currentStatus) {
            document.getElementById('modalSuratId').value = id;
            document.getElementById('modalNoSurat').textContent = `No Surat: ${noSurat}`;
            document.getElementById('modalStatus').value = currentStatus;
            document.getElementById('modalCatatan').value = '';
            document.getElementById('modalMsg').classList.add('hidden');
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        closeModalBtn.addEventListener('click', closeModal);
        cancelModalBtn.addEventListener('click', closeModal);

        document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitUpdateBtn');
            const msg = document.getElementById('modalMsg');
            
            btn.disabled = true;
            btn.textContent = 'Menyimpan...';
            msg.className = "hidden text-sm p-3 rounded mt-2";

            const suratId = document.getElementById('modalSuratId').value;
            const newStatus = document.getElementById('modalStatus').value;
            const catatan = document.getElementById('modalCatatan').value;

            try {
                const res = await fetch('/api/sap', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: sessionToken,
                        region: sessionRegion,
                        action: 'updateSurat',
                        surat_id: suratId,
                        status: newStatus,
                        catatan: catatan
                    })
                });

                const jsonRes = await res.json();
                if (!jsonRes.success) throw new Error(jsonRes.message);

                msg.textContent = "Status berhasil diupdate!";
                msg.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
                msg.classList.remove('hidden');

                fetchSurat(); // Refresh table
                setTimeout(closeModal, 1500);

            } catch (err) {
                msg.textContent = "Error: " + err.message;
                msg.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                msg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Simpan Perubahan';
            }
        });

        init();
    </script>
</body>
</html>
