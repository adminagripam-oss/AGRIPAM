<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Dashboard - SAP</title>
    <link rel="icon" type="image/jpeg" href="LOGO AGRIPAM.jpeg">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Mammoth.js (docx -> HTML) for in-browser DOCX editing -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <!-- Google Fonts (Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>

<body class="text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="text-white shadow-md" style="background-color: #4bacc6;">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex flex-col justify-center">
                    <div class="flex items-center space-x-2">
                        <span class="font-bold text-lg leading-none tracking-tight">One Archives Agri-paM</span>
                        <span class="bg-blue-600 px-2 py-0.5 rounded text-[10px] font-semibold leading-none" id="regionBadge">Memuat...</span>
                    </div>
                    <span class="text-xs text-cyan-50 font-medium mt-1" id="userName">User Regional</span>
                </div>
                <div class="flex justify-center items-center">
                    <img src="AGRINAS DANANTARA.png" alt="Logo Agrinas Palma Nusantara" class="h-8 w-auto">
                </div>
                <div class="flex items-center space-x-4">
                    <button id="logoutBtn"
                        class="bg-red-700 hover:bg-red-800 text-white px-4 py-2 rounded text-sm font-medium transition-colors shadow">
                        Kembali ke Dashboard
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

        <!-- Form Input Surat -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 class="text-xl font-bold text-slate-800 mb-4 border-b pb-2">Input Surat Baru</h2>
            <form id="suratForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nomor Surat</label>
                        <input type="text" id="nomor_surat" required
                            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Surat</label>
                        <select id="jenis_surat" required
                            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">
                            <option value="masuk">Surat Masuk</option>
                            <option value="permintaan">Surat Permintaan</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Perihal</label>
                    <input type="text" id="perihal" required
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">File Surat (PDF / Word)</label>
                    <input type="file" id="file_surat" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" required
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <div id="formMsg" class="hidden text-sm p-3 rounded mt-2"></div>

                <div class="flex justify-end pt-2">
                    <button type="submit" id="submitSuratBtn"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center shadow-md">
                        <span>Upload & Simpan</span>
                        <svg id="submitLoading" class="hidden animate-spin ml-2 h-4 w-4 text-white"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabel Monitoring -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b bg-slate-50 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                <h2 class="text-xl font-bold text-slate-800">Monitoring Surat Saya</h2>
                <div class="flex flex-wrap items-center gap-3">
                    <input type="text" id="searchSurat" oninput="renderSuratTable()" placeholder="Cari nomor surat / perihal..."
                        class="w-full sm:w-64 px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">
                    <button onclick="fetchSurat()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">Refresh
                        Data</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 text-sm uppercase tracking-wider">
                            <th class="p-4 font-medium border-b">Tanggal</th>
                            <th class="p-4 font-medium border-b">No Surat</th>
                            <th class="p-4 font-medium border-b">Jenis</th>
                            <th class="p-4 font-medium border-b">Perihal</th>
                            <th class="p-4 font-medium border-b">Status</th>
                            <th class="p-4 font-medium border-b">Tujuan</th>
                            <th class="p-4 font-medium border-b">File</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-200">
                        <tr>
                            <td colspan="7" class="p-8 text-center text-slate-500">Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- KONFIGURASI SUPABASE (Hanya untuk upload PDF ke Storage anonim) -->
    <script>

        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
            ? 'http://localhost:3000/api'
            : '/api';

        let sessionToken = null;
        let sessionRegion = null;

        async function init() {
            var rawSession = sessionStorage.getItem('agripam_session');
            if (rawSession) {
                try {
                    var s = JSON.parse(rawSession);
                    if (Date.now() <= s.expiry) {
                        sessionToken = s.token;
                        sessionRegion = s.region;
                    }
                } catch (e) { }
            }

            // Fallback: read from URL params (passed via window.open from login.html)
            if (!sessionToken) {
                var urlParams = new URLSearchParams(window.location.search);
                var urlToken = urlParams.get('token');
                var urlRegion = urlParams.get('region');
                var urlExpiry = parseInt(urlParams.get('expiry') || '0');
                if (urlToken && urlRegion && Date.now() <= urlExpiry) {
                    sessionToken = urlToken;
                    sessionRegion = urlRegion;
                    // Save to sessionStorage for subsequent requests
                    try {
                        sessionStorage.setItem('agripam_session', JSON.stringify({ token: urlToken, region: urlRegion, expiry: urlExpiry }));
                    } catch (e) { }
                }
            }

            if (!sessionToken || !sessionRegion || sessionRegion === 'ADMIN') {
                alert("Akses ditolak! Silakan login melalui Portal Utama Agripam.");
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = "User Regional";
            document.getElementById('regionBadge').textContent = sessionRegion;

            fetchSurat();
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            // Check if we are inside an iframe
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ action: 'closeSAP' }, '*');
            } else {
                // Fallback for direct access
                window.location.replace('login.html');
            }
        });

        // Pageshow guard — cegah akses halaman dari bfcache setelah logout
        window.addEventListener("pageshow", function (event) {
            if (event.persisted) {
                var raw = sessionStorage.getItem('agripam_session');
                if (!raw) {
                    window.location.replace('login.html');
                    return;
                }
                try {
                    var s = JSON.parse(raw);
                    if (Date.now() > s.expiry) {
                        sessionStorage.removeItem('agripam_session');
                        window.location.replace('login.html');
                    }
                } catch (e) {
                    sessionStorage.removeItem('agripam_session');
                    window.location.replace('login.html');
                }
            }
        });

        // Form Submit Handler
        document.getElementById('suratForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitSuratBtn');
            const loading = document.getElementById('submitLoading');
            const msg = document.getElementById('formMsg');

            btn.disabled = true;
            loading.classList.remove('hidden');
            msg.className = "hidden text-sm p-3 rounded mt-2";

            const fileInput = document.getElementById('file_surat');
            const file = fileInput.files[0];

            // Validasi ukuran file (Max 50 MB)
            const maxSize = 50 * 1024 * 1024; // 50 MB
            if (file && file.size > maxSize) {
                msg.textContent = "Error: Ukuran file melebihi batas maksimal 50 MB.";
                msg.className = "text-sm p-3 rounded mt-2 bg-red-50 text-red-700 border border-red-200";
                msg.classList.remove('hidden');
                btn.disabled = false;
                loading.classList.add('hidden');
                return;
            }

            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    const base64Data = reader.result.split(',')[1];
                    const res = await fetch(`${API_BASE}/sap`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            token: sessionToken,
                            region: sessionRegion,
                            action: 'insertSurat',
                            nomor_surat: document.getElementById('nomor_surat').value,
                            jenis_surat: document.getElementById('jenis_surat').value,
                            perihal: document.getElementById('perihal').value,
                            fileData: base64Data,
                            fileName: fileName,
                            mimeType: file.type
                        })
                    });

                    const jsonRes = await res.json();
                    if (!jsonRes.success) throw new Error(jsonRes.message);

                    msg.textContent = "Surat berhasil diupload dan disimpan!";
                    msg.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
                    msg.classList.remove('hidden');
                    document.getElementById('suratForm').reset();
                    fetchSurat(); // Refresh table

                } catch (err) {
                    msg.textContent = "Error: " + err.message;
                    msg.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                    msg.classList.remove('hidden');
                } finally {
                    btn.disabled = false;
                    loading.classList.add('hidden');
                }
            };
            reader.onerror = () => {
                msg.textContent = "Error: Gagal membaca file.";
                msg.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                msg.classList.remove('hidden');
                btn.disabled = false;
                loading.classList.add('hidden');
            };
        });

        // Fetch Data Surat
        async function fetchSurat() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-500">Memuat data...</td></tr>';

            try {
                const res = await fetch(`${API_BASE}/sap?action=getSurat&token=${encodeURIComponent(sessionToken)}&region=${encodeURIComponent(sessionRegion)}`);
                const jsonRes = await res.json();

                if (!jsonRes.success) throw new Error(jsonRes.message);

                window.suratData = jsonRes.data;
                renderSuratTable();
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500">Gagal memuat data: ${error.message}</td></tr>`;
            }
        }

        function renderSuratTable() {
            const tbody = document.getElementById('tableBody');
            const keyword = (document.getElementById('searchSurat').value || '').trim().toLowerCase();

            const allData = window.suratData || [];
            const data = keyword
                ? allData.filter(row =>
                    (row.nomor_surat || '').toLowerCase().includes(keyword) ||
                    (row.perihal || '').toLowerCase().includes(keyword))
                : allData;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-500">${keyword ? 'Surat tidak ditemukan.' : 'Belum ada surat yang diinput.'}</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            data.forEach(row => {
                const date = new Date(row.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

                let statusColor = 'bg-slate-100 text-slate-700';
                if (row.status === 'menunggu') statusColor = 'bg-yellow-100 text-yellow-700';
                if (row.status === 'diproses') statusColor = 'bg-blue-100 text-blue-700';
                if (row.status === 'selesai') statusColor = 'bg-green-100 text-green-700';
                if (row.status === 'ditolak') statusColor = 'bg-red-100 text-red-700';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4 whitespace-nowrap text-slate-600">${date}</td>
                    <td class="p-4 font-semibold text-slate-800">${row.nomor_surat}</td>
                    <td class="p-4"><span class="capitalize text-xs font-semibold bg-slate-100 px-2 py-1 rounded">${row.jenis_surat}</span></td>
                    <td class="p-4 text-slate-700">${row.perihal}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusColor}">
                            ${row.status}
                        </span>
                    </td>
                    <td class="p-4"><span class="text-xs font-semibold text-purple-700 bg-purple-50 px-2 py-1 rounded">${row.tujuan || '-'}</span></td>
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                        ${row.file_url ? `<a href="${row.file_url}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>Buka File</a>` : '<span class="text-slate-400 text-sm">Tidak ada file</span>'}
                        ${row.file_url && /\.docx(\?|$)/i.test(row.file_url) ? `<button onclick="openDocxEditor('${row.id}')" class="text-emerald-600 hover:text-emerald-800 text-sm font-medium">Edit</button>` : ''}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        init();
    </script>

    <!-- MODAL EDIT DOKUMEN DOCX -->
    <div id="docxEditorModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl border border-slate-200 w-full max-w-3xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b">
                <h2 class="text-lg font-bold text-slate-800">Edit Dokumen Surat</h2>
                <button onclick="closeDocxEditor()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto">
                <div id="docxEditorLoading" class="text-center text-sm text-slate-500 py-8">Memuat dokumen...</div>
                <div id="docxEditorToolbar" class="hidden flex-wrap items-center gap-1 border border-slate-300 border-b-0 rounded-t-lg bg-slate-50 p-2">
                    <button type="button" onclick="docxExec('bold')" class="px-2 py-1 rounded hover:bg-slate-200 font-bold text-sm" title="Bold">B</button>
                    <button type="button" onclick="docxExec('italic')" class="px-2 py-1 rounded hover:bg-slate-200 italic text-sm" title="Italic">I</button>
                    <button type="button" onclick="docxExec('underline')" class="px-2 py-1 rounded hover:bg-slate-200 underline text-sm" title="Underline">U</button>
                    <span class="w-px h-5 bg-slate-300 mx-1"></span>
                    <button type="button" onclick="docxExec('formatBlock', 'H1')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm font-semibold" title="Heading 1">H1</button>
                    <button type="button" onclick="docxExec('formatBlock', 'H2')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm font-semibold" title="Heading 2">H2</button>
                    <button type="button" onclick="docxExec('formatBlock', 'P')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Paragraf">P</button>
                    <span class="w-px h-5 bg-slate-300 mx-1"></span>
                    <button type="button" onclick="docxExec('insertUnorderedList')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Bullet List">&#8226; List</button>
                    <button type="button" onclick="docxExec('insertOrderedList')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Numbered List">1. List</button>
                    <span class="w-px h-5 bg-slate-300 mx-1"></span>
                    <button type="button" onclick="docxExec('justifyLeft')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Rata Kiri">&#8676;</button>
                    <button type="button" onclick="docxExec('justifyCenter')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Rata Tengah">&#8596;</button>
                    <button type="button" onclick="docxExec('justifyRight')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Rata Kanan">&#8677;</button>
                    <button type="button" onclick="docxExec('justifyFull')" class="px-2 py-1 rounded hover:bg-slate-200 text-sm" title="Rata Kiri-Kanan">&#8801;</button>
                </div>
                <div id="docxEditorContainer" contenteditable="true"
                    class="hidden border border-slate-300 rounded-b-lg p-4 focus:outline-none"
                    style="min-height: 400px;"></div>
                <div id="docxEditorMsg" class="hidden text-sm p-3 rounded mt-3"></div>
            </div>
            <div class="flex justify-end gap-2 p-4 border-t">
                <button type="button" onclick="closeDocxEditor()"
                    class="px-4 py-2 border rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">Batal</button>
                <button type="button" id="docxEditorSaveBtn" onclick="saveDocxEditor()"
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-md text-sm">Simpan
                    Dokumen</button>
            </div>
        </div>
    </div>

    <script>
        let docxEditorSuratId = null;

        window.docxExec = function (cmd, value) {
            document.getElementById('docxEditorContainer').focus();
            document.execCommand(cmd, false, value);
        };

        window.openDocxEditor = async function (id) {
            const rowData = (window.suratData || []).find(r => r.id === id) || {};
            const fileUrl = rowData.file_url;
            if (!fileUrl) return;

            docxEditorSuratId = id;
            const modal = document.getElementById('docxEditorModal');
            const loading = document.getElementById('docxEditorLoading');
            const toolbar = document.getElementById('docxEditorToolbar');
            const container = document.getElementById('docxEditorContainer');
            const msg = document.getElementById('docxEditorMsg');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            loading.classList.remove('hidden');
            loading.textContent = 'Memuat dokumen...';
            toolbar.classList.add('hidden');
            container.classList.add('hidden');
            msg.className = 'hidden text-sm p-3 rounded mt-3';

            try {
                const res = await fetch(fileUrl);
                if (!res.ok) throw new Error('Gagal mengunduh file (' + res.status + ')');
                const arrayBuffer = await res.arrayBuffer();
                const result = await mammoth.convertToHtml({ arrayBuffer });
                container.innerHTML = result.value;

                loading.classList.add('hidden');
                toolbar.classList.remove('hidden');
                toolbar.classList.add('flex');
                container.classList.remove('hidden');
            } catch (err) {
                loading.textContent = 'Gagal memuat dokumen: ' + err.message;
            }
        };

        window.closeDocxEditor = function () {
            const modal = document.getElementById('docxEditorModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            docxEditorSuratId = null;
        };

        window.saveDocxEditor = async function () {
            if (!docxEditorSuratId) return;
            const btn = document.getElementById('docxEditorSaveBtn');
            const msg = document.getElementById('docxEditorMsg');

            btn.disabled = true;
            btn.textContent = 'Menyimpan...';
            msg.className = 'hidden text-sm p-3 rounded mt-3';

            try {
                const res = await fetch(`${API_BASE}/sap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: sessionToken,
                        region: sessionRegion,
                        action: 'saveSuratDocx',
                        surat_id: docxEditorSuratId,
                        htmlContent: document.getElementById('docxEditorContainer').innerHTML
                    })
                });

                const jsonRes = await res.json();
                if (!jsonRes.success) throw new Error(jsonRes.message);

                msg.textContent = 'Dokumen berhasil disimpan!';
                msg.className = 'text-sm p-3 rounded mt-3 bg-green-50 text-green-700 border border-green-200';
                msg.classList.remove('hidden');

                fetchSurat();
                setTimeout(closeDocxEditor, 1200);
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
                msg.className = 'text-sm p-3 rounded mt-3 bg-red-50 text-red-700 border border-red-200';
                msg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Simpan Dokumen';
            }
        };
    </script>
</body>

</html>
