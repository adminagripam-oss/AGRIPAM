<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Dashboard - SAP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <span class="font-bold text-xl tracking-tight">SAP Regional</span>
                    <span class="bg-blue-600 px-2 py-1 rounded text-xs font-semibold" id="regionBadge">Memuat...</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm" id="userName">User</span>
                    <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded text-sm font-medium transition-colors shadow">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Form Input Surat -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 class="text-xl font-bold text-slate-800 mb-4 border-b pb-2">Input Surat Baru</h2>
            <form id="suratForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nomor Surat</label>
                        <input type="text" id="nomor_surat" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Surat</label>
                        <select id="jenis_surat" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">
                            <option value="masuk">Surat Masuk</option>
                            <option value="permintaan">Surat Permintaan</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Perihal</label>
                    <input type="text" id="perihal" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">File Surat (PDF)</label>
                    <input type="file" id="file_surat" accept="application/pdf" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-200 outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <div id="formMsg" class="hidden text-sm p-3 rounded mt-2"></div>

                <div class="flex justify-end pt-2">
                    <button type="submit" id="submitSuratBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center shadow-md">
                        <span>Upload & Simpan</span>
                        <svg id="submitLoading" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabel Monitoring -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800">Monitoring Surat Saya</h2>
                <button onclick="fetchSurat()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">Refresh Data</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-sm uppercase tracking-wider">
                            <th class="p-4 font-medium border-b">Tanggal</th>
                            <th class="p-4 font-medium border-b">No Surat</th>
                            <th class="p-4 font-medium border-b">Tujuan</th>
                            <th class="p-4 font-medium border-b">Perihal</th>
                            <th class="p-4 font-medium border-b">Status</th>
                            <th class="p-4 font-medium border-b">File</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-200">
                        <tr><td colspan="6" class="p-8 text-center text-slate-500">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- KONFIGURASI SUPABASE (Hanya untuk upload PDF ke Storage anonim) -->
    <script>
        const SUPABASE_URL = 'https://YOUR_PROJECT_REF.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let sessionToken = null;
        let sessionRegion = null;

        async function init() {
            sessionToken = localStorage.getItem('sessionToken');
            sessionRegion = localStorage.getItem('sessionRegion');

            if (!sessionToken || !sessionRegion || sessionRegion === 'ADMIN') {
                alert("Akses ditolak! Silakan login melalui Portal Utama Agripam.");
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = "User Regional";
            document.getElementById('regionBadge').textContent = sessionRegion;

            fetchSurat();
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            localStorage.removeItem('sessionToken');
            localStorage.removeItem('sessionRegion');
            window.location.href = 'login.html';
        });

        // Form Submit Handler
        document.getElementById('suratForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitSuratBtn');
            const loading = document.getElementById('submitLoading');
            const msg = document.getElementById('formMsg');
            
            btn.disabled = true;
            loading.classList.remove('hidden');
            msg.className = "hidden text-sm p-3 rounded mt-2";

            const fileInput = document.getElementById('file_surat');
            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
            
            try {
                // 1. Upload File ke Storage (Anonim dibolehkan di public bucket berkas_surat)
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('berkas_surat')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 2. Dapatkan URL Public
                const { data: { publicUrl } } = supabase.storage
                    .from('berkas_surat')
                    .getPublicUrl(fileName);

                // 3. Insert ke Tabel Surat (via Backend API Agripam)
                const res = await fetch('/api/sap_insertSurat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: sessionToken,
                        region: sessionRegion,
                        nomor_surat: document.getElementById('nomor_surat').value,
                        jenis_surat: document.getElementById('jenis_surat').value,
                        perihal: document.getElementById('perihal').value,
                        file_url: publicUrl
                    })
                });

                const jsonRes = await res.json();
                if (!jsonRes.success) throw new Error(jsonRes.message);

                msg.textContent = "Surat berhasil diupload dan disimpan!";
                msg.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
                msg.classList.remove('hidden');
                document.getElementById('suratForm').reset();
                fetchSurat(); // Refresh table

            } catch (err) {
                msg.textContent = "Error: " + err.message;
                msg.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                msg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        });

        // Fetch Data Surat
        async function fetchSurat() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-500">Memuat data...</td></tr>';

            try {
                const res = await fetch(`/api/sap_getSurat?token=${encodeURIComponent(sessionToken)}&region=${encodeURIComponent(sessionRegion)}`);
                const jsonRes = await res.json();
                
                if (!jsonRes.success) throw new Error(jsonRes.message);

                const data = jsonRes.data;

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-500">Belum ada surat yang diinput.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(row => {
                    const date = new Date(row.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
                    
                    let statusColor = 'bg-slate-100 text-slate-700';
                    if(row.status === 'menunggu') statusColor = 'bg-yellow-100 text-yellow-700';
                    if(row.status === 'diproses') statusColor = 'bg-blue-100 text-blue-700';
                    if(row.status === 'selesai') statusColor = 'bg-green-100 text-green-700';
                    if(row.status === 'ditolak') statusColor = 'bg-red-100 text-red-700';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="p-4 whitespace-nowrap text-slate-600">${date}</td>
                        <td class="p-4 font-semibold text-slate-800">${row.nomor_surat}</td>
                        <td class="p-4"><span class="capitalize text-xs font-semibold bg-slate-100 px-2 py-1 rounded">${row.jenis_surat}</span></td>
                        <td class="p-4 text-slate-700">${row.perihal}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusColor}">
                                ${row.status}
                            </span>
                        </td>
                        <td class="p-4">
                            <a href="${row.file_url}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center">
                                Unduh PDF
                            </a>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500">Gagal memuat data: ${error.message}</td></tr>`;
            }
        }

        init();
    </script>
</body>
</html>
